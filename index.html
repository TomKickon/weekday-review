async function processUpload(path) {
  const isB = path === 'B';
  if (!state.files.length) { showErr('upload-err', 'Please choose a CSV file first.'); return; }
  const file = state.files[state.files.length - 1];
  if (!file.name.toLowerCase().endsWith('.csv')) { showErr('upload-err', 'File must be a .csv (Lightspeed Line Transactions export).'); return; }

  showErr('upload-err', null);
  $('#wizard').innerHTML = `<div class="page"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Parsing line transactions…</div></div></div>`;

  try {
    const text = await readText(file);
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('No data rows found in CSV.');

    const expectedCols = ['Date', 'Type', 'Account', 'Item', 'Qty', 'UnitPrice', 'FinalPrice', 'Group'];
    const missing = expectedCols.filter(c => !(c in rows[0]));
    if (missing.length) {
      throw new Error(`This doesn't look like a Line Transactions export. Missing columns: ${missing.join(', ')}. Please re-export from Reports → All reports → Line transactions.`);
    }

    const parsed = parseLineTransactions(rows);
    if (parsed.stats.datesCount === 0) throw new Error('No SALE rows found with valid dates. Check your export.');

    state.parsedData = parsed;
    // Seed the main-groups selection from auto-detection. The MM confirms/adjusts
    // on the next screen before we use it as the take-up denominator.
    state.mainGroups = new Set(parsed.autoMainGroups);
    state.screen = isB ? 'path-b-confirm-mains' : 'path-a-confirm-mains';
    render();
  } catch (e) {
    state.screen = isB ? 'path-b-upload' : 'path-a-upload';
    render();
    setTimeout(() => showErr('upload-err', e.message), 50);
  }
}

// ── Screen: Confirm main dishes ────────────────────────────────────
// After upload, the MM confirms which food groups count as "main dishes".
// This defines the take-up denominator (take-up = special units / main dishes).
// Auto-detected mains are pre-ticked; the MM adjusts. Non-main groups (sides,
// snacks, desserts, mods) are shown unticked so the MM can add any we missed.
function renderConfirmMains(path) {
  const parsed = state.parsedData;
  const groups = parsed.foodGroups || [];
  const isB = path === 'B';
  const nextScreen = isB ? 'path-b-pick' : 'path-a-specials';
  const backScreen = isB ? 'path-b-upload' : 'path-a-upload';

  if (!state.mainGroups) state.mainGroups = new Set(parsed.autoMainGroups);

  const rows = groups.map(g => {
    const checked = state.mainGroups.has(g.name);
    const sampleStr = g.topItems.slice(0, 3).join(', ');
    return `
      <label class="mains-row ${checked ? 'mains-row-on' : ''}">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleMainGroup('${g.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}', this.checked)">
        <span class="mains-info">
          <span class="mains-name">${escHtml(g.name)}</span>
          <span class="mains-samples">${escHtml(sampleStr)}${g.topItems.length > 3 ? '…' : ''}</span>
        </span>
        <span class="mains-stats">
          <span class="mains-qty">${fmtN(g.qty)} sold</span>
          <span class="mains-price">avg ${fmtD(g.avgPrice)}</span>
        </span>
      </label>`;
  }).join('');

  return `
<div class="page">
  <div class="step-eyebrow">${isB ? 'Strategic Plan' : 'Performance Review'} · Confirm main dishes</div>
  <h1 class="step-title"><span class="light">Which of these are</span> main dishes?</h1>
  <div class="step-divider"></div>
  <p class="step-sub">
    Take-up rate is measured as <strong>special sales ÷ main dishes sold</strong>. To get that right, confirm which menu groups are mains. We've pre-ticked the ones that look like mains (sides, sauces, snacks, desserts and surcharges are left out). Tick or untick to adjust - this is a one-time setup for ${escHtml(state.venue.name)}.
  </p>

  <div class="mains-list">
    ${rows || '<p class="no-data-msg">No food groups detected in this data.</p>'}
  </div>

  <div class="mains-summary" id="mains-summary">${mainsSummaryTextPlain()}</div>

  <div class="btn-row">
    <button class="btn-back" onclick="state.screen='${backScreen}'; render();">← Back</button>
    <button class="btn btn-primary" onclick="state.screen='${nextScreen}'; render();">Looks right →</button>
  </div>
</div>`;
}

function toggleMainGroup(name, checked) {
  if (!state.mainGroups) state.mainGroups = new Set();
  if (checked) state.mainGroups.add(name);
  else state.mainGroups.delete(name);
  const summaryEl = document.getElementById('mains-summary');
  if (summaryEl) summaryEl.textContent = mainsSummaryTextPlain();
  if (typeof event !== 'undefined' && event && event.target) {
    const row = event.target.closest('.mains-row');
    if (row) row.classList.toggle('mains-row-on', checked);
  }
}

function mainsSummaryTextPlain() {
  const parsed = state.parsedData;
  const groups = (parsed && parsed.foodGroups) || [];
  let totalMains = 0;
  for (const g of groups) if (state.mainGroups && state.mainGroups.has(g.name)) totalMains += g.qty;
  const n = state.mainGroups ? state.mainGroups.size : 0;
  return `${n} group${n === 1 ? '' : 's'} marked as mains · ${fmtN(totalMains)} main dishes across the whole period`;
}

// ── Screen: Specials ───────────────────────────────────────────────
function renderSpecials() {
  const parsed = state.parsedData;
  const range = parsed.dateRange;
  const fmtDate = d => d ? `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}` : '?';
  const weeks = range.weeks.toFixed(1);

  let bannerClass = 'range-green', bannerMsg = '';
  if (range.status === 'red') {
    bannerClass = 'range-red';
    bannerMsg = `<strong>⚠ Insufficient data.</strong> Your file covers only ${weeks} weeks. The tool needs at least 8 weeks of trading per weekday to produce reliable averages. Please re-export with a longer date range.`;
  } else if (range.status === 'amber') {
    bannerClass = 'range-amber';
    bannerMsg = `<strong>${weeks} weeks of data.</strong> Workable, but 12 weeks gives more reliable averages. Consider re-exporting for better results.`;
  } else if (range.status === 'green') {
    bannerClass = 'range-green';
    bannerMsg = `<strong>✓ ${weeks} weeks of data.</strong> Ideal range for reliable averages.`;
  } else if (range.status === 'amber-long') {
    bannerClass = 'range-amber';
    bannerMsg = `<strong>${weeks} weeks of data.</strong> This may include old menu prices or pre-change specials. For accuracy, we recommend exporting the most recent 12 weeks only - but you can proceed if your menu hasn't changed in that period.`;
  }

  const blockContinue = range.status === 'red';

  return `
<div class="page">
  <div class="step-eyebrow">Performance Review · Step 3</div>
  <h1 class="step-title"><span class="light">Enter your</span> weekday specials</h1>
  <div class="step-divider"></div>
  <p class="step-sub">${escHtml(state.venue.name)} · Data: ${fmtDate(range.start)} to ${fmtDate(range.end)}${range.droppedCount ? ` · ${range.droppedCount} partial day(s) auto-excluded` : ''}</p>

  <div class="range-banner ${bannerClass}">
    <span style="flex:1;">${bannerMsg}</span>
  </div>

  ${blockContinue ? '' : `
  <div class="card" style="margin-top:1.5rem;">
    <div class="card-head">Your weekday specials</div>
    <div class="card-desc">
      One card per special. <strong>Special $</strong> is what you charge for the offer. Then list the item(s) that are part of this special.
      <br><span style="color:var(--support-grey); font-size:12px;">For a multi-item special like "Locals' Night $20 - Fish/Schnitzel/Burger", click <strong>+ Add another item</strong> to include all three at the same special price. Their full prices may differ (the tool handles that).</span>
    </div>
    <div id="specials-body"></div>
    <button class="add-btn" onclick="addSpecialCard()">+ Add another special</button>
    <div class="err" id="specials-err"></div>
  </div>
  `}

  <div class="btn-row">
    <button class="btn-back" onclick="state.screen='path-a-confirm-mains'; render();">← Back</button>
    ${blockContinue
      ? `<button class="btn btn-primary" disabled>Cannot continue</button>`
      : `<button class="btn btn-primary" onclick="confirmSpecials()">Continue →</button>`
    }
  </div>
</div>`;
}

function confirmSpecials() {
  const specs = readSpecialsFromForm();
  if (!specs.length) { showErr('specials-err', 'Please add at least one special with day, offer name, and at least one item with special price + full price filled in.'); return; }
  // Validate that each special has data on its day
  const noData = specs.filter(s => !state.parsedData.byDow[s.day].length);
  if (noData.length === specs.length) {
    showErr('specials-err', `None of your specials have trading data on their day. Check your date range covers the days your specials run.`);
    return;
  }
  showErr('specials-err', null);
  state.specials = specs;
  // Build initial SKU matches via fuzzy search - per sub-item.
  // Shape: state.skuMatches[specialIdx][itemIdx] = { [itemName]: { selected, qtyOnDay, avgPrice, priceMatch } }
  state.skuMatches = {};
  for (let i = 0; i < specs.length; i++) {
    state.skuMatches[i] = {};
    for (let j = 0; j < specs[i].items.length; j++) {
      // Each sub-item runs its own fuzzy match. The pseudoSp uses the sub-item's
      // own sp (special price) - critical for tiered offers like Steak Night
      // where porterhouse=$25 and wagyu=$39 trigger different price-match flags.
      const subItem = specs[i].items[j];
      const pseudoSp = { day: specs[i].day, name: subItem.name, sp: subItem.sp, fp: subItem.fp };
      const candidates = findSkuCandidates(pseudoSp, state.parsedData);
      state.skuMatches[i][j] = {};
      for (const c of candidates) {
        state.skuMatches[i][j][c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };
      }
    }
  }
  state.screen = 'path-a-sku';
  render();
}

// ── Screen: SKU Match ──────────────────────────────────────────────
function renderSkuMatch() {
  return `
<div class="page">
  <div class="step-eyebrow">Performance Review · Step 4</div>
  <h1 class="step-title"><span class="light">Confirm the</span> matching items</h1>
  <div class="step-divider"></div>
  <p class="step-sub">For each special, we've searched your data for matching POS items. Tick the items that ARE the special. Untick anything that's actually a different menu item.</p>

  ${state.specials.map((sp, idx) => renderSkuPanel(sp, idx)).join('')}

  <div class="btn-row">
    <button class="btn-back" onclick="state.screen='path-a-specials'; render();">← Back</button>
    <button class="btn btn-primary" onclick="runAnalysis()">Analyse →</button>
  </div>
</div>`;
}

function renderSkuPanel(sp, idx) {
  const matchesByItem = state.skuMatches[idx] || {};
  const nights = state.parsedData.byDow[sp.day].length;

  // Render header for the whole special (offer name + day + special price)
  // Then one sub-panel per sub-item.
  const subPanels = sp.items.map((subItem, subIdx) => {
    const matches = matchesByItem[subIdx] || {};
    const items = Object.keys(matches);
    let totalQty = 0;
    for (const itemName of items) {
      if (matches[itemName].selected) totalQty += matches[itemName].qtyOnDay;
    }
    const avgPerDay = nights ? Math.round(totalQty / nights) : 0;
    const isMulti = sp.items.length > 1;

    return `
    <div class="sku-subpanel" id="sku-subpanel-${idx}-${subIdx}">
      <div class="sku-subpanel-head">
        <span style="display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap;">
          ${isMulti ? `<span class="sub-item-label">Item ${subIdx + 1} of ${sp.items.length}:</span>` : ''}
          <span class="sku-name-display" id="sku-name-${idx}-${subIdx}" style="display:inline;">${escHtml(subItem.name)}</span>
          <input type="text" id="sku-edit-${idx}-${subIdx}" value="${escHtml(subItem.name)}" style="display:none; padding:4px 8px; font-size:12.5px; border:1px solid var(--brand-blue); border-radius:4px; min-width:180px;" />
          <button class="edit-name-btn" id="sku-edit-btn-${idx}-${subIdx}" onclick="editSkuName(${idx}, ${subIdx})" style="background:none; border:none; cursor:pointer; color:var(--brand-blue); font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:2px 6px;">Edit</button>
          <button class="edit-name-save" id="sku-save-btn-${idx}-${subIdx}" onclick="saveSkuName(${idx}, ${subIdx})" style="display:none; background:var(--brand-blue); border:none; cursor:pointer; color:#fff; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:4px;">Save</button>
          <button class="edit-name-cancel" id="sku-cancel-btn-${idx}-${subIdx}" onclick="cancelSkuName(${idx}, ${subIdx})" style="display:none; background:none; border:none; cursor:pointer; color:var(--support-grey); font-size:11px; padding:2px 6px;">Cancel</button>
        </span>
        <span class="sub-rrp">RRP ${fmtD(subItem.fp)} → ${fmtD(subItem.sp)}</span>
      </div>
      ${items.length === 0 ? `
        <p style="font-size:12.5px; color:var(--support-grey); font-style:italic; padding:8px 0;">No items containing "${escHtml(subItem.name)}" found in your data on ${sp.day}s. Try the <strong>Edit</strong> button above to fix the name, or click <strong>"+ Add from your data"</strong> below to browse all items sold that day.</p>
      ` : items.map(itemName => {
        const m = matches[itemName];
        const idSafe = 'sku-' + idx + '-' + subIdx + '-' + btoa(unescape(encodeURIComponent(itemName))).replace(/=/g, '');
        return `
        <div class="sku-row">
          <input type="checkbox" id="${idSafe}" ${m.selected ? 'checked' : ''} onchange="toggleSku(${idx}, ${subIdx}, '${itemName.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}', this.checked)">
          <label for="${idSafe}" class="sku-name" style="cursor:pointer;">${escHtml(itemName)}${m.priceMatch ? ' <span style="color:var(--green); font-size:10px; font-weight:600;">PRICE MATCH</span>' : ''}</label>
          <span class="sku-stats">${m.qtyOnDay} sold · avg ${fmtD(m.avgPrice)}</span>
        </div>`;
      }).join('')}
      ${items.length > 0 ? `<div class="sku-total" id="sku-total-${idx}-${subIdx}">Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg</div>` : ''}

      <div class="add-from-data-link" id="afd-link-${idx}-${subIdx}" onclick="toggleAfd(${idx}, ${subIdx})">+ Add from your data</div>
      <div class="afd-browser" id="afd-browser-${idx}-${subIdx}" style="display:none;">
        <input type="text" class="afd-filter" id="afd-filter-${idx}-${subIdx}" placeholder="Filter items sold on ${sp.day}s…" oninput="filterAfd(${idx}, ${subIdx}, this.value)">
        <div class="afd-list" id="afd-list-${idx}-${subIdx}">${renderAfdList(sp.day, matches, idx, '', false, subIdx)}</div>
      </div>
    </div>`;
  }).join('');

  // Format the price line for the header. For uniform offers, show "$20 special".
  // For tiered offers, show "$25-$39 across 2 items" so the MM sees the price tier
  // immediately without having to scan each sub-panel.
  const prices = sp.items.map(it => it.sp).filter(p => p > 0);
  const minPrice = prices.length ? Math.min(...prices) : 0;
  const maxPrice = prices.length ? Math.max(...prices) : 0;
  const headerPrice = (sp.items.length > 1 && minPrice !== maxPrice)
    ? `${fmtD(minPrice)}-${fmtD(maxPrice)} across ${sp.items.length} items (tiered)`
    : `${fmtD(minPrice)} special${sp.items.length > 1 ? ` · ${sp.items.length} items` : ''}`;

  return `
<div class="sku-panel" id="sku-panel-${idx}">
  <div class="sku-panel-head">
    <span class="day-pill">${sp.day}</span>
    <span style="font-weight:600;">${escHtml(sp.name)}</span>
    · ${headerPrice}
  </div>
  ${subPanels}
</div>`;
}

// ── Build the items list for "Add from your data" browser ─────────
// `pathB` flag distinguishes Path A (idx is special index) from Path B (single special).
// `subIdx` is only used for Path A (which sub-item the candidate is being added to)
function renderAfdList(day, currentMatches, idx, filter, pathB, subIdx) {
  const parsed = state.parsedData;
  // Get all food items sold on this day, sorted by qty on day desc
  const candidates = [];
  parsed.allItems.forEach((data, itemName) => {
    if (itemName.endsWith('*')) return;  // skip modifier lines
    const qtyOnDay = data.days[day] || 0;
    if (qtyOnDay === 0) return;
    const avgPrice = data.prices.length ? data.prices.reduce((a, b) => a + b, 0) / data.prices.length : 0;
    candidates.push({ itemName, qtyOnDay, avgPrice });
  });
  candidates.sort((a, b) => b.qtyOnDay - a.qtyOnDay);
  // Apply filter
  const f = (filter || '').trim().toLowerCase();
  const filtered = f ? candidates.filter(c => c.itemName.toLowerCase().includes(f)) : candidates;
  // Limit to top 80 for performance
  const shown = filtered.slice(0, 80);

  if (!shown.length) {
    return `<div class="afd-empty">No items match "${escHtml(filter)}"</div>`;
  }
  return shown.map(c => {
    const isAdded = currentMatches[c.itemName];
    const safeArg = c.itemName.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const handler = pathB
      ? `onclick="addAfdItemB('${safeArg}')"`
      : `onclick="addAfdItem(${idx}, ${subIdx}, '${safeArg}')"`;
    return `
    <div class="afd-item ${isAdded ? 'already-added' : ''}" ${isAdded ? '' : handler}>
      <span class="afd-item-name">${escHtml(c.itemName)}${isAdded ? '<span class="afd-already-tag">Added</span>' : ''}</span>
      <span class="afd-item-stats">${Math.round(c.qtyOnDay)} sold · ${fmtD(c.avgPrice)}</span>
    </div>`;
  }).join('');
}

function toggleAfd(idx, subIdx) {
  const browser = document.getElementById('afd-browser-' + idx + '-' + subIdx);
  const link = document.getElementById('afd-link-' + idx + '-' + subIdx);
  if (browser.style.display === 'none') {
    browser.style.display = 'block';
    link.textContent = '− Hide list';
    document.getElementById('afd-filter-' + idx + '-' + subIdx).focus();
  } else {
    browser.style.display = 'none';
    link.textContent = '+ Add from your data';
  }
}

function filterAfd(idx, subIdx, value) {
  const sp = state.specials[idx];
  const matches = (state.skuMatches[idx] && state.skuMatches[idx][subIdx]) || {};
  const list = document.getElementById('afd-list-' + idx + '-' + subIdx);
  if (list) list.innerHTML = renderAfdList(sp.day, matches, idx, value, false, subIdx);
}

function addAfdItem(idx, subIdx, itemName) {
  const sp = state.specials[idx];
  const subItem = sp.items[subIdx];
  if (!state.skuMatches[idx]) state.skuMatches[idx] = {};
  if (!state.skuMatches[idx][subIdx]) state.skuMatches[idx][subIdx] = {};
  if (state.skuMatches[idx][subIdx][itemName]) return;  // already there
  const ai = state.parsedData.allItems.get(itemName);
  if (!ai) return;
  const avgPrice = ai.prices.length ? ai.prices.reduce((a, b) => a + b, 0) / ai.prices.length : 0;
  state.skuMatches[idx][subIdx][itemName] = {
    selected: true,
    qtyOnDay: ai.days[sp.day] || 0,
    avgPrice,
    // priceMatch checks against THIS sub-item's special price (not the offer's
    // — there is no offer-level price anymore, since tiered offers have different prices per item)
    priceMatch: avgPrice > 0 && subItem && subItem.sp > 0 && Math.abs(avgPrice - subItem.sp) <= 2,
  };
  // Re-render the whole special panel (since the sub-panel is nested inside)
  const panel = document.getElementById('sku-panel-' + idx);
  if (panel) {
    panel.outerHTML = renderSkuPanel(sp, idx);
    // Re-open the browser since the user is probably looking for more items
    setTimeout(() => { toggleAfd(idx, subIdx); }, 10);
  }
}

function editSkuName(idx, subIdx) {
  document.getElementById('sku-name-' + idx + '-' + subIdx).style.display = 'none';
  document.getElementById('sku-edit-btn-' + idx + '-' + subIdx).style.display = 'none';
  const input = document.getElementById('sku-edit-' + idx + '-' + subIdx);
  input.style.display = 'inline-block';
  input.focus();
  input.select();
  document.getElementById('sku-save-btn-' + idx + '-' + subIdx).style.display = 'inline-block';
  document.getElementById('sku-cancel-btn-' + idx + '-' + subIdx).style.display = 'inline-block';
  // Allow Enter to save, Escape to cancel
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveSkuName(idx, subIdx); }
    if (e.key === 'Escape') { e.preventDefault(); cancelSkuName(idx, subIdx); }
  };
}

function cancelSkuName(idx, subIdx) {
  const subItem = state.specials[idx].items[subIdx];
  document.getElementById('sku-edit-' + idx + '-' + subIdx).value = subItem.name;
  document.getElementById('sku-name-' + idx + '-' + subIdx).style.display = 'inline';
  document.getElementById('sku-edit-btn-' + idx + '-' + subIdx).style.display = 'inline-block';
  document.getElementById('sku-edit-' + idx + '-' + subIdx).style.display = 'none';
  document.getElementById('sku-save-btn-' + idx + '-' + subIdx).style.display = 'none';
  document.getElementById('sku-cancel-btn-' + idx + '-' + subIdx).style.display = 'none';
}

function saveSkuName(idx, subIdx) {
  const newName = document.getElementById('sku-edit-' + idx + '-' + subIdx).value.trim();
  if (!newName) { cancelSkuName(idx, subIdx); return; }
  // Update state - rename this sub-item
  const sp = state.specials[idx];
  sp.items[subIdx].name = newName;
  // Re-run fuzzy match for this sub-item only.
  // pseudoSp uses the sub-item's own sp/fp because tiered offers have different
  // prices per item (e.g. Steak Night: $25 porterhouse, $39 wagyu).
  const subItem = sp.items[subIdx];
  const pseudoSp = { day: sp.day, name: newName, sp: subItem.sp, fp: subItem.fp };
  const candidates = findSkuCandidates(pseudoSp, state.parsedData);
  if (!state.skuMatches[idx]) state.skuMatches[idx] = {};
  state.skuMatches[idx][subIdx] = {};
  for (const c of candidates) {
    state.skuMatches[idx][subIdx][c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };
  }
  // Re-render the whole special panel
  const panel = document.getElementById('sku-panel-' + idx);
  if (panel) {
    panel.outerHTML = renderSkuPanel(sp, idx);
  }
}

function toggleSku(idx, subIdx, itemName, checked) {
  if (!state.skuMatches[idx] || !state.skuMatches[idx][subIdx] || !state.skuMatches[idx][subIdx][itemName]) return;
  state.skuMatches[idx][subIdx][itemName].selected = checked;
  // Recalculate total for this sub-panel
  const sp = state.specials[idx];
  const matches = state.skuMatches[idx][subIdx];
  const nights = state.parsedData.byDow[sp.day].length;
  let totalQty = 0;
  for (const k of Object.keys(matches)) {
    if (matches[k].selected) totalQty += matches[k].qtyOnDay;
  }
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;
  const totalEl = document.getElementById(`sku-total-${idx}-${subIdx}`);
  if (totalEl) totalEl.innerHTML = `Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg`;
}

// ── Run analysis & render dashboard ────────────────────────────────

  state.results = computeResults();

function renderSpecCard(r, maxFood, maxBev, maxDisc, maxBpt) {
  const color = DAY_COLORS[r.day] || '#666';
  if (!r.hasData) return `
    <div class="spec-card">
      <div class="spec-card-top"><div class="spec-dot" style="background:${color};"></div><div class="spec-day">${r.day}</div></div>
      <div class="spec-item">${escHtml(r.name)}</div>
      <p style="font-size:12px; color:var(--support-grey); font-style:italic;">No data found for ${r.day}.</p>
    </div>`;

  const v = r.verdict;
  const fw   = Math.round(r.avgFoodRev  / maxFood * 100);
  const bw   = Math.round(r.avgBevRev   / maxBev  * 100);
  const dw   = Math.round(r.totalDisc   / maxDisc * 100);
  const bptw = Math.round(r.bevPerTx    / maxBpt  * 100);

  const discBadgeStyle = (() => {
    if (r.discPct <= 30) return 'background:var(--green-bg); color:var(--green);';
    if (r.discPct <= 42) return 'background:var(--blue-bg); color:var(--blue-tag);';
    if (r.discPct <= 50) return 'background:var(--amber-bg); color:var(--amber);';
    return 'background:var(--red-bg); color:var(--red);';
  })();

  const note = (() => {
    if (v.key === 'dominant') return `Anchor night. ${fmtN(r.unitsPerNight)} units · ${fmtD(r.netRev)} net rev.`;
    if (v.key === 'star') return `${fmtPct(r.takeUp * 100)} take-up of mains. Food beats bev.`;
    if (v.key === 'working') return `${fmtN(r.unitsPerNight)} units, food-led. Pulling weight.`;
    if (v.key === 'efficient') return `${fmtD(r.totalDisc)} disc cost - low-overhead hook.`;
    if (v.key === 'weak') return r.isBevLed ? `Bev (${fmtD(r.avgBevRev)}) outpaces food (${fmtD(r.avgFoodRev)}). Drinks night.` : `Underperforming - food isn't doing the work.`;
    return `Review the offer.`;
  })();

  // For drill-through to Path B: pass items array (each with name/sp/fp) and breakdown
  const drillData = encodeURIComponent(JSON.stringify({
    day: r.day,
    name: r.name,
    sp: r.sp,                          // blended sp (for back-compat with Path B)
    items: r.items,                    // [{name, sp, fp}, ...] each with its own special price
    isMultiItem: r.isMultiItem,
    isTiered: r.isTiered,
    subItemBreakdown: (r.subItemBreakdown || []).map(s => ({
      name: s.name, sp: s.sp, fp: s.fp, totalQty: s.totalQty, selectedItems: s.selectedItems,
    })),
  }));

  // Headline special price display.
  // For tiered offers (different prices per item, e.g. Steak Night $25/$39), show range.
  // For uniform offers (all items same price), show the single price.
  const isTiered = r.isTiered;
  const spDisplay = isTiered
    ? `${fmtD(r.spMin)}-${fmtD(r.spMax)}`
    : fmtD(r.sp);

  // Full price (RRP) display - same logic as before
  const isMulti = r.isMultiItem;
  const rrpDisplay = (() => {
    if (isMulti) {
      if (r.priceMin === r.priceMax) return fmtD(r.priceMin);
      return `${fmtD(r.priceMin)}-${fmtD(r.priceMax)}`;
    }
    return r.isRange ? `${fmtD(r.priceMin)}-${fmtD(r.priceMax)}` : fmtD(r.items[0].fp);
  })();
  const rrpTitle = isMulti
    ? `${r.items.length} items at full prices ${r.items.map(it => fmtD(it.fp)).join(', ')}. Discount % based on weighted-avg full price ${fmtD(r.effectiveFullPrice)}.`
    : (r.isRange ? `Items range ${fmtD(r.priceMin)} - ${fmtD(r.priceMax)}, avg ${fmtD(r.effectiveFullPrice)}` : '');

  // Sub-item breakdown table (only shown for multi-item). For tiered offers, also show each
  // sub-item's special price. This makes it crystal clear that Steak Night = porterhouse $25
  // AND wagyu $39 simultaneously.
  const subItemHtml = (isMulti && r.subItemBreakdown && r.subItemBreakdown.length) ? `
    <div class="subitem-breakdown">
      <div class="subitem-label">Sub-item breakdown</div>
      ${r.subItemBreakdown.map(sub => {
        const tierTag = isTiered ? `${fmtD(sub.sp)} special · RRP ${fmtD(sub.fp)}` : `RRP ${fmtD(sub.fp)}`;
        return `
        <div class="subitem-row">
          <span class="subitem-name">${escHtml(sub.name)}</span>
          <span class="subitem-stats">${fmtN(sub.avgPerNight)}/${r.day.slice(0,3).toLowerCase()} · ${tierTag}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  // Card-level multi-item / tiered badge
  const multiBadge = (() => {
    if (isTiered) return ` <span style="font-size:9.5px; color:var(--brand-blue); font-weight:600; background:var(--blue-bg); padding:1px 5px; border-radius:3px; letter-spacing:0.04em; text-transform:uppercase;">${r.items.length} tiers</span>`;
    if (isMulti) return ` <span style="font-size:9.5px; color:var(--support-grey); font-weight:500;">(${r.items.length} items)</span>`;
    return '';
  })();

  return `
    <div class="spec-card" style="cursor:pointer;" onclick="drillToPathB('${drillData}')" title="Click to investigate this special with a Strategic Plan">
      <div class="spec-card-top"><div class="spec-dot" style="background:${color};"></div><div class="spec-day">${r.day}</div></div>
      <div class="spec-item">${escHtml(r.name)}${multiBadge}</div>
      <div class="price-badge">
        <div class="price-special" title="${isTiered ? `Tiered: ${r.items.map(it => `${escHtml(it.name)} ${fmtD(it.sp)}`).join(', ')}. Blended avg by units: ${fmtD(r.sp)}.` : ''}">${spDisplay}</div>
        <div class="price-rrp" title="${escHtml(rrpTitle)}">${rrpDisplay}</div>
        <div class="disc-badge" style="${discBadgeStyle}" title="${isMulti ? `Weighted-avg discount across ${r.items.length} items` : ''}">-${r.discPct}%</div>
      </div>
      <div class="kpi-grid">
        <div><div class="kpi-val">${fmtN(r.unitsPerNight)}</div><div class="kpi-label">Units/${r.day.slice(0,3).toLowerCase()}</div></div>
        <div><div class="kpi-val">${fmtN(r.avgMains)}</div><div class="kpi-label">Mains/${r.day.slice(0,3).toLowerCase()}</div></div>
        <div><div class="kpi-val">${fmtPct(r.takeUp * 100)}</div><div class="kpi-label">Take-up</div></div>
        <div><div class="kpi-val">${fmtD(r.spendPerTx)}</div><div class="kpi-label">$/tx</div></div>
      </div>
      ${subItemHtml}
      <div class="divider-line"></div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Food rev</span><span>${fmtD(r.avgFoodRev)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${fw}%; background:${color};"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Bev rev</span><span>${fmtD(r.avgBevRev)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${bw}%; background:${color}; opacity:0.6;"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span style="color:var(--red);">Disc cost</span><span style="color:var(--red);">-${fmtD(r.totalDisc)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${dw}%; background:#e8a8a8;"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Bev/tx</span><span>${fmtD(r.bevPerTx)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${bptw}%; background:${color}; opacity:0.35;"></div></div>
      </div>
      <div class="verdict-wrap">
        <span class="pill ${v.pill}">${v.label}</span>
        <div class="spec-note">${note}</div>
      </div>
      <div style="margin-top:10px; padding-top:8px; border-top:1px solid var(--line); font-size:10px; font-weight:600; color:var(--brand-blue); letter-spacing:0.08em; text-transform:uppercase; text-align:center;">
        Click → Strategic Plan${isMulti ? ' (pick item)' : ''}
      </div>
    </div>`;
}

// Drill from Path A card into Path B with the special pre-filled.
// For single-item specials: jump straight to Path B's SKU match screen.
// For multi-item specials: land on a sub-item picker first so MM picks which
// item to deep-dive on. The picker handles the rest of the setup.
function drillToPathB(encodedData) {
  try {
    const data = JSON.parse(decodeURIComponent(encodedData));
    state.path = 'B';

    // Reset Path B state to a clean slate (we're starting a new deep-dive)
    resetPathBState();

    if (data.isMultiItem && data.items && data.items.length > 1) {
      // Multi-item: stash the parent offer context, then land on picker
      state.bParentOffer = {
        day: data.day,
        name: data.name,
        sp: data.sp,                 // blended sp (kept for back-compat & sub-item picker fallback)
        items: data.items,
        isTiered: data.isTiered,
        subItemBreakdown: data.subItemBreakdown || [],
        chosenItemName: null,  // will be set when MM picks
      };
      state.screen = 'path-b-subitem-pick';
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    // Single-item: go straight to Path B SKU match.
    // Use chosenItem.sp (the item's own special price) not data.sp (offer-level blended).
    // For single-item specials these are identical; for tiered offers (theoretically
    // impossible here because we routed multi-item above) we'd want the item-level price.
    const chosenItem = data.items[0];
    const chosenSelectedItems = (data.subItemBreakdown && data.subItemBreakdown[0])
      ? data.subItemBreakdown[0].selectedItems
      : [];
    state.bParentOffer = null;
    state.bSpecial = { day: data.day, name: chosenItem.name, sp: chosenItem.sp || data.sp, fp: chosenItem.fp };
    seedBSkuMatchesFromPathA(chosenSelectedItems);
    state.screen = 'path-b-sku';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    console.error('Drill-through failed', e);
  }
}

// Reset Path B state so a new deep-dive starts clean.
// Doesn't touch venue or parsedData (those carry over).
function resetPathBState() {
  state.bSpecial = null;
  state.bParentOffer = null;
  state.bSkuMatches = {};
  state.bAnalysis = null;
  state.bBranch = null;
  state.bRecommendedBranch = null;
  state.bAiData = null;
  state.bVerified = {};
  state.bDismissed = {};
  state.bAlternative = { name: '', price: 0, rationale: '' };
  state.bTweak = { description: '' };
  state.bTweakSuggestions = null;
  state.bNotes = '';
  state.bExecSummary = null;
  state.bActionItems = null;
  state.bReportHTML = null;
  // Reset slider-driven scenario back to Moderate defaults
  state.bRecommended = { name: 'Recommended plan', txChange: 10, takeUp: 45, newPrice: 0 };
}

// Given a list of items that were selected in Path A, seed Path B's SKU matches
// so the MM doesn't have to re-tick them. Re-runs fuzzy match and overrides the
// selected flag for items in chosenSelectedItems.
function seedBSkuMatchesFromPathA(chosenSelectedItems) {
  state.bSkuMatches = {};
  if (!chosenSelectedItems || !chosenSelectedItems.length) return;
  const candidates = findSkuCandidates(state.bSpecial, state.parsedData);
  for (const c of candidates) {
    state.bSkuMatches[c.itemName] = {
      selected: chosenSelectedItems.includes(c.itemName) || c.autoTick,
      qtyOnDay: c.qtyOnDay,
      avgPrice: c.avgPrice,
      priceMatch: c.priceMatch,
    };
  }
  // Add any selected items that weren't in candidates (manually ticked in Path A)
  for (const sel of chosenSelectedItems) {
    if (!state.bSkuMatches[sel] && state.parsedData.allItems.has(sel)) {
      const ai = state.parsedData.allItems.get(sel);
      state.bSkuMatches[sel] = {
        selected: true,
        qtyOnDay: ai.days[state.bSpecial.day] || 0,
        avgPrice: ai.prices.length ? ai.prices.reduce((a,b)=>a+b,0) / ai.prices.length : 0,
        priceMatch: false,
      };
    }
  }
}

// ── Screen: Sub-item picker (Path B, after drill from multi-item) ────
// When MM drills into a multi-item Path A special, they land here. We show
// each sub-item with its volume/RRP/discount %/verdict-ish indicators and
// let the MM choose which one to deep-dive on. The choice sets state.bSpecial
// and routes to path-b-sku.
function renderSubItemPicker() {
  const offer = state.bParentOffer;
  if (!offer) {
    // Defensive: shouldn't happen, but if state is corrupted, go back to dashboard
    state.screen = 'path-a-dashboard';
    return '<div class="page"><p>Returning to dashboard…</p></div>';
  }

  const breakdown = offer.subItemBreakdown || [];
  const nights = (state.parsedData.byDow[offer.day] || []).length;

  // Detect if this is a tiered offer (items have different special prices)
  const offerSps = offer.items.map(it => it.sp).filter(s => s > 0);
  const offerSpMin = offerSps.length ? Math.min(...offerSps) : 0;
  const offerSpMax = offerSps.length ? Math.max(...offerSps) : 0;
  const offerIsTiered = offer.isTiered || (offerSpMax - offerSpMin > 0);

  // For each sub-item, compute discount % using ITS OWN special price (item.sp),
  // not the blended offer.sp. This matters hugely for tiered offers - the wagyu
  // upsell at $39 has very different discount math from the porterhouse at $25.
  const cards = offer.items.map((item, idx) => {
    const subBd = breakdown.find(b => b.name === item.name) || { totalQty: 0, avgPerNight: 0, selectedItems: [] };
    const itemSp = item.sp || offer.sp;  // fallback to blended if missing
    const discPct = item.fp > 0 ? Math.round((item.fp - itemSp) / item.fp * 100) : 0;
    const unitsPerNight = nights > 0 ? Math.round(subBd.totalQty / nights) : 0;
    const isBiggest = breakdown.length > 0 && breakdown.every(b => (subBd.totalQty || 0) >= (b.totalQty || 0));
    const discColor = discPct <= 30 ? 'var(--green)' : discPct <= 42 ? 'var(--blue-tag)' : discPct <= 50 ? 'var(--amber)' : 'var(--red)';

    return `
      <div class="subitem-pick-card" onclick="pickSubItem('${item.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')">
        <div class="subitem-pick-head">
          <span class="subitem-pick-name">${escHtml(item.name)}</span>
          ${isBiggest && breakdown.length > 1 ? '<span class="subitem-pick-tag">Top seller</span>' : ''}
        </div>
        <div class="subitem-pick-kpis">
          <div class="subitem-pick-kpi">
            <div class="subitem-pick-val">${fmtN(unitsPerNight)}</div>
            <div class="subitem-pick-lab">Units/${offer.day.slice(0,3).toLowerCase()}</div>
          </div>
          <div class="subitem-pick-kpi">
            <div class="subitem-pick-val">${fmtD(itemSp)}<span style="font-size:10px; color:var(--support-grey); font-weight:400;"> / ${fmtD(item.fp)}</span></div>
            <div class="subitem-pick-lab">Special / RRP</div>
          </div>
          <div class="subitem-pick-kpi">
            <div class="subitem-pick-val" style="color:${discColor};">${discPct}%</div>
            <div class="subitem-pick-lab">Discount</div>
          </div>
        </div>
        <div class="subitem-pick-cta">Deep-dive this item →</div>
      </div>`;
  }).join('');

  // Subheader prose: handle tiered vs uniform pricing in the description
  const priceDesc = offerIsTiered
    ? `prices range ${fmtD(offerSpMin)}-${fmtD(offerSpMax)} across ${offer.items.length} items (tiered offer)`
    : `at ${fmtD(offer.items[0].sp)} covers ${offer.items.length} items`;

  return `
<div class="page">
  <div class="step-eyebrow">Strategic Plan · Multi-item offer</div>
  <h1 class="step-title"><span class="light">Which item to</span> deep-dive?</h1>
  <div class="step-divider"></div>
  <p class="step-sub">${escHtml(state.venue.name)} · <strong>${escHtml(offer.name)}</strong> on ${offer.day}s ${priceDesc}. Pick the one you want to analyse - usually the top seller, but the underperformer (or the upsell) can be worth investigating too.</p>

  <div class="subitem-pick-grid">
    ${cards}
  </div>

  <div class="btn-row">
    <button class="btn-back" onclick="state.screen='path-a-dashboard'; render();">← Back to dashboard</button>
  </div>
</div>`;
}

// Handler for sub-item picker - MM has chosen which item to deep-dive
function pickSubItem(itemName) {
  const offer = state.bParentOffer;
  if (!offer) return;
  const item = offer.items.find(i => i.name === itemName);
  if (!item) return;

  // Find the breakdown for this sub-item to grab the selected items from Path A
  const subBd = (offer.subItemBreakdown || []).find(b => b.name === itemName);
  const chosenSelectedItems = (subBd && subBd.selectedItems) ? subBd.selectedItems : [];

  // Mark which item was chosen so report/AI prompts can reference it correctly
  offer.chosenItemName = itemName;

  // bSpecial uses the sub-item's OWN special price (item.sp), not the offer's
  // blended price. This matters for tiered offers - Steak Night porterhouse at
  // $25 vs wagyu at $39 are completely different analyses.
  // Parent offer context is stored separately in state.bParentOffer for AI prompts and report titles.
  state.bSpecial = { day: offer.day, name: itemName, sp: item.sp || offer.sp, fp: item.fp };
  seedBSkuMatchesFromPathA(chosenSelectedItems);

  state.screen = 'path-b-sku';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function addAfdItemB(itemName) {
  const sp = state.bSpecial;
  if (state.bSkuMatches[itemName]) return;
  const ai = state.parsedData.allItems.get(itemName);
  if (!ai) return;
  const avgPrice = ai.prices.length ? ai.prices.reduce((a, b) => a + b, 0) / ai.prices.length : 0;
  state.bSkuMatches[itemName] = {

    qtyOnDay: ai.days[sp.day] || 0,
    avgPrice,
    priceMatch: avgPrice > 0 && Math.abs(avgPrice - sp.sp) <= 2,

// ── Run analysis for Path B (single special) ───────────────────────
function runBAnalysis() {
  const sp = state.bSpecial;
  const parsed = state.parsedData;
  const selectedItems = Object.keys(state.bSkuMatches).filter(k => state.bSkuMatches[k].selected);

  const dayBuckets = parsed.byDow[sp.day];
  const nights = dayBuckets.length;
  const avgTx = avg(dayBuckets.map(d => d.transactions));
  const avgFoodTx = avg(dayBuckets.map(d => d.foodTx));
  const avgFoodRev = avg(dayBuckets.map(d => d.foodRev));
  const avgBevRev = avg(dayBuckets.map(d => d.bevRev));
  const avgDiscFood = avg(dayBuckets.map(d => d.discFood));
  const avgDiscBev = avg(dayBuckets.map(d => d.discBev));
  const totalDisc = avgDiscFood + avgDiscBev;
  const netRev = avgFoodRev + avgBevRev - totalDisc;

  let totalSpecialQty = 0, totalSpecialRev = 0;
  for (const itemName of selectedItems) {
    for (const bucket of dayBuckets) {
      const it = bucket.items.get(itemName);
      if (it) { totalSpecialQty += it.qty; totalSpecialRev += it.revenue; }
    }
  }
  const unitsPerNight = nights > 0 ? totalSpecialQty / nights : 0;
  // Take-up = special units ÷ main dishes/night (mains = MM-confirmed groups).
  const avgMains = mainDishesPerNight(sp.day, parsed, state.mainGroups);
  const takeUp = avgMains > 0 ? unitsPerNight / avgMains : 0;
  // Effective full price - weighted avg from non-special-day sales for selected items
  const effective = computeEffectiveFullPrice(selectedItems, sp.day, parsed);
  const fpForDisc = effective ? effective.effectiveFullPrice : sp.fp;
  const discPct = fpForDisc > 0 ? Math.round((fpForDisc - sp.sp) / fpForDisc * 100) : 0;
  const spendPerTx = avgTx > 0 ? (avgFoodRev + avgBevRev - totalDisc) / avgTx : 0;
  const bevPerTx = avgTx > 0 ? avgBevRev / avgTx : 0;
  const discPerTx = avgTx > 0 ? totalDisc / avgTx : 0;
  const isBevLed = avgBevRev > avgFoodRev;

  // Per-week trend buckets (12-week aggregation)
  const weeklyTrend = buildWeeklyTrend(dayBuckets, selectedItems);

  // Verdict
  const dowNetRev = {};
  for (const d of DAYS) {
    const b = parsed.byDow[d];
    if (!b.length) { dowNetRev[d] = 0; continue; }
    dowNetRev[d] = avg(b.map(x => x.foodRev + x.bevRev - x.discFood - x.discBev));
  }
  const maxNetRevDow = Object.keys(dowNetRev).reduce((a, b) => dowNetRev[a] > dowNetRev[b] ? a : b);

  state.bAnalysis = {
    ...sp,
    selectedItems,
    nights,
    effectiveFullPrice: effective ? Math.round(effective.effectiveFullPrice * 100) / 100 : sp.fp,
    isRange: effective ? effective.isRange : false,
    priceMin: effective ? effective.priceMin : sp.fp,
    priceMax: effective ? effective.priceMax : sp.fp,
    unitsPerNight: Math.round(unitsPerNight),
    avgTx: Math.round(avgTx),
    avgFoodTx: Math.round(avgFoodTx),
    avgMains: Math.round(avgMains),
    avgFoodRev: Math.round(avgFoodRev),
    avgBevRev: Math.round(avgBevRev),
    netRev: Math.round(netRev),
    totalDisc: Math.round(totalDisc),
    avgDiscFood: Math.round(avgDiscFood),
    avgDiscBev: Math.round(avgDiscBev),
    takeUp,
    discPct,
    spendPerTx: Math.round(spendPerTx),
    bevPerTx: Math.round(bevPerTx),
    discPerTx: Math.round(discPerTx),
    isBevLed,
    weeklyTrend,
    foodCostEstimated: Math.round(sp.sp * 0.3),  // 30% food cost default
  };
  state.bAnalysis.verdict = computeVerdict(state.bAnalysis, maxNetRevDow, dowNetRev);
  // Recommended branch
  state.bRecommendedBranch = suggestBranch(state.bAnalysis.verdict.key, state.bAnalysis);

  // Default bev/tx for projections
  state.bGlobals.bevPerTx = state.bAnalysis.bevPerTx;
  // Default new price for scenarios = current sp
  state.bScenarios.forEach(s => s.newPrice = sp.sp);
  // Initialise the slider-driven recommended scenario to current price
  state.bRecommended.newPrice = sp.sp;

  state.screen = 'path-b-analysis';
  render();
}

// ── Suggest branch from verdict ────────────────────────────────────
function suggestBranch(verdictKey, a) {
  if (verdictKey === 'dominant') return 'TWEAK';
  if (verdictKey === 'star')     return 'KEEP';
  if (verdictKey === 'working')  return 'KEEP';
  if (verdictKey === 'efficient') return 'KEEP';
  if (verdictKey === 'weak')     return 'REPLACE';
  return 'TWEAK';
}

// ── Build 12-week trend (or however many weeks available) ──────────
// Returns array of { weekStart, weekEnd, transactions, foodTx, mains, specialUnits, takeUp, partial }
function buildWeeklyTrend(dayBuckets, selectedItems) {
  if (!dayBuckets.length) return [];
  const mainGroups = state.mainGroups;
  // Group dayBuckets by ISO week (Monday-start)
  const weeks = new Map();
  for (const b of dayBuckets) {
    // Get Monday of the week containing b.date
    const d = new Date(b.date);
    const dayIdx = (d.getDay() + 6) % 7; // 0 = Monday
    const mon = new Date(d);
    mon.setDate(d.getDate() - dayIdx);
    const wk = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;

    let specialQty = 0;
    for (const itemName of selectedItems) {
      const it = b.items.get(itemName);
      if (it) specialQty += it.qty;
    }
    // Count main dishes this night (sum qty across confirmed main groups)
    let mainsQty = 0;
    if (b.groupQty && mainGroups && mainGroups.size) {
      for (const g of mainGroups) mainsQty += b.groupQty.get(g) || 0;
    } else {
      mainsQty = b.foodTx;  // fallback
    }
    weeks.set(wk, {
      weekStart: new Date(mon),
      transactions: b.transactions,
      foodTx: b.foodTx,
      mains: mainsQty,
      specialUnits: specialQty,
    });
  }

  // Sort and compute take-up + partial flag
  const sorted = Array.from(weeks.values()).sort((a, b) => a.weekStart - b.weekStart);
  // Calculate median mains to detect partial weeks
  const median = sorted.map(s => s.mains).sort((a,b)=>a-b)[Math.floor(sorted.length/2)] || 0;
  for (const w of sorted) {
    // Take-up = special units / main dishes (capped at 100% since special is a subset of mains)
    w.takeUp = w.mains > 0 ? Math.min(w.specialUnits / w.mains, 1) : 0;
    w.partial = median > 0 && w.mains < median * 0.25;
  }
  return sorted;
}

// ── Draw combo chart SVG ───────────────────────────────────────────
function drawComboChart() {
  const a = state.bAnalysis;
  const svg = document.getElementById('combo-svg');
  if (!svg) return;
  const trend = a.weeklyTrend;
  if (!trend.length) { svg.innerHTML = '<text x="390" y="140" text-anchor="middle" fill="#94A3B8" font-size="13">No data</text>'; return; }

  const W = 780, H = 280;
  const padL = 50, padR = 50, padT = 20, padB = 40;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const colW = innerW / trend.length;
  const barW = colW * 0.65;
  const maxFoodTx = Math.max(...trend.map(w => w.mains), 1);
  // Round up the max for nicer axis
  const yMax = Math.ceil(maxFoodTx / 50) * 50;

  // SVG groups
  const elts = [];
  const color = DAY_COLORS[a.day] || '#4A8BC4';

  // Y-axis grid lines (5 lines, 0/25/50/75/100%)
  for (let i = 0; i <= 5; i++) {
    const y = padT + (innerH * i / 5);
    const val = Math.round(yMax * (5 - i) / 5);
    elts.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#E2E8F0" stroke-width="1"/>`);
    elts.push(`<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#94A3B8" font-size="10">${val}</text>`);
    // Right axis (take-up %)
    const pct = (5 - i) * 20;
    elts.push(`<text x="${W - padR + 8}" y="${y + 4}" text-anchor="start" fill="#94A3B8" font-size="10">${pct}%</text>`);
  }

  // Y-axis labels (rotated)
  elts.push(`<text x="14" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(-90, 14, ${padT + innerH / 2})">Main dishes</text>`);
  elts.push(`<text x="${W - 14}" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(90, ${W - 14}, ${padT + innerH / 2})">Take-up rate (%)</text>`);

  // Patterns for partial weeks
  elts.push(`<defs><pattern id="partialPat" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><rect width="6" height="6" fill="${color}" opacity="0.18"/><line x1="0" y1="0" x2="0" y2="6" stroke="${color}" stroke-width="2" opacity="0.55"/></pattern></defs>`);

  // Bars
  trend.forEach((w, i) => {
    const x = padL + i * colW + (colW - barW) / 2;
    const foodH = (w.mains / yMax) * innerH;
    const foodY = padT + innerH - foodH;
    const specialH = (w.specialUnits / yMax) * innerH;
    const specialY = padT + innerH - specialH;

    // Total tx column (light)
    const colFill = w.partial ? 'url(#partialPat)' : color;
    const colOpacity = w.partial ? 1 : 0.22;
    elts.push(`<rect x="${x}" y="${foodY}" width="${barW}" height="${foodH}" fill="${colFill}" opacity="${colOpacity}" rx="2"/>`);
    // Special units (darker, overlaid)
    if (specialH > 0 && !w.partial) {
      elts.push(`<rect x="${x}" y="${specialY}" width="${barW}" height="${specialH}" fill="${color}" rx="2"/>`);
    }
    // X-axis label (week start date)
    const lbl = `${w.weekStart.getDate()}/${w.weekStart.getMonth()+1}`;
    elts.push(`<text x="${x + barW/2}" y="${H - padB + 14}" text-anchor="middle" fill="#94A3B8" font-size="10">${lbl}</text>`);
  });

  // Line for take-up %
  const linePoints = trend.map((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    return `${x},${y}`;
  }).join(' ');
  elts.push(`<polyline points="${linePoints}" fill="none" stroke="#0B1F3A" stroke-width="2"/>`);
  // Line dots
  trend.forEach((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    elts.push(`<circle cx="${x}" cy="${y}" r="3.5" fill="#0B1F3A" stroke="#fff" stroke-width="1.5"/>`);
  });

  svg.innerHTML = elts.join('');

  // Render readout cells below: trend direction over period
  const readoutEl = document.getElementById('combo-readout');
  if (readoutEl && trend.length >= 2) {
    const firstNonPartial = trend.find(w => !w.partial);
    const lastNonPartial = trend.slice().reverse().find(w => !w.partial);
    if (firstNonPartial && lastNonPartial && firstNonPartial !== lastNonPartial) {
      const txChange = ((lastNonPartial.foodTx - firstNonPartial.foodTx) / Math.max(firstNonPartial.foodTx, 1)) * 100;
      const unitChange = ((lastNonPartial.specialUnits - firstNonPartial.specialUnits) / Math.max(firstNonPartial.specialUnits, 1)) * 100;
      const takeUpChange = (lastNonPartial.takeUp - firstNonPartial.takeUp) * 100;
      const trendClass = v => v > 5 ? 'up' : v < -5 ? 'down' : '';
      const trendSym = v => v > 5 ? '↑' : v < -5 ? '↓' : '→';
      readoutEl.innerHTML = `
        <div class="combo-readout-item">
          <div class="combo-readout-label">Food tx trend</div>
          <div class="combo-readout-val ${trendClass(txChange)}">${trendSym(txChange)} ${txChange > 0 ? '+' : ''}${txChange.toFixed(0)}%</div>
        </div>
        <div class="combo-readout-item">
          <div class="combo-readout-label">Special units trend</div>
          <div class="combo-readout-val ${trendClass(unitChange)}">${trendSym(unitChange)} ${unitChange > 0 ? '+' : ''}${unitChange.toFixed(0)}%</div>
        </div>
        <div class="combo-readout-item">
          <div class="combo-readout-label">Take-up rate trend</div>
          <div class="combo-readout-val ${trendClass(takeUpChange)}">${trendSym(takeUpChange)} ${takeUpChange > 0 ? '+' : ''}${takeUpChange.toFixed(1)}pp</div>
        </div>`;
    }
  }
}

// ── AI Research integration ────────────────────────────────────────
const BAKED_API_KEY = '__ANTHROPIC_API_KEY__';
let API_KEY = null;

function getApiKey() {
  if (BAKED_API_KEY && !BAKED_API_KEY.startsWith('__') && BAKED_API_KEY.startsWith('sk-ant-')) {
    return BAKED_API_KEY;
  }
  if (API_KEY) return API_KEY;
  const stored = localStorage.getItem('kg_anthropic_key');
  if (stored) { API_KEY = stored; return API_KEY; }
  return null;
}

function setAiStage(idx) {
  const steps = document.querySelectorAll('#ai-stages .ai-stage');
  steps.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    else if (i === idx) el.classList.add('active');
  });
}

async function triggerAIResearch() {
  if (state.bAiData) { setTimeout(() => { state.screen = 'path-b-review'; render(); }, 300); return; }
  let key = getApiKey();
  if (!key) {
    const entered = prompt('Enter your Anthropic API key (starts with sk-ant-). Stored locally in your browser only.\n\nNote: in the production version this is baked in at deploy time.');
    if (!entered) {
      const errEl = document.getElementById('ai-error');
      if (errEl) {
        errEl.classList.add('visible');
        errEl.innerHTML = 'API key needed. <a href="#" style="color:var(--brand-blue);" onclick="state.bAiData=null; state.screen=\'path-b-branch\'; render(); return false;">Go back</a>';
      }
      return;
    }
    API_KEY = entered.trim();
    localStorage.setItem('kg_anthropic_key', API_KEY);
    key = API_KEY;
  }
  // Mark this operation so the back button can cancel it
  const myId = ++state.bInflightId;
  // Cycle the visual stages while the API call is running
  let stage = 0;
  const stagesTimer = setInterval(() => {
    stage = Math.min(stage + 1, 2);
    setAiStage(stage);
  }, 10000);
  // Rate-limit countdown callback
  const onWaitUpdate = (remaining, attempt) => {
    clearInterval(stagesTimer);  // pause stage cycling during the wait
    const subEl = document.querySelector('#ai-loading-sub') || document.querySelector('.ai-loading-sub');
    if (subEl) {
      subEl.innerHTML = `<strong style="color:#a96e1c;">Rate limit hit.</strong> Retrying in ${remaining}s (attempt ${attempt}). The Anthropic API limits requests-per-minute on your workspace tier.`;
    }
  };
  try {
    const result = await callAIResearch(key, onWaitUpdate);
    clearInterval(stagesTimer);
    // If user clicked Back during the request, abort the navigation
    if (myId !== state.bInflightId) return;
    state.bAiData = result;
    setAiStage(3);
    setTimeout(() => { state.screen = 'path-b-review'; render(); }, 500);
  } catch (e) {
    clearInterval(stagesTimer);
    // If cancelled, swallow silently
    if (myId !== state.bInflightId) return;
    console.error(e);
    const errEl = document.getElementById('ai-error');
    if (errEl) {
      errEl.classList.add('visible');
      errEl.innerHTML = `Research failed: ${escHtml(e.message)}<br><br>
        <button class="btn btn-ghost" onclick="state.bAiData=null; render();" style="margin-right:8px;">Try again</button>
        <button class="btn btn-ghost" onclick="API_KEY=null; localStorage.removeItem('kg_anthropic_key'); state.bAiData=null; render();">Reset API key</button>`;
    }
  }
}

  const body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 4000,
    system: sys,
    messages: [{ role: 'user', content: userPrompt }],
    tools: [{ type: 'web_search_20250305', name: 'web_search' }],
  };

  const data = await callAnthropicWithRetry(apiKey, body, { onWaitUpdate });
  const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();
  let cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace >= 0 && lastBrace > firstBrace) cleaned = cleaned.slice(firstBrace, lastBrace + 1);
  try { return JSON.parse(cleaned); }
  catch (e) { console.error('Failed to parse AI response:', text); throw new Error('AI response was not valid JSON. Try again.'); }
}

// Insert a suggestion into the textarea (replace if empty, append otherwise)
function useTweakSuggestion(idx) {
  // Look up the suggestion from state by index. This is more robust than
  // interpolating the strings into the onclick attribute (which breaks on
  // quotes, $, parens, etc. that the AI commonly outputs).
  if (!Array.isArray(state.bTweakSuggestions)) return;
  const s = state.bTweakSuggestions[idx];
  if (!s) return;
  const ta = document.getElementById('tweak-desc');
  if (!ta) return;
  // Always replace the textarea content with the clicked suggestion.
  // The MM can then edit it freely. If they want to combine ideas, they can
  // type the additions themselves.
  ta.value = `${s.title}. ${s.rationale}`;
  ta.focus();
  // Move cursor to end so MM can keep typing without re-clicking
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

// Trigger the AI call to generate tweak suggestions. Cached in state.bTweakSuggestions.
// State values: null = not yet started, 'loading' = in flight, 'error' = failed, array = success
async function triggerTweakSuggestions() {
  if (state.bTweakSuggestions !== null) return;  // already loading, errored, or loaded
  state.bTweakSuggestions = 'loading';
  const myId = ++state.bInflightId;
  try {
    const suggestions = await generateTweakSuggestions();
    if (myId !== state.bInflightId) {
      // Cancelled - reset so user can retry next time
      if (state.bTweakSuggestions === 'loading') state.bTweakSuggestions = null;
      return;
    }
    state.bTweakSuggestions = suggestions;
    if (state.screen === 'path-b-tweak') render();
  } catch (e) {
    if (myId !== state.bInflightId) {
      if (state.bTweakSuggestions === 'loading') state.bTweakSuggestions = null;
      return;
    }
    console.error('Tweak suggestions failed:', e);
    state.bTweakSuggestions = 'error';
    if (state.screen === 'path-b-tweak') render();
  }
}

function confirmTweak() {
  const description = document.getElementById('tweak-desc').value.trim();
  if (!description || description.length < 20) {

    return;

// ── Scenario projection math (attributable-revenue model) ──────────
// Compares the SPECIAL's own attributable revenue before vs after the change -
// like-for-like. This fixes the old bug where a single drilled-in item's projected
// revenue was compared against the WHOLE night's net revenue (apples vs oranges).
//
// Attributable revenue = what THIS special brings in:
//   - Food: special units × special price (actual $ taken; discount is implicit in the price)
//   - Bev:  special units × bev-per-unit, where bev-per-unit = avgBevRev / avgMains
//           (weekday 1:1 assumption — each main dish drags along an equal share of bev).
//           Plus an optional advanced "bev attach uplift" for bundle/upsell tweaks.
// No separate discount line: revenue (not profit) is measured, and the discount is already
// reflected by using the special PRICE rather than the RRP.
function projectScenario(s, a, g, isReplace, altPrice) {
  const baseMains = a.avgMains || a.avgFoodTx || 0;
  const currentUnits = a.unitsPerNight || 0;

  // Bev per special unit (1:1 weekday scaling): the special's share of bev tracks its
  // share of mains, so per unit that's simply total bev / total mains.
  const bevPerUnit = baseMains > 0 ? (a.avgBevRev || 0) / baseMains : 0;
  // Advanced: extra bev $ per special unit from a bundle/upsell (e.g. +$5 beer with each F&C)
  const attachUplift = (g && g.bevAttachUplift) || 0;

  // Current (baseline) attributable revenue/night — fixed reference point
  const curFood = currentUnits * a.sp;
  const curBev = currentUnits * bevPerUnit;
  const curAttribRev = curFood + curBev;

  // Projected
  const newMains = baseMains * (1 + s.txChange / 100);
  const newUnits = newMains * (s.takeUp / 100);
  const price = (s.newPrice && s.newPrice > 0) ? s.newPrice : (isReplace ? altPrice : a.sp);
  const projFood = newUnits * price;
  const projBev = newUnits * (bevPerUnit + attachUplift);
  const projAttribRev = projFood + projBev;

  const deltaAbs = projAttribRev - curAttribRev;
  const deltaPct = curAttribRev > 0 ? (deltaAbs / curAttribRev) * 100 : 0;

  return {
    unitsPerNight: newUnits,
    mains: newMains,
    foodRev: projFood,
    bevRev: projBev,
    attribRev: projAttribRev,
    curAttribRev,
    bevPerUnit,
    deltaAbs,
    deltaPct,
  };
}

async function generateReport() {
  const myId = ++state.bInflightId;
  try {
    // 1. Get exec summary + action items from AI (if not already cached)
    if (!state.bExecSummary || !state.bActionItems) {
      setGenStage(0);

// ── Shared API call helper with retry-on-429 ──────────────────────
// If we hit a rate limit (429), wait the suggested time and retry once.
// Reports progress to the user via the optional onWaitUpdate callback.
async function callAnthropicWithRetry(apiKey, body, options = {}) {
  const { maxRetries = 2, onWaitUpdate = null } = options;
  let attempt = 0;
  while (true) {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(body),
    });

    if (resp.ok) return await resp.json();

    if (resp.status === 429 && attempt < maxRetries) {
      // Get retry-after if provided, otherwise default to 60s (the per-minute window)
      const retryAfter = parseInt(resp.headers.get('retry-after') || '60', 10);
      const waitMs = Math.max(retryAfter * 1000, 30000);  // at least 30s
      attempt++;
      // Inform user
      if (onWaitUpdate) onWaitUpdate(retryAfter, attempt);
      // Countdown
      let remaining = retryAfter;
      const countdown = setInterval(() => {
        remaining--;
        if (onWaitUpdate) onWaitUpdate(remaining, attempt);
      }, 1000);
      await new Promise(r => setTimeout(r, waitMs));
      clearInterval(countdown);
      continue;
    }

    // Non-retryable error
    const txt = await resp.text();
    if (resp.status === 429) {
      throw new Error(`Rate limit hit and retries exhausted. Wait a minute then try again, or contact Anthropic to raise your workspace's tokens-per-minute limit.`);
    }
    throw new Error(`API ${resp.status}: ${txt.slice(0, 200)}`);
  }
}

        <div class="rep-readout-cell">
          <div class="rep-readout-label">Take-up rate trend</div>
          <div class="rep-readout-val" style="color:${trendCol(takeUpChange)};">${trendSym(takeUpChange)} ${takeUpChange > 0 ? '+' : ''}${takeUpChange.toFixed(1)}pp</div>
        </div>
      </div>`;
    }
  }

  // Competitor table rows (verified + own venue as last row)
  const compRows = verifiedComps.map(c => `
    <tr>
      <td>${escHtml(c.venue || '')}</td>
      <td>${escHtml(c.offer || '')}</td>
      <td style="font-size:11px; color:#94A3B8;">${c.source ? (c.source.startsWith('http') ? `<a href="${escHtml(c.source)}" style="color:#4A8BC4; text-decoration:none;">${escHtml(new URL(c.source).hostname.replace('www.',''))}</a>` : escHtml(c.source)) : ''}</td>
    </tr>`).join('');
  const parentForOwnRow = state.bParentOffer;
  const isMultiItemForOwnRow = parentForOwnRow && parentForOwnRow.items && parentForOwnRow.items.length > 1;
  const ownRow = `
    <tr style="background:#F5F7FA; font-weight:600;">
      <td>${escHtml(v.name)} (this venue)</td>
      <td>${a.day} ${isMultiItemForOwnRow ? `<strong>${escHtml(parentForOwnRow.name)}</strong> at $${parentForOwnRow.sp} - ${parentForOwnRow.items.length} items inc. ${escHtml(a.name)} (RRP $${a.fp})` : `${escHtml(a.name)} at $${a.sp}${a.isRange ? ` (range $${Math.round(a.priceMin)}-$${Math.round(a.priceMax)} RRP)` : ` (RRP $${a.fp})`}`}</td>
      <td style="font-size:11px; color:#94A3B8;">${a.discPct}% off · ${a.unitsPerNight} units/${a.day.toLowerCase()}</td>
    </tr>`;

  // Supply context list
  const supplyList = (ai.supplyContext || []).map(c => `
    <li>
      <div style="font-size:13px; font-weight:600; color:#0B1F3A; margin-bottom:3px;">${escHtml(c.point || '')}</div>
      <div style="font-size:12.5px; color:#334155;">${escHtml(c.detail || '')}</div>
      ${c.source ? `<div style="font-size:11px; color:#94A3B8; margin-top:3px;">${c.source.startsWith('http') ? `<a href="${escHtml(c.source)}" style="color:#4A8BC4; text-decoration:none;">${escHtml(c.source)}</a>` : escHtml(c.source)}</div>` : ''}
    </li>`).join('');

  // Proposed action section - branch-specific
  let actionSection = '';
  if (branch === 'KEEP') {
    actionSection = `
      <p>The data supports keeping ${escHtml(a.name)} in its current form. With ${fmtN(a.unitsPerNight)} units sold per ${a.day.toLowerCase()} at ${fmtPct(a.takeUp * 100)} take-up of food-bearing transactions, the special is the reason guests are choosing this venue on ${a.day}s. Food revenue (${fmtD(a.avgFoodRev)}/${a.day.toLowerCase()}) ${a.isBevLed ? 'sits behind' : 'leads'} beverage revenue (${fmtD(a.avgBevRev)}), and ${fmtD(a.totalDisc)} discount cost is justified by the trade it generates.</p>
      <p><strong>Action:</strong> Maintain the current price point and item. Monitor monthly for any erosion in take-up rate or units sold.</p>`;
  } else if (branch === 'TWEAK') {
    const tweakDesc = (state.bTweak.description || '').trim();
    const priceMove = recScenario.newPrice - a.sp;
    // Convert any double newlines to paragraph breaks for nicer rendering
    const tweakParas = tweakDesc
      ? tweakDesc.split(/\n\n+/).filter(p => p.trim()).map(p => `<p>${escHtml(p.trim()).replace(/\n/g, '<br>')}</p>`).join('')
      : `<p>${escHtml(a.name)} is broadly working but has room to optimise.</p>`;
    // If there's a meaningful price change in the recommended scenario, append the math
    const priceMath = priceMove !== 0 && a.unitsPerNight > 0
      ? `<p><strong>Projected impact at current volume:</strong> ${priceMove > 0 ? 'A' : 'A'} ${fmtD(Math.abs(priceMove))} ${priceMove > 0 ? 'increase' : 'reduction'} from ${fmtD(a.sp)} to ${fmtD(recScenario.newPrice)} ${priceMove > 0 ? 'recovers' : 'gives back'} approximately ${fmtD(Math.abs(priceMove) * a.unitsPerNight)} per ${a.day.toLowerCase()} (${fmtD(Math.abs(priceMove) * a.unitsPerNight * a.nights * 4)} annualised) at the current run rate of ${fmtN(a.unitsPerNight)} units/${a.day.toLowerCase()}, before factoring in any volume change.</p>`
      : '';
    actionSection = `
      ${tweakParas}
      ${priceMath}
      ${notes ? `<p><strong>Operational context:</strong> ${escHtml(notes)}</p>` : ''}`;
  } else if (branch === 'REPLACE' && alt.name) {
    actionSection = `
      <p><strong>Proposed replacement: ${escHtml(alt.name)} at ${fmtD(alt.price)}.</strong></p>
      <p>${escHtml(alt.rationale)}</p>
      ${notes ? `<p><strong>Operational context:</strong> ${escHtml(notes)}</p>` : ''}`;
  } else if (branch === 'KILL') {
    actionSection = `
      <p>The recommendation is to drop the food special on ${a.day}s entirely. ${a.isBevLed ? `Beverage revenue (${fmtD(a.avgBevRev)}) already exceeds food (${fmtD(a.avgFoodRev)}), suggesting guests are coming for drinks regardless of the food offer.` : ''} ${fmtD(a.totalDisc)} discount cost per ${a.day.toLowerCase()} can be reallocated elsewhere or banked.</p>
      ${notes ? `<p><strong>Operational context:</strong> ${escHtml(notes)}</p>` : ''}`;
  }

  // Scenarios table - shows the 4 stock reference scenarios PLUS the MM's
  // recommended plan as a highlighted row at the top. The MM's plan may match
  // one of the stock scenarios closely, but the slider lets them set their own
  // numbers, so the recommended row is always shown separately.
  const isReplace = branch === 'REPLACE';
  const altPrice = isReplace ? alt.price : a.sp;
  const recProj = projectScenario(state.bRecommended, a, state.bGlobals, isReplace, altPrice);
  const recDeltaCol = recProj.deltaAbs >= 0 ? '#1f6f3e' : '#7a2a2a';
  const recRow = `
    <tr style="background:#e0ecf7;">
      <td><strong>★ Recommended plan</strong></td>
      <td>${state.bRecommended.txChange >= 0 ? '+' : ''}${state.bRecommended.txChange}%</td>
      <td>${state.bRecommended.takeUp}%</td>
      <td>${fmtD(state.bRecommended.newPrice)}</td>
      <td>${fmtN(recProj.unitsPerNight)}</td>
      <td>${fmtD(recProj.foodRev)}</td>
      <td>${fmtD(recProj.bevRev)}</td>
      <td><strong>${fmtD(recProj.attribRev)}</strong></td>
      <td style="color:${recDeltaCol}; font-weight:600;">${recProj.deltaAbs >= 0 ? '+' : ''}${fmtD(recProj.deltaAbs)}</td>
    </tr>`;
  const scenarioRows = recRow + state.bScenarios.map(s => {
    const p = projectScenario(s, a, state.bGlobals, isReplace, altPrice);
    const deltaCol = p.deltaAbs >= 0 ? '#1f6f3e' : '#7a2a2a';
    return `
    <tr>
      <td style="color:#666;">${escHtml(s.name)}</td>
      <td>${s.txChange >= 0 ? '+' : ''}${s.txChange}%</td>
      <td>${s.takeUp}%</td>
      <td>${fmtD(s.newPrice)}</td>
      <td>${fmtN(p.unitsPerNight)}</td>
      <td>${fmtD(p.foodRev)}</td>
      <td>${fmtD(p.bevRev)}</td>
      <td><strong>${fmtD(p.attribRev)}</strong></td>
      <td style="color:${deltaCol}; font-weight:600;">${p.deltaAbs >= 0 ? '+' : ''}${fmtD(p.deltaAbs)}</td>
    </tr>`;
  }).join('');

  // Build the full HTML
  return `<!DOCTYPE html>

<style>

}

  max-width: 920px;

}

}

  font-size: 11px; font-weight: 600;
