  // Compute projected impact from recommended scenario
  const proj = projectScenario(recScenario, a, state.bGlobals, branch === 'REPLACE', alt.price || a.sp);

  // Trend signals
  const trend = a.weeklyTrend || [];
  let trendSignal = 'flat';
  if (trend.length >= 4) {
    const first = trend.filter(w => !w.partial).slice(0, Math.ceil(trend.length / 3));
    const last = trend.filter(w => !w.partial).slice(-Math.ceil(trend.length / 3));
    if (first.length && last.length) {
      const firstAvg = first.reduce((s, w) => s + w.takeUp, 0) / first.length;
      const lastAvg = last.reduce((s, w) => s + w.takeUp, 0) / last.length;
      const delta = lastAvg - firstAvg;
      if (delta > 0.05) trendSignal = 'rising';
      else if (delta < -0.05) trendSignal = 'falling';

TASKS:

  }
  const data = await resp.json();
  const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();
  let cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace >= 0 && lastBrace > firstBrace) cleaned = cleaned.slice(firstBrace, lastBrace + 1);
  try { return JSON.parse(cleaned); }
  catch (e) {
    console.error('Failed to parse exec summary response:', text);
    throw new Error('AI response was not valid JSON. Try again.');
  }
}

function buildReportHTML() {
  const v = state.venue;
  const a = state.bAnalysis;
  const branch = state.bBranch;
  const ai = state.bAiData || { competitors: [], supplyContext: [] };
  const alt = state.bAlternative;
  const notes = state.bNotes;
  const recScenario = state.bScenarios.find(s => s.recommended) || state.bScenarios[1];
  const verifiedComps = (ai.competitors || []).filter((_, i) => state.bVerified[`comp-${i}`]);
  const proj = projectScenario(recScenario, a, state.bGlobals, branch === 'REPLACE', alt.price || a.sp);
  const today = new Date();
  const reportDate = `${today.getDate()} ${['January','February','March','April','May','June','July','August','September','October','November','December'][today.getMonth()]} ${today.getFullYear()}`;
  const range = state.parsedData.dateRange;
  const fmtDate = d => d ? `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}` : '?';
  const dateRangeStr = `${fmtDate(range.start)} to ${fmtDate(range.end)}`;
  const dayColor = DAY_COLORS[a.day] || '#4A8BC4';

  // Embed combo chart as SVG (regenerate it directly into the report HTML)
  const comboSvg = buildComboChartSVG(a, dayColor);

  // Executive summary paragraphs
  const execParas = (state.bExecSummary || '').split(/\n\n+/).filter(p => p.trim()).map(p => `<p>${escHtml(p.trim())}</p>`).join('\n');

  // Action items
  const actionItems = (state.bActionItems || []).map(i => `<li>${escHtml(i)}</li>`).join('\n');

  // Trend signals for the diagnostic readout
  const trend = a.weeklyTrend || [];
  let trendReadout = '';
  if (trend.length >= 2) {
    const firstNonPartial = trend.find(w => !w.partial);
    const lastNonPartial = trend.slice().reverse().find(w => !w.partial);
    if (firstNonPartial && lastNonPartial && firstNonPartial !== lastNonPartial) {
      const txChange = ((lastNonPartial.foodTx - firstNonPartial.foodTx) / Math.max(firstNonPartial.foodTx, 1)) * 100;
      const unitChange = ((lastNonPartial.specialUnits - firstNonPartial.specialUnits) / Math.max(firstNonPartial.specialUnits, 1)) * 100;
      const takeUpChange = (lastNonPartial.takeUp - firstNonPartial.takeUp) * 100;
      const trendSym = v => v > 5 ? '↑' : v < -5 ? '↓' : '→';
      const trendCol = v => v > 5 ? '#1f6f3e' : v < -5 ? '#7a2a2a' : '#334155';
      trendReadout = `
      <div class="rep-readout">
        <div class="rep-readout-cell">
          <div class="rep-readout-label">Food tx trend</div>
          <div class="rep-readout-val" style="color:${trendCol(txChange)};">${trendSym(txChange)} ${txChange > 0 ? '+' : ''}${txChange.toFixed(0)}%</div>
        </div>
        <div class="rep-readout-cell">
          <div class="rep-readout-label">Special units trend</div>
          <div class="rep-readout-val" style="color:${trendCol(unitChange)};">${trendSym(unitChange)} ${unitChange > 0 ? '+' : ''}${unitChange.toFixed(0)}%</div>
        </div>
        <div class="rep-readout-cell">
          <div class="rep-readout-label">Take-up rate trend</div>
          <div class="rep-readout-val" style="color:${trendCol(takeUpChange)};">${trendSym(takeUpChange)} ${takeUpChange > 0 ? '+' : ''}${takeUpChange.toFixed(1)}pp</div>
        </div>
      </div>`;
    }
  }

  // Competitor table rows (verified + own venue as last row)
  const compRows = verifiedComps.map(c => `
    <tr>
      <td>${escHtml(c.venue || '')}</td>
      <td>${escHtml(c.offer || '')}</td>
      <td style="font-size:11px; color:#94A3B8;">${c.source ? (c.source.startsWith('http') ? `<a href="${escHtml(c.source)}" style="color:#4A8BC4; text-decoration:none;">${escHtml(new URL(c.source).hostname.replace('www.',''))}</a>` : escHtml(c.source)) : ''}</td>
    </tr>`).join('');
  const ownRow = `
    <tr style="background:#F5F7FA; font-weight:600;">
      <td>${escHtml(v.name)} (this venue)</td>
      <td>${a.day} ${escHtml(a.name)} at $${a.sp}${a.isRange ? ` (range $${Math.round(a.priceMin)}-$${Math.round(a.priceMax)} RRP)` : ` (RRP $${a.fp})`}</td>
      <td style="font-size:11px; color:#94A3B8;">${a.discPct}% off · ${a.unitsPerNight} units/${a.day.toLowerCase()}</td>
    </tr>`;

  // Supply context list
  const supplyList = (ai.supplyContext || []).map(c => `
    <li>
      <div style="font-size:13px; font-weight:600; color:#0B1F3A; margin-bottom:3px;">${escHtml(c.point || '')}</div>
      <div style="font-size:12.5px; color:#334155;">${escHtml(c.detail || '')}</div>

    </li>`).join('');

  // Proposed action section - branch-specific
  let actionSection = '';
  if (branch === 'KEEP') {
    actionSection = `
      <p>The data supports keeping ${escHtml(a.name)} in its current form. With ${fmtN(a.unitsPerNight)} units sold per ${a.day.toLowerCase()} at ${fmtPct(a.takeUp * 100)} take-up of food-bearing transactions, the special is the reason guests are choosing this venue on ${a.day}s. Food revenue (${fmtD(a.avgFoodRev)}/${a.day.toLowerCase()}) ${a.isBevLed ? 'sits behind' : 'leads'} beverage revenue (${fmtD(a.avgBevRev)}), and ${fmtD(a.totalDisc)} discount cost is justified by the trade it generates.</p>
      <p><strong>Action:</strong> Maintain the current price point and item. Monitor monthly for any erosion in take-up rate or units sold.</p>`;
  } else if (branch === 'TWEAK') {
    const priceMove = recScenario.newPrice - a.sp;
    actionSection = `
      <p>${escHtml(a.name)} is broadly working but has room to optimise. ${priceMove > 0 ? `A price adjustment from ${fmtD(a.sp)} to ${fmtD(recScenario.newPrice)} (a ${fmtD(priceMove)} increase) is the proposed tweak.` : priceMove < 0 ? `A price reduction from ${fmtD(a.sp)} to ${fmtD(recScenario.newPrice)} is the proposed tweak.` : 'The proposed tweak adjusts mechanics rather than price.'} ${priceMove > 0 ? `At current volume of ${fmtN(a.unitsPerNight)} units/${a.day.toLowerCase()}, this recovers approximately ${fmtD(priceMove * a.unitsPerNight)} per ${a.day.toLowerCase()} (${fmtD(priceMove * a.unitsPerNight * a.nights * 4)} annualised) before factoring in any volume change.` : ''}</p>

  // Scenarios table
  const isReplace = branch === 'REPLACE';
  const altPrice = isReplace ? alt.price : a.sp;
  const scenarioRows = state.bScenarios.map(s => {
    const p = projectScenario(s, a, state.bGlobals, isReplace, altPrice);
    const deltaCol = p.deltaPct >= 0 ? '#1f6f3e' : '#7a2a2a';
    return `
    <tr${s.recommended ? ' style="background:#e0ecf7;"' : ''}>
      <td>${s.recommended ? '★ ' : ''}${escHtml(s.name)}</td>
      <td>${s.txChange >= 0 ? '+' : ''}${s.txChange}%</td>
      <td>${s.takeUp}%</td>
      <td>${fmtD(s.newPrice)}</td>
      <td>${fmtN(p.unitsPerNight)}</td>
      <td>${fmtD(p.foodRev)}</td>
      <td>${fmtD(p.bevRev)}</td>
      <td><strong>${fmtD(p.netRev)}</strong></td>
      <td style="color:${deltaCol}; font-weight:600;">${p.deltaPct >= 0 ? '+' : ''}${p.deltaPct.toFixed(0)}%</td>
    </tr>`;
  }).join('');

  // Build the full HTML
  return `<!DOCTYPE html>

          </tr>
        </thead>
        <tbody>${scenarioRows}</tbody>
      </table>
      <p style="font-size:11.5px; color:#94A3B8; margin-top:0.8rem;">All figures per-${a.day.toLowerCase()}. Bev revenue scales with food transactions at ${fmtD(state.bGlobals.bevPerTx)}/tx (current run rate). Recommended scenario projects ${fmtD(proj.netRev)} net revenue per ${a.day.toLowerCase()} - a ${proj.deltaPct >= 0 ? '+' : ''}${proj.deltaPct.toFixed(0)}% change from current ${fmtD(a.netRev)}.</p>
    </div>

    <!-- ACTION ITEMS -->
    <div class="rep-section rep-actions">
      <h2><span class="rep-section-num">${(ai.supplyContext || []).length ? (verifiedComps.length ? 7 : 6) : (verifiedComps.length ? 6 : 5)}</span>Action Items</h2>
      <div class="rep-section-divider"></div>
      <ol>${actionItems}</ol>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="rep-footer">
    Generated ${reportDate} · Weekday Offer Review · Kickon Group<br>
    Data: Lightspeed Line Transactions export, ${dateRangeStr} · ${a.nights} ${a.day}s analysed
  </div>
</div>
</body>
</html>`;
}

// ── Build combo chart SVG for the standalone report ────────────────
function buildComboChartSVG(a, dayColor) {
  const trend = a.weeklyTrend || [];
  if (!trend.length) return '<svg viewBox="0 0 780 260"><text x="390" y="130" text-anchor="middle" fill="#94A3B8" font-size="13">No trend data</text></svg>';

  const W = 780, H = 260;
  const padL = 50, padR = 50, padT = 20, padB = 40;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const colW = innerW / trend.length;
  const barW = colW * 0.65;
  const maxFoodTx = Math.max(...trend.map(w => w.foodTx), 1);
  const yMax = Math.ceil(maxFoodTx / 50) * 50;

  const elts = [];
  for (let i = 0; i <= 5; i++) {
    const y = padT + (innerH * i / 5);
    const val = Math.round(yMax * (5 - i) / 5);
    elts.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#E2E8F0" stroke-width="1"/>`);
    elts.push(`<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#94A3B8" font-size="10">${val}</text>`);
    const pct = (5 - i) * 20;
    elts.push(`<text x="${W - padR + 8}" y="${y + 4}" text-anchor="start" fill="#94A3B8" font-size="10">${pct}%</text>`);
  }
  elts.push(`<text x="14" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(-90, 14, ${padT + innerH / 2})">Food-bearing tx</text>`);
  elts.push(`<text x="${W - 14}" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(90, ${W - 14}, ${padT + innerH / 2})">Take-up rate (%)</text>`);
  elts.push(`<defs><pattern id="repPartialPat" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><rect width="6" height="6" fill="${dayColor}" opacity="0.18"/><line x1="0" y1="0" x2="0" y2="6" stroke="${dayColor}" stroke-width="2" opacity="0.55"/></pattern></defs>`);

  trend.forEach((w, i) => {
    const x = padL + i * colW + (colW - barW) / 2;
    const foodH = (w.foodTx / yMax) * innerH;
    const foodY = padT + innerH - foodH;
    const specialH = (w.specialUnits / yMax) * innerH;
    const specialY = padT + innerH - specialH;
    const colFill = w.partial ? 'url(#repPartialPat)' : dayColor;
    const colOpacity = w.partial ? 1 : 0.22;
    elts.push(`<rect x="${x}" y="${foodY}" width="${barW}" height="${foodH}" fill="${colFill}" opacity="${colOpacity}" rx="2"/>`);
    if (specialH > 0 && !w.partial) {
      elts.push(`<rect x="${x}" y="${specialY}" width="${barW}" height="${specialH}" fill="${dayColor}" rx="2"/>`);
    }
    const lbl = `${w.weekStart.getDate()}/${w.weekStart.getMonth()+1}`;
    elts.push(`<text x="${x + barW/2}" y="${H - padB + 14}" text-anchor="middle" fill="#94A3B8" font-size="10">${lbl}</text>`);
  });
  const linePoints = trend.map((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    return `${x},${y}`;
  }).join(' ');
  elts.push(`<polyline points="${linePoints}" fill="none" stroke="#0B1F3A" stroke-width="2"/>`);
  trend.forEach((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    elts.push(`<circle cx="${x}" cy="${y}" r="3.5" fill="#0B1F3A" stroke="#fff" stroke-width="1.5"/>`);
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${elts.join('')}</svg>`;
}

// ── Download the standalone HTML report ────────────────────────────
function downloadBReport() {
  if (!state.bReportHTML) return;
  const v = state.venue;
  const a = state.bAnalysis;
  const safe = s => String(s||'').replace(/[^a-zA-Z0-9]+/g, '-').toLowerCase().replace(/^-+|-+$/g, '');
  const fname = `${safe(v.name)}-${safe(a.day)}-${safe(a.name)}-strategic-plan.html`;
  const blob = new Blob([state.bReportHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = fname;
  link.click();
  URL.revokeObjectURL(url);
}

// ── Init ───────────────────────────────────────────────────────────
render();
</script>
