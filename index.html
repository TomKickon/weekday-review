<body>
<div class="report">

  <!-- COVER -->
  <div class="rep-cover">
    <div class="rep-cover-eyebrow">Strategic Plan${(state.bParentOffer && state.bParentOffer.items && state.bParentOffer.items.length > 1) ? ` · Part of ${escHtml(state.bParentOffer.name)}` : ''}</div>
    <h1>${escHtml(a.day)} <span class="bold">${escHtml(a.name)}</span></h1>
    <div class="rep-cover-divider"></div>
    <div style="font-size:15px; color:rgba(255,255,255,0.85);">${escHtml(v.name)} - ${escHtml(v.area)}</div>
    ${(state.bParentOffer && state.bParentOffer.items && state.bParentOffer.items.length > 1) ? `
    <div style="margin-top:1rem; font-size:12.5px; color:rgba(255,255,255,0.75); line-height:1.6; max-width:680px;">
      <strong style="color:#fff;">${escHtml(state.bParentOffer.name)}</strong> is a multi-item ${escHtml(a.day)} offer at ${fmtD(state.bParentOffer.sp)} where guests choose one of ${state.bParentOffer.items.length} items:
      ${state.bParentOffer.items.map(it => `<span style="display:inline-block; margin-right:14px; ${it.name === a.name ? 'font-weight:600; color:#fff;' : ''}">${escHtml(it.name)} ${fmtD(it.fp)}${it.name === a.name ? ' (this analysis)' : ''}</span>`).join('')}
    </div>` : ''}
    <div class="rep-cover-meta">
      <div>
        <div class="rep-cover-meta-label">Data period</div>
        <div class="rep-cover-meta-val">${dateRangeStr}</div>
      </div>
      <div>
        <div class="rep-cover-meta-label">Verdict</div>
        <div class="rep-cover-meta-val">${a.verdict.label.replace(/[🏆⭐✓◐⚠?]/g, '').trim()}</div>
      </div>
      <div>
        <div class="rep-cover-meta-label">Recommendation</div>
        <div class="rep-cover-meta-val">${branch}</div>
      </div>
    </div>
  </div>

  <!-- HERO STATS -->
  <div class="rep-hero-stats">
    <div>
      <div class="rep-stat-label">Units/${a.day.toLowerCase()}</div>
      <div class="rep-stat-val">${fmtN(a.unitsPerNight)}</div>
      <div class="rep-stat-sub">of the special sold</div>
    </div>
    <div>
      <div class="rep-stat-label">Take-up rate</div>
      <div class="rep-stat-val">${fmtPct(a.takeUp * 100)}</div>
      <div class="rep-stat-sub">of ${fmtN(a.avgFoodTx)} food tx</div>
    </div>
    <div>
      <div class="rep-stat-label">Net rev/${a.day.toLowerCase()}</div>
      <div class="rep-stat-val">${fmtD(a.netRev)}</div>
      <div class="rep-stat-sub">across ${a.nights} ${a.day.toLowerCase()}s</div>
    </div>
    <div>
      <div class="rep-stat-label">Discount cost</div>
      <div class="rep-stat-val">${fmtD(a.totalDisc)}</div>
      <div class="rep-stat-sub">per ${a.day.toLowerCase()}</div>
    </div>
  </div>

  <div class="rep-body">

    <!-- 1. EXECUTIVE SUMMARY -->
    <div class="rep-section">
      <h2><span class="rep-section-num">1</span>Executive Summary</h2>
      <div class="rep-section-divider"></div>
      ${execParas}
    </div>

    <!-- 2. CURRENT PERFORMANCE & TREND -->
    <div class="rep-section">
      <h2><span class="rep-section-num">2</span>Current Performance</h2>
      <div class="rep-section-divider"></div>
      ${(state.bParentOffer && state.bParentOffer.items && state.bParentOffer.items.length > 1) ? `
      <p style="background:var(--off-white); border-left:3px solid ${dayColor}; padding:10px 14px; font-size:12.5px; color:#334155; margin-bottom:1.1rem;">
        <strong>Context:</strong> ${escHtml(a.name)} is one of ${state.bParentOffer.items.length} options in the <strong>${escHtml(state.bParentOffer.name)}</strong> offer (${fmtD(state.bParentOffer.sp)} on ${a.day}s, guests choose one). The figures below reflect this item's portion of the offer only. Take-up rate is this item's share of all main dishes ordered on a typical ${a.day}.
      </p>
      ` : ''}
      <p>${a.day} ${escHtml(a.name)} sells <strong>${fmtN(a.unitsPerNight)} units per ${a.day.toLowerCase()}</strong> on average against ${fmtN(a.avgMains || a.avgFoodTx)} main dishes ordered - a <strong>${fmtPct(a.takeUp * 100)} take-up rate</strong>. The special is priced at ${fmtD(a.sp)} against ${a.isRange ? `a range of ${fmtD(a.priceMin)}-${fmtD(a.priceMax)} (avg ${fmtD(a.effectiveFullPrice)})` : `an RRP of ${fmtD(a.fp)}`}, giving a <strong>${a.discPct}% discount depth</strong>.</p>
      <p>Food revenue averages ${fmtD(a.avgFoodRev)} per ${a.day.toLowerCase()} against beverage at ${fmtD(a.avgBevRev)}, making this a <strong>${a.isBevLed ? 'beverage-led' : 'food-led'} night</strong>. Discount cost runs at ${fmtD(a.totalDisc)} per ${a.day.toLowerCase()} (${fmtD(a.discPerTx)}/tx), and net revenue averages ${fmtD(a.netRev)}.</p>

      <div class="rep-chart">
        <h3>${a.day} Trend · ${trend.length} weeks</h3>
        <div class="rep-chart-sub">Each column is one ${a.day} - height shows food-bearing transactions, filled portion shows units of the special. Line shows take-up rate.</div>
        ${comboSvg}
        <div class="rep-chart-legend">
          <div class="rep-legend-item"><span class="rep-legend-swatch" style="background:${dayColor}; opacity:0.25;"></span>Main dishes sold</div>
          <div class="rep-legend-item"><span class="rep-legend-swatch" style="background:${dayColor};"></span>Special units sold</div>
          <div class="rep-legend-item"><span class="rep-legend-line" style="background:#0B1F3A;"></span>Take-up rate (%)</div>
        </div>
        ${trendReadout}
      </div>
    </div>

    ${(ai.supplyContext || []).length ? `
    <!-- 3. SUPPLY CONTEXT -->
    <div class="rep-section">
      <h2><span class="rep-section-num">3</span>Supply & Category Context</h2>
      <div class="rep-section-divider"></div>
      ${ai.supplyInsight ? `<p>${escHtml(ai.supplyInsight)}</p>` : ''}
      <ul class="rep-supply-list">${supplyList}</ul>
    </div>
    ` : ''}

    ${verifiedComps.length ? `
    <!-- 4. COMPETITORS -->
    <div class="rep-section">
      <h2><span class="rep-section-num">${(ai.supplyContext || []).length ? 4 : 3}</span>Competitor Landscape</h2>
      <div class="rep-section-divider"></div>
      ${ai.competitorInsight ? `<p>${escHtml(ai.competitorInsight)}</p>` : ''}
      <table class="rep-table">
        <thead>
          <tr><th>Venue</th><th>${a.day} offer</th><th>Source</th></tr>
        </thead>
        <tbody>
          ${compRows}
          ${ownRow}
        </tbody>
      </table>
    </div>
    ` : ''}

    <!-- PROPOSED ACTION -->
    <div class="rep-section">
      <h2><span class="rep-section-num">${(ai.supplyContext || []).length ? (verifiedComps.length ? 5 : 4) : (verifiedComps.length ? 4 : 3)}</span>Proposed Action: ${branch}</h2>
      <div class="rep-section-divider"></div>
      <div class="rep-action-box">
        ${actionSection}
      </div>
    </div>

    <!-- SCENARIOS -->
    <div class="rep-section">
      <h2><span class="rep-section-num">${(ai.supplyContext || []).length ? (verifiedComps.length ? 6 : 5) : (verifiedComps.length ? 5 : 4)}</span>Financial Projections</h2>
      <div class="rep-section-divider"></div>
      <p>Four scenarios modelling the impact of ${branch === 'KEEP' ? 'continued operation' : branch === 'TWEAK' ? 'the proposed tweak' : branch === 'REPLACE' ? `replacing with ${escHtml(alt.name || 'the new special')}` : 'dropping the special'} at different volume and take-up assumptions. The ★ row marks the recommended scenario.</p>
      <table class="rep-table">
        <thead>
          <tr>
            <th>Scenario</th>
            <th>Demand Δ</th>
            <th>Take-up</th>
            <th>Price</th>
            <th>Units</th>
            <th>Food rev</th>
            <th>Bev rev</th>
            <th>Attrib. rev</th>
            <th>vs now</th>
          </tr>
        </thead>
        <tbody>${scenarioRows}</tbody>
      </table>
      <p style="font-size:11.5px; color:#94A3B8; margin-top:0.8rem;">All figures per-${a.day.toLowerCase()} and show <strong>attributable revenue</strong> - this special's own food and beverage contribution (units × price, plus ${fmtD(recProj.bevPerUnit)}/unit beverage that rides along on the weekday 1:1 basis). It excludes the rest of the night so the special's own movement is visible. Recommended scenario projects ${fmtD(recProj.attribRev)}/${a.day.toLowerCase()} - a ${recProj.deltaAbs >= 0 ? '+' : ''}${fmtD(recProj.deltaAbs)} (${recProj.deltaPct >= 0 ? '+' : ''}${recProj.deltaPct.toFixed(0)}%) change from the current ${fmtD(recProj.curAttribRev)}.</p>
    </div>

    <!-- ACTION ITEMS -->
    <div class="rep-section rep-actions">
      <h2><span class="rep-section-num">${(ai.supplyContext || []).length ? (verifiedComps.length ? 7 : 6) : (verifiedComps.length ? 6 : 5)}</span>Action Items</h2>
      <div class="rep-section-divider"></div>
      <ol>${actionItems}</ol>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="rep-footer">
    Generated ${reportDate} · Weekday Offer Review · Kickon Group<br>
    Data: Lightspeed Line Transactions export, ${dateRangeStr} · ${a.nights} ${a.day}s analysed
  </div>
</div>
</body>
</html>`;
}

// ── Build combo chart SVG for the standalone report ────────────────
function buildComboChartSVG(a, dayColor) {
  const trend = a.weeklyTrend || [];
  if (!trend.length) return '<svg viewBox="0 0 780 260"><text x="390" y="130" text-anchor="middle" fill="#94A3B8" font-size="13">No trend data</text></svg>';

  const W = 780, H = 260;
  const padL = 50, padR = 50, padT = 20, padB = 40;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const colW = innerW / trend.length;
  const barW = colW * 0.65;
  const maxFoodTx = Math.max(...trend.map(w => w.mains), 1);
  const yMax = Math.ceil(maxFoodTx / 50) * 50;

  const elts = [];
  for (let i = 0; i <= 5; i++) {
    const y = padT + (innerH * i / 5);
    const val = Math.round(yMax * (5 - i) / 5);
    elts.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#E2E8F0" stroke-width="1"/>`);
    elts.push(`<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#94A3B8" font-size="10">${val}</text>`);
    const pct = (5 - i) * 20;
    elts.push(`<text x="${W - padR + 8}" y="${y + 4}" text-anchor="start" fill="#94A3B8" font-size="10">${pct}%</text>`);
  }
  elts.push(`<text x="14" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(-90, 14, ${padT + innerH / 2})">Main dishes</text>`);
  elts.push(`<text x="${W - 14}" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(90, ${W - 14}, ${padT + innerH / 2})">Take-up rate (%)</text>`);
  elts.push(`<defs><pattern id="repPartialPat" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><rect width="6" height="6" fill="${dayColor}" opacity="0.18"/><line x1="0" y1="0" x2="0" y2="6" stroke="${dayColor}" stroke-width="2" opacity="0.55"/></pattern></defs>`);

  trend.forEach((w, i) => {
    const x = padL + i * colW + (colW - barW) / 2;
    const foodH = (w.mains / yMax) * innerH;
    const foodY = padT + innerH - foodH;
    const specialH = (w.specialUnits / yMax) * innerH;
    const specialY = padT + innerH - specialH;
    const colFill = w.partial ? 'url(#repPartialPat)' : dayColor;
    const colOpacity = w.partial ? 1 : 0.22;
    elts.push(`<rect x="${x}" y="${foodY}" width="${barW}" height="${foodH}" fill="${colFill}" opacity="${colOpacity}" rx="2"/>`);
    if (specialH > 0 && !w.partial) {
      elts.push(`<rect x="${x}" y="${specialY}" width="${barW}" height="${specialH}" fill="${dayColor}" rx="2"/>`);
    }
    const lbl = `${w.weekStart.getDate()}/${w.weekStart.getMonth()+1}`;
    elts.push(`<text x="${x + barW/2}" y="${H - padB + 14}" text-anchor="middle" fill="#94A3B8" font-size="10">${lbl}</text>`);
  });
  const linePoints = trend.map((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    return `${x},${y}`;
  }).join(' ');
  elts.push(`<polyline points="${linePoints}" fill="none" stroke="#0B1F3A" stroke-width="2"/>`);
  trend.forEach((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    elts.push(`<circle cx="${x}" cy="${y}" r="3.5" fill="#0B1F3A" stroke="#fff" stroke-width="1.5"/>`);
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${elts.join('')}</svg>`;
}

// ── Download the standalone HTML report ────────────────────────────
function downloadBReport() {
  if (!state.bReportHTML) return;
  const v = state.venue;
  const a = state.bAnalysis;
  const safe = s => String(s||'').replace(/[^a-zA-Z0-9]+/g, '-').toLowerCase().replace(/^-+|-+$/g, '');
  const fname = `${safe(v.name)}-${safe(a.day)}-${safe(a.name)}-strategic-plan.html`;
  const blob = new Blob([state.bReportHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = fname;
  link.click();
  URL.revokeObjectURL(url);
}

// ── Init ───────────────────────────────────────────────────────────
render();
</script>
