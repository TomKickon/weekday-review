<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekday Offer Review · Kickon Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Kickon brand colors */
  --deep-navy: #0B1F3A;
  --mid-navy: #1A3655;
  --steel-blue: #2B5080;
  --brand-blue: #4A8BC4;
  --white: #FFFFFF;
  --off-white: #F5F7FA;
  --body-text: #334155;
  --support-grey: #94A3B8;
  --line: #E2E8F0;
  --line-2: #CBD5E1;

  /* Semantic */
  --green:   #1f6f3e; --green-bg: #d9efde;
  --amber:   #8a6420; --amber-bg: #f7e9c5;
  --red:     #7a2a2a; --red-bg:   #f0d4d4;
  --blue-tag: #4A8BC4; --blue-bg: #e0ecf7;
  --purple:  #4a235a; --purple-bg: #e2d9f3;

  --shadow-sm: 0 1px 2px rgba(11,31,58,0.04), 0 2px 8px rgba(11,31,58,0.06);
  --shadow:    0 2px 4px rgba(11,31,58,0.06), 0 8px 24px rgba(11,31,58,0.08);
  --shadow-lg: 0 4px 12px rgba(11,31,58,0.08), 0 24px 48px rgba(11,31,58,0.12);
  --r: 4px; --r-md: 8px; --r-lg: 12px;
}

html, body { height: 100%; }
body {
  font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--off-white);
  color: var(--body-text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Top bar ─────────────────────────────────────────── */
.topbar {
  background: var(--deep-navy);
  padding: 1rem 2rem;
  position: relative; z-index: 10;
}
.topbar-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; }
.brand-logo {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
}
.brand-logo svg { width: 100%; height: 100%; }
.brand-text-wrap { line-height: 1.2; }
.brand-text {
  color: #fff; font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  display: block;
}
.brand-text-sub {
  color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.progress-pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 10.5px; color: rgba(255,255,255,0.85);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* ── Main wrapper ─────────────────────────────────────── */
.page {
  max-width: 980px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}
.page-wide {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

/* ── Step heading ──────────────────────────────────────── */
.step-eyebrow {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--brand-blue); margin-bottom: 0.5rem;
}
.step-title {
  font-size: 28px; font-weight: 600;
  color: var(--deep-navy);
  letter-spacing: -0.01em;
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}
.step-title .light { font-weight: 300; }
.step-divider {
  height: 3px; width: 56px;
  background: var(--brand-blue);
  margin: 0.8rem 0 1.5rem;
}
.step-sub {
  font-size: 14.5px; color: var(--body-text);
  max-width: 720px;
  margin-bottom: 2rem;
}

/* ── Cards ─────────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.6rem 1.8rem;
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 1rem; }
.card-head {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--deep-navy);
  margin-bottom: 1rem;
}
.card-desc {
  font-size: 13px; color: var(--body-text);
  margin-bottom: 1.2rem;
  line-height: 1.55;
}

/* ── Two-path home page ───────────────────────────────── */
.path-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-top: 1rem;
}
@media (max-width: 720px) {
  .path-grid { grid-template-columns: 1fr; }
}
.path-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 2rem 1.8rem 1.8rem;
  cursor: pointer;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
}
.path-card:hover {
  border-color: var(--brand-blue);
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.path-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--brand-blue);
}
.path-eyebrow {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--brand-blue);
  margin-bottom: 0.5rem;
}
.path-title {
  font-size: 20px; font-weight: 600;
  color: var(--deep-navy);
  text-transform: uppercase;
  letter-spacing: -0.005em;
  margin-bottom: 0.8rem;
}
.path-title .light { font-weight: 300; }
.path-q {
  font-size: 14.5px;
  font-style: italic;
  color: var(--mid-navy);
  margin-bottom: 1.1rem;
  line-height: 1.45;
}
.path-desc {
  font-size: 13px;
  color: var(--body-text);
  margin-bottom: 1.2rem;
  line-height: 1.55;
}
.path-meta {
  display: flex;
  gap: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--line);
  font-size: 11.5px;
  color: var(--support-grey);
}
.path-meta strong { color: var(--mid-navy); font-weight: 500; }
.path-stub {
  opacity: 0.55;
  cursor: not-allowed;
}
.path-stub:hover {
  border-color: var(--line);
  box-shadow: none;
  transform: none;
}
.stub-badge {
  display: inline-block;
  background: var(--amber-bg);
  color: var(--amber);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 0.5rem;
}

/* ── Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 11px 24px;
  border: none;
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--deep-navy);
  color: #fff;
}
.btn-primary:hover { background: var(--mid-navy); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--mid-navy);
  border: 1px solid var(--line-2);
}
.btn-ghost:hover { background: var(--off-white); border-color: var(--steel-blue); }
.btn-back {
  background: transparent;
  border: none;
  color: var(--support-grey);
  font-size: 12.5px;
  cursor: pointer;
  padding: 6px 0;
  font-family: inherit;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.btn-back:hover { color: var(--deep-navy); }

.btn-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
}

/* ── Forms ────────────────────────────────────────────── */
.field {
  margin-bottom: 1rem;
}
.field label {
  display: block;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--mid-navy);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--line-2);
  border-radius: var(--r-md);
  padding: 10px 12px;
  font-size: 13.5px;
  color: var(--body-text);
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--brand-blue);
  box-shadow: 0 0 0 3px rgba(74,139,196,0.15);
}

/* ── Specials table ──────────────────────────────────── */
.spec-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0.5rem;
}
.spec-table th {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--support-grey);
  text-align: left;
  padding: 0 8px 7px;
  border-bottom: 1px solid var(--line);
}
.spec-table td { padding: 5px 8px; vertical-align: middle; }
.spec-table select, .spec-table input {
  width: 100%;
  background: var(--off-white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 8px 10px;
  font-size: 13px;
  color: var(--body-text);
  font-family: inherit;
  outline: none;
}
.spec-table select:focus, .spec-table input:focus {
  border-color: var(--brand-blue);
}
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--support-grey); font-size: 20px; line-height: 1;
  padding: 4px 6px;
}
.del-btn:hover { color: var(--red); }
.add-btn {
  background: transparent;
  border: 1px dashed var(--line-2);
  border-radius: var(--r-md);
  padding: 8px 16px;
  font-size: 12px; font-weight: 500;
  color: var(--mid-navy);
  font-family: inherit;
  cursor: pointer;
  margin-top: 0.85rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.add-btn:hover {
  background: var(--off-white);
  border-color: var(--brand-blue);
  color: var(--deep-navy);
}

/* ── Drop zone ────────────────────────────────────────── */
.drop-zone {
  border: 1.5px dashed var(--line-2);
  border-radius: var(--r-lg);
  padding: 2rem 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.drop-zone:hover, .drop-zone.over {
  background: var(--off-white);
  border-color: var(--brand-blue);
}
.drop-zone input { display: none; }
.dz-icon { font-size: 32px; margin-bottom: 10px; }
.dz-main {
  font-size: 14px; font-weight: 500;
  color: var(--deep-navy);
  margin-bottom: 4px;
}
.dz-sub { font-size: 12px; color: var(--support-grey); }

.file-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 12px;
}
.file-tag {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--off-white);
  border-radius: var(--r-md);
  padding: 8px 12px;
  font-size: 12.5px;
  color: var(--body-text);
}
.file-tag .fn { display: flex; align-items: center; gap: 8px; }
.file-tag .fs { font-size: 11px; color: var(--support-grey); font-family: monospace; }
.file-tag button { background: none; border: none; cursor: pointer; color: var(--support-grey); font-size: 18px; line-height: 1; }
.file-tag button:hover { color: var(--red); }

/* ── Data range banner ─────────────────────────────────── */
.range-banner {
  border-radius: var(--r-md);
  padding: 0.85rem 1rem;
  margin-top: 1rem;
  font-size: 12.5px;
  line-height: 1.55;
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
}
.range-green { background: var(--green-bg); color: var(--green); }
.range-amber { background: var(--amber-bg); color: var(--amber); }
.range-red   { background: var(--red-bg); color: var(--red); }
.range-banner strong { font-weight: 600; }

/* ── Errors ────────────────────────────────────────────── */
.err {
  font-size: 13px;
  color: var(--red);
  background: var(--red-bg);
  border-radius: var(--r-md);
  padding: 10px 12px;
  margin-top: 1rem;
  display: none;
}
.err.visible { display: block; }

/* ── SKU matching panel ───────────────────────────────── */
.sku-panel {
  background: var(--off-white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.2rem 1.4rem;
  margin-top: 1rem;
}
.sku-panel-head {
  font-size: 11.5px; font-weight: 600;
  color: var(--deep-navy);
  margin-bottom: 0.85rem;
}
.sku-panel-head .day-pill {
  display: inline-block;
  padding: 2px 8px;
  background: var(--deep-navy);
  color: #fff;
  border-radius: var(--r-md);
  margin-right: 8px;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sku-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 7px 0;
  border-bottom: 1px solid var(--line);
}
.sku-row:last-child { border-bottom: none; }
.sku-row input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--brand-blue);
  cursor: pointer;
}
.sku-name { flex: 1; font-size: 13px; color: var(--body-text); }
.sku-stats { font-size: 11.5px; color: var(--support-grey); font-family: monospace; }
.sku-total {
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  border-top: 1px solid var(--line);
  font-size: 12.5px;
  color: var(--mid-navy);
}
.sku-total strong { color: var(--deep-navy); font-weight: 600; }

/* ── Dashboard (Path A output) ─────────────────────────── */
.dash-header {
  background: var(--deep-navy);
  color: #fff;
  padding: 1.8rem 2rem;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  margin-bottom: 0;
}
.dash-header h2 {
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.dash-header .light { font-weight: 300; }
.dash-header-sub {
  font-size: 12.5px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.04em;
}
.dash-divider {
  height: 3px;
  background: var(--brand-blue);
  margin-bottom: 1.8rem;
}

.section-label {
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--brand-blue);
  margin: 2rem 0 0.85rem;
}

/* Per-special cards */
.specials-grid {
  display: grid;
  gap: 0.85rem;
  margin-bottom: 0.85rem;
}
.spec-card {
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 1rem 1.1rem;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.spec-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.6rem;
}
.spec-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.spec-day {
  font-size: 13px;
  font-weight: 600;
  color: var(--deep-navy);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.spec-item {
  font-size: 11px;
  color: var(--body-text);
  margin-bottom: 0.7rem;
}
.price-badge {
  display: flex;
  gap: 6px;
  align-items: baseline;
  margin-bottom: 0.6rem;
}
.price-special {
  font-size: 22px;
  font-weight: 600;
  color: var(--deep-navy);
}
.price-rrp {
  font-size: 11px;
  color: var(--support-grey);
  text-decoration: line-through;
}
.disc-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.04em;
}
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  margin-bottom: 0.6rem;
}
.kpi-val {
  font-size: 15px;
  font-weight: 600;
  color: var(--deep-navy);
}
.kpi-label {
  font-size: 9px;
  color: var(--support-grey);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.divider-line {
  height: 1px;
  background: var(--line);
  margin: 0.6rem 0;
}
.mini-bar-wrap { margin-bottom: 4px; }
.mini-bar-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}
.mini-bar-label span {
  font-size: 9.5px;
  color: var(--body-text);
}
.mini-bg {
  height: 5px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.mini-fill {
  height: 100%;
  border-radius: 3px;
}
.verdict-wrap { margin-top: 0.6rem; }
.pill {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.pill-green  { background: var(--green-bg);  color: var(--green); }
.pill-amber  { background: var(--amber-bg);  color: var(--amber); }
.pill-red    { background: var(--red-bg);    color: var(--red); }
.pill-blue   { background: var(--blue-bg);   color: var(--blue-tag); }
.pill-purple { background: var(--purple-bg); color: var(--purple); }
.spec-note {
  font-size: 10.5px;
  color: var(--support-grey);
  margin-top: 5px;
  line-height: 1.45;
}

/* Summary table */
.sum-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  margin-bottom: 0.85rem;
  background: var(--white);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.sum-table thead tr { background: var(--deep-navy); color: #fff; }
.sum-table thead th {
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sum-table thead th.r { text-align: right; }
.sum-table tbody tr { border-bottom: 1px solid var(--line); }
.sum-table tbody tr:last-child { border-bottom: none; }
.sum-table tbody tr:hover { background: var(--off-white); cursor: pointer; }
.sum-table td {
  padding: 10px 12px;
  color: var(--body-text);
  vertical-align: middle;
}
.sum-table td.r { text-align: right; font-variant-numeric: tabular-nums; }
.sum-table td.c-red   { color: var(--red);   font-weight: 600; }
.sum-table td.c-green { color: var(--green); font-weight: 600; }
.sum-table td strong { color: var(--deep-navy); font-weight: 600; }

/* Insights box */
.ibox {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.2rem 1.4rem;
  box-shadow: var(--shadow-sm);
}
.ir {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.ir:last-child { margin-bottom: 0; }
.idot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.it {
  font-size: 13px;
  color: var(--body-text);
  line-height: 1.55;
}
.it strong { color: var(--deep-navy); font-weight: 600; }

/* Loading state */
.loading-wrap {
  text-align: center;
  padding: 3rem 2rem;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--line);
  border-top-color: var(--brand-blue);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 13px;
  color: var(--support-grey);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Download bar at bottom of dashboard */
.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding: 1.2rem 1.4rem;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}
.action-bar-text {
  font-size: 13px;
  color: var(--body-text);
}
.action-bar-text strong { color: var(--deep-navy); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-inner">

function toNum(s) {

// ── Date parsing ───────────────────────────────────────────────────
// Lightspeed Line Transactions format: "21/03/26 11:30 AM"  or  "21/03/2026 11:30 AM"
function parseTxDate(s) {
  if (!s) return null;
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s+(\d{1,2}):(\d{2})\s*(AM|PM)?$/i);
  if (!m) return null;
  let [_, d, mo, y, h, mi, ap] = m;
  d = +d; mo = +mo; y = +y; h = +h; mi = +mi;
  if (y < 100) y += 2000;
  if (ap) {
    ap = ap.toUpperCase();
    if (ap === 'PM' && h !== 12) h += 12;
    if (ap === 'AM' && h === 12) h = 0;
  }
  // Construct as local date (no UTC weirdness)
  return new Date(y, mo - 1, d, h, mi);
}

function dayName(date) {
  const js = date.getDay(); // 0=Sunday
  return DAYS[js === 0 ? 6 : js - 1];
}

// ── CSV streaming parser ───────────────────────────────────────────
// Handles quoted fields, commas in values, escaped quotes.
// Returns array of objects keyed by header.
function parseCSV(text) {
  // Strip BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let cur = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || cur.length) { cur.push(field); rows.push(cur); }
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.length > 1 || (r.length === 1 && r[0])).map(r => {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (r[idx] || '').trim());
    return obj;
  });
}

async function readText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsText(file);
  });
}

// ── Line Transactions parser ───────────────────────────────────────
// Produces a structured per-date aggregation.
// Returns:
// {
//   dateRange: { start, end, weeks, status: 'red'|'amber'|'green'|'amber-long' },
//   byDate: Map<dateKey, { transactions:Set, foodTx:Set, foodRev, bevRev, discFood, discBev, items:{ name -> { qty, revenue, sales:[{date,qty,price}] } } }>
//   byDow: { Monday: [{date, transactions, foodTx, foodRev, bevRev, discFood, discBev}, ...], Tuesday: [...], ... }
//   allItems: { itemName -> { qty, days:{Mon,Tue,...}, prices:[], totalRev } }
// }
function parseLineTransactions(rows) {
  // Column names (case-sensitive as exported by Lightspeed)
  // Date, Type, Account, Item, SKU, Qty, UnitPrice, FinalPrice, Discount, StatGroup
  const byDate = new Map();
  const allItems = new Map();
  let earliest = null, latest = null;
  let skippedNoDate = 0;
  let skippedNoSale = 0;

  for (const r of rows) {
    if ((r.Type || '').toUpperCase() !== 'SALE') { skippedNoSale++; continue; }
    const dt = parseTxDate(r.Date);
    if (!dt) { skippedNoDate++; continue; }
    if (!earliest || dt < earliest) earliest = dt;
    if (!latest || dt > latest) latest = dt;

    // Date key = YYYY-MM-DD (local)
    const yr = dt.getFullYear();
    const mo = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const dateKey = `${yr}-${mo}-${dd}`;

    let rec = byDate.get(dateKey);
    if (!rec) {
      rec = {
        date: new Date(yr, dt.getMonth(), dt.getDate()),
        transactions: new Set(),
        foodTx: new Set(),
        foodRev: 0,
        bevRev: 0,
        discFood: 0,
        discBev: 0,
        items: new Map(),
      };
      byDate.set(dateKey, rec);
    }

    const acct = (r.Account || '').trim();
    const sg = (r.StatGroup || '').trim();
    const qty = toNum(r.Qty);
    const finalPrice = toNum(r.FinalPrice);
    const unitPrice = toNum(r.UnitPrice);
    const item = (r.Item || '').trim();

    if (acct) rec.transactions.add(acct);

    if (sg === 'Food' && qty > 0) {
      if (acct) rec.foodTx.add(acct);
      rec.foodRev += finalPrice;
      if (item) {
        let it = rec.items.get(item);
        if (!it) { it = { qty: 0, revenue: 0 }; rec.items.set(item, it); }
        it.qty += qty;
        it.revenue += finalPrice;

        // All-items index for fuzzy matching later
        let ai = allItems.get(item);
        if (!ai) {
          ai = { qty: 0, totalRev: 0, days: {}, prices: [] };
          DAYS.forEach(d => ai.days[d] = 0);
          allItems.set(item, ai);
        }
        ai.qty += qty;
        ai.totalRev += finalPrice;
        ai.days[dayName(dt)] += qty;
        if (unitPrice > 0) ai.prices.push(unitPrice);
      }
    } else if (sg === 'Beverage' && qty > 0) {
      rec.bevRev += finalPrice;
    } else if (sg === 'Discount Food') {
      rec.discFood += Math.abs(finalPrice);
    } else if (sg === 'Discount Beverage') {
      rec.discBev += Math.abs(finalPrice);
    }
  }

  // Build byDow aggregation
  const byDow = {};
  DAYS.forEach(d => byDow[d] = []);

  // Convert Map to sorted array
  const sortedKeys = Array.from(byDate.keys()).sort();

  // Detect & drop partial trading days at edges
  // Calculate median transaction count per dow first
  const dowTxCounts = {};
  DAYS.forEach(d => dowTxCounts[d] = []);
  for (const k of sortedKeys) {
    const rec = byDate.get(k);
    const dow = dayName(rec.date);
    dowTxCounts[dow].push(rec.transactions.size);
  }
  const medianByDow = {};
  for (const d of DAYS) {
    const arr = dowTxCounts[d].slice().sort((a,b) => a-b);
    medianByDow[d] = arr.length ? arr[Math.floor(arr.length / 2)] : 0;
  }

  // Now drop edges if too small
  const droppedDates = new Set();
  if (sortedKeys.length >= 3) {
    const first = byDate.get(sortedKeys[0]);
    const last = byDate.get(sortedKeys[sortedKeys.length - 1]);
    const firstDow = dayName(first.date);
    const lastDow = dayName(last.date);
    if (medianByDow[firstDow] > 10 && first.transactions.size < medianByDow[firstDow] * 0.2) {
      droppedDates.add(sortedKeys[0]);
    }
    if (medianByDow[lastDow] > 10 && last.transactions.size < medianByDow[lastDow] * 0.2) {
      droppedDates.add(sortedKeys[sortedKeys.length - 1]);
    }
  }

  for (const k of sortedKeys) {
    if (droppedDates.has(k)) continue;
    const rec = byDate.get(k);
    const dow = dayName(rec.date);
    byDow[dow].push({
      date: rec.date,
      dateKey: k,
      transactions: rec.transactions.size,
      foodTx: rec.foodTx.size,
      foodRev: rec.foodRev,
      bevRev: rec.bevRev,
      discFood: rec.discFood,
      discBev: rec.discBev,
      items: rec.items,
    });
  }

  // Date range status
  const startDate = sortedKeys.length ? byDate.get(sortedKeys[0]).date : null;
  const endDate = sortedKeys.length ? byDate.get(sortedKeys[sortedKeys.length - 1]).date : null;
  let weeks = 0, status = 'red';
  if (startDate && endDate) {
    const days = Math.round((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
    weeks = days / 7;
    if (weeks < 8) status = 'red';
    else if (weeks < 12) status = 'amber';
    else if (weeks <= 16) status = 'green';
    else status = 'amber-long';
  }

  return {
    dateRange: { start: startDate, end: endDate, weeks, status, droppedCount: droppedDates.size },
    byDate,
    byDow,
    allItems,
    stats: { totalRows: rows.length, skippedNoSale, skippedNoDate, datesCount: sortedKeys.length - droppedDates.size },
  };
}

// ── Fuzzy SKU matching ─────────────────────────────────────────────
// Given a special (day, name, sp price), find candidate POS items.
// Returns top 6 sorted by qty sold on that day, with auto-tick flag.
function findSkuCandidates(special, parsed) {
  const day = special.day;
  const searchWords = special.name.toLowerCase().split(/\s+/).filter(w => w.length >= 3);
  if (!searchWords.length) return [];

  const candidates = [];
  parsed.allItems.forEach((data, itemName) => {
    const lower = itemName.toLowerCase();
    // Skip "modifier" items (asterisk suffix usually = discount line)
    if (itemName.endsWith('*')) return;
    const qtyOnDay = data.days[day] || 0;
    if (qtyOnDay === 0) return;  // didn't sell on the special's day

    // Score: count of word matches
    let nameScore = 0;
    for (const w of searchWords) {
      if (lower.includes(w)) nameScore++;
    }
    if (nameScore === 0) return;

    // Average price (median is more robust but mean OK)
    const avgPrice = data.prices.length ? data.prices.reduce((a,b)=>a+b,0) / data.prices.length : 0;
    const priceMatch = avgPrice > 0 && Math.abs(avgPrice - special.sp) <= 2;

    // Auto-tick logic - conservative:
    // - Always exclude "Kids" items (separate menu)
    // - Require strong name match (all search words present) AND (close item-name fit OR price within $2)
    // Single-word matches alone (even with price coincidence) do NOT auto-tick — too many false positives.
    // False negatives are fine — MM can tick manually.
    const isKids = /\bkids?\b/i.test(itemName);
    const allWordsMatch = nameScore === searchWords.length;
    // Item name length proxy for "is this item closely about my special vs an item that just mentions it"
    // e.g. "Wagyu Rump" (2 words) is a closer fit than "Slow-roasted Wagyu Rump Salad with Greens"
    const itemWordCount = itemName.split(/\s+/).filter(w => w.length).length;
    const isCloseFit = itemWordCount <= searchWords.length + 2;
    const autoTick = !isKids && allWordsMatch && (isCloseFit || priceMatch);

    candidates.push({
      itemName,
      qtyOnDay,
      qtyAllDays: data.qty,
      avgPrice,
      nameScore,
      priceMatch,
      autoTick,
    });
  });

  // Sort: auto-tick first, then by qty on day desc
  candidates.sort((a, b) => {
    if (a.autoTick !== b.autoTick) return a.autoTick ? -1 : 1;
    return b.qtyOnDay - a.qtyOnDay;
  });

  return candidates.slice(0, 6);
}

// ── Compute per-special results ────────────────────────────────────
function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function computeResults() {
  const parsed = state.parsedData;
  const results = [];

  for (let i = 0; i < state.specials.length; i++) {
    const sp = state.specials[i];
    const matched = state.skuMatches[i] || {};
    const selectedItems = Object.keys(matched).filter(k => matched[k].selected);

    const dayBuckets = parsed.byDow[sp.day] || [];
    const nights = dayBuckets.length;

    if (!nights) {
      results.push({ ...sp, nights: 0, hasData: false });
      continue;
    }

    // Per-night metrics
    const avgTx = avg(dayBuckets.map(d => d.transactions));
    const avgFoodTx = avg(dayBuckets.map(d => d.foodTx));
    const avgFoodRev = avg(dayBuckets.map(d => d.foodRev));
    const avgBevRev = avg(dayBuckets.map(d => d.bevRev));
    const avgDiscFood = avg(dayBuckets.map(d => d.discFood));
    const avgDiscBev = avg(dayBuckets.map(d => d.discBev));
    const totalDisc = avgDiscFood + avgDiscBev;
    const netRev = avgFoodRev + avgBevRev - totalDisc;

    // Units of the special: sum selected items' qty on this day, divided by nights
    let totalSpecialQty = 0;
    let totalSpecialRev = 0;
    for (const itemName of selectedItems) {
      for (const bucket of dayBuckets) {
        const it = bucket.items.get(itemName);
        if (it) { totalSpecialQty += it.qty; totalSpecialRev += it.revenue; }
      }
    }
    const unitsPerNight = nights > 0 ? totalSpecialQty / nights : 0;

    // Take-up rate: units ÷ food-bearing transactions
    const takeUp = avgFoodTx > 0 ? Math.min(unitsPerNight / avgFoodTx, 1) : 0;

    // Discount %
    const discPct = sp.fp > 0 ? Math.round((sp.fp - sp.sp) / sp.fp * 100) : 0;
    // Per-transaction
    const spendPerTx = avgTx > 0 ? avgFoodRev + avgBevRev - totalDisc : 0;
    const spendPerTxVal = avgTx > 0 ? (avgFoodRev + avgBevRev - totalDisc) / avgTx : 0;
    const bevPerTx = avgTx > 0 ? avgBevRev / avgTx : 0;
    const discPerTx = avgTx > 0 ? totalDisc / avgTx : 0;
    const foodAttach = avgTx > 0 ? avgFoodTx / avgTx : 0;
    const isBevLed = avgBevRev > avgFoodRev;

    results.push({
      ...sp,
      nights,
      hasData: true,
      selectedItems,
      // Volumes
      unitsPerNight: Math.round(unitsPerNight),
      avgTx: Math.round(avgTx),
      avgFoodTx: Math.round(avgFoodTx),
      // Revenue
      avgFoodRev: Math.round(avgFoodRev),
      avgBevRev: Math.round(avgBevRev),
      netRev: Math.round(netRev),
      totalDisc: Math.round(totalDisc),
      avgDiscFood: Math.round(avgDiscFood),
      avgDiscBev: Math.round(avgDiscBev),
      // Ratios
      takeUp,
      discPct,
      spendPerTx: Math.round(spendPerTxVal),
      bevPerTx: Math.round(bevPerTx),
      discPerTx: Math.round(discPerTx),
      foodAttach,
      isBevLed,
    });
  }

  // Determine "highest net rev day at venue" for Dominant verdict
  // Look at all days of data, find highest avg net rev day-of-week
  const dowNetRev = {};
  for (const d of DAYS) {
    const bucket = parsed.byDow[d];
    if (!bucket.length) { dowNetRev[d] = 0; continue; }
    const v = avg(bucket.map(b => b.foodRev + b.bevRev - b.discFood - b.discBev));
    dowNetRev[d] = v;
  }
  const maxNetRevDow = Object.keys(dowNetRev).reduce((a, b) => dowNetRev[a] > dowNetRev[b] ? a : b);

  // Assign verdicts
  for (const r of results) {
    if (!r.hasData) continue;
    r.verdict = computeVerdict(r, maxNetRevDow, dowNetRev);
  }

  return { results, dowNetRev, maxNetRevDow };
}

// ── Verdict logic (hierarchical, first match wins) ────────────────
function computeVerdict(r, maxNetRevDow, dowNetRev) {
  // 1. Dominant: highest net rev day at venue AND ≥200 units/night
  if (r.day === maxNetRevDow && r.unitsPerNight >= 200) {
    return { key: 'dominant', label: '🏆 Dominant', pill: 'pill-green' };
  }
  // 2. Star: food > bev AND ≥80 units/night AND disc ≤45%
  if (!r.isBevLed && r.unitsPerNight >= 80 && r.discPct <= 45) {
    return { key: 'star', label: '⭐ Star', pill: 'pill-green' };
  }
  // 3. Working: food > bev AND ≥40 units/night
  if (!r.isBevLed && r.unitsPerNight >= 40) {
    return { key: 'working', label: '✓ Working', pill: 'pill-blue' };
  }
  // 4. Efficient: disc cost ≤ $400/night
  if (r.totalDisc <= 400) {
    return { key: 'efficient', label: '◐ Efficient', pill: 'pill-purple' };
  }
  // 5. Weak: bev > food AND disc ≥40%
  if (r.isBevLed && r.discPct >= 40) {
    return { key: 'weak', label: '⚠ Weak', pill: 'pill-amber' };
  }
  // Fallback - underperforming but not a clear pattern
  return { key: 'review', label: '? Review', pill: 'pill-amber' };
}

// ── Insights generation ────────────────────────────────────────────
function generateInsights(analysis) {
  const { results, maxNetRevDow } = analysis;
  const wd = results.filter(r => r.hasData);
  const insights = [];

  // 1. Best performer (dominant/star)
  const dominant = wd.find(r => r.verdict.key === 'dominant');
  if (dominant) {
    insights.push({
      color: DAY_COLORS[dominant.day],
      html: `<strong>${dominant.day} ${escHtml(dominant.name)} - your anchor night.</strong> ${fmtN(dominant.unitsPerNight)} units sold per ${dominant.day.toLowerCase()}, ${fmtD(dominant.netRev)} net revenue. ${dominant.discPct}% off generates ${fmtD(dominant.totalDisc)} discount cost per night. A $2 price nudge would recover ~${fmtD(2 * dominant.unitsPerNight)}/night (~${fmtD(2 * dominant.unitsPerNight * 50)}/year).`,
    });
  }

  // 2. Stars
  const stars = wd.filter(r => r.verdict.key === 'star');
  for (const s of stars.slice(0, 2)) {
    insights.push({
      color: DAY_COLORS[s.day],
      html: `<strong>${s.day} ${escHtml(s.name)} - the special is doing the work.</strong> ${fmtN(s.unitsPerNight)} units across ${fmtN(s.avgFoodTx)} food transactions (${fmtPct(s.takeUp * 100)} take-up). Food (${fmtD(s.avgFoodRev)}) leads beverage (${fmtD(s.avgBevRev)}). ${fmtD(s.totalDisc)} discount cost is justified by the trade it drives.`,
    });
  }

  // 3. Weak/Review specials
  const weak = wd.filter(r => r.verdict.key === 'weak' || r.verdict.key === 'review');
  for (const w of weak.slice(0, 2)) {
    if (w.isBevLed) {
      insights.push({
        color: DAY_COLORS[w.day],
        html: `<strong>${w.day} ${escHtml(w.name)} - the food special isn't the drawcard.</strong> Beverage (${fmtD(w.avgBevRev)}) outpaces food (${fmtD(w.avgFoodRev)}) - guests are coming to drink, not for the ${w.name.toLowerCase()}. ${w.discPct}% off is a deep markdown for the food volume it's generating (${fmtN(w.unitsPerNight)} units/night). Consider replacing with a lower-cost food hook or leaning into the drinks trade.`,
      });
    } else {
      insights.push({
        color: DAY_COLORS[w.day],
        html: `<strong>${w.day} ${escHtml(w.name)} - underperforming.</strong> Only ${fmtN(w.unitsPerNight)} units/night. The food special isn't pulling the volume to justify ${fmtD(w.totalDisc)} discount cost. Worth reviewing the offer.`,
      });
    }
  }

  // 4. Efficient
  const eff = wd.find(r => r.verdict.key === 'efficient');
  if (eff && !insights.find(i => i.html.includes(eff.day))) {
    insights.push({
      color: DAY_COLORS[eff.day],
      html: `<strong>${eff.day} ${escHtml(eff.name)} - most efficient markdown.</strong> Only ${eff.discPct}% off, ${fmtD(eff.discPerTx)} discount cost per transaction. ${!eff.isBevLed ? 'Food beats beverage - guests are eating, not just drinking.' : `Sits as a low-cost hook in a drinks-led night.`}`,
    });
  }

  return insights;
}

// ── File handling ──────────────────────────────────────────────────
function setupDropZone() {
  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input');
  if (!dz || !fi) return;
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('over'); };
  dz.ondragleave = () => dz.classList.remove('over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('over'); addFiles(e.dataTransfer.files); };
  fi.onchange = () => { addFiles(fi.files); fi.value = ''; };
  dz.onclick = () => fi.click();
}
function addFiles(list) {
  for (const f of list) if (!state.files.find(x => x.name === f.name)) state.files.push(f);
  renderFileList();
}
function removeFile(i) { state.files.splice(i, 1); renderFileList(); }
function renderFileList() {
  const el = document.getElementById('file-list');
  if (!el) return;
  el.innerHTML = state.files.map((f, i) => `
    <div class="file-tag">
      <div class="fn">
        <span>📄</span>
        <span>${escHtml(f.name)}</span>
        <span class="fs">${(f.size / 1024 / 1024).toFixed(2)} MB</span>
      </div>
      <button onclick="removeFile(${i})">×</button>
    </div>`).join('');
}

function addSpecialRow(s = {}) {

function readSpecialsFromForm() {

    return {
      day: e[0].value,
      name: e[1].value.trim(),
      sp: parseFloat(e[2].value) || 0,
      fp: parseFloat(e[3].value) || 0,

  }).filter(s => s.name && s.sp > 0 && s.fp > 0);
}

async function processUpload() {
  if (!state.files.length) { showErr('upload-err', 'Please choose a CSV file first.'); return; }
  const file = state.files[state.files.length - 1];  // most recent
  if (!file.name.toLowerCase().endsWith('.csv')) { showErr('upload-err', 'File must be a .csv (Lightspeed Line Transactions export).'); return; }

  showErr('upload-err', null);
  // Show loading
  $('#wizard').innerHTML = `<div class="page"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Parsing line transactions…</div></div></div>`;

  try {
    const text = await readText(file);
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('No data rows found in CSV.');

    // Check expected columns
    const expectedCols = ['Date', 'Type', 'Account', 'Item', 'Qty', 'UnitPrice', 'FinalPrice', 'StatGroup'];
    const missing = expectedCols.filter(c => !(c in rows[0]));
    if (missing.length) {
      throw new Error(`This doesn't look like a Line Transactions export. Missing columns: ${missing.join(', ')}. Please re-export from Reports → All reports → Line transactions.`);
    }

    const parsed = parseLineTransactions(rows);
    if (parsed.stats.datesCount === 0) throw new Error('No SALE rows found with valid dates. Check your export.');

    state.parsedData = parsed;
    state.screen = 'path-a-specials';
    render();
  } catch (e) {
    state.screen = 'path-a-upload';
    render();
    setTimeout(() => showErr('upload-err', e.message), 50);
  }
}

function confirmSpecials() {
  const specs = readSpecialsFromForm();
  if (!specs.length) { showErr('specials-err', 'Please add at least one special with day, name, and both prices filled in.'); return; }

  const noData = specs.filter(s => !state.parsedData.byDow[s.day].length);
  if (noData.length === specs.length) {
    showErr('specials-err', `None of your specials have trading data on their day. Check your date range covers the days your specials run.`);
    return;
  }
  showErr('specials-err', null);
  state.specials = specs;
  // Build initial SKU matches via fuzzy search
  state.skuMatches = {};
  for (let i = 0; i < specs.length; i++) {
    const candidates = findSkuCandidates(specs[i], state.parsedData);
    state.skuMatches[i] = {};
    for (const c of candidates) {
      state.skuMatches[i][c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };

  state.screen = 'path-a-sku';

function renderSkuPanel(sp, idx) {
  const matches = state.skuMatches[idx] || {};
  const items = Object.keys(matches);
  const nights = state.parsedData.byDow[sp.day].length;

  let totalQty = 0;
  for (const itemName of items) {
    if (matches[itemName].selected) totalQty += matches[itemName].qtyOnDay;
  }
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;

  return `

  <div class="sku-panel-head">
    <span class="day-pill">${sp.day}</span>
    ${escHtml(sp.name)} · ${fmtD(sp.sp)} (RRP ${fmtD(sp.fp)})

  ${items.length === 0 ? `
    <p style="font-size:12.5px; color:var(--support-grey); font-style:italic;">No items containing "${escHtml(sp.name)}" found in your data on ${sp.day}s. The unit count for this special will be zero - you may want to check the item name matches what shows on your POS.</p>
  ` : items.map(itemName => {

    return `

  }).join('')}

</div>`;
}

function toggleSku(idx, itemName, checked) {
  if (!state.skuMatches[idx] || !state.skuMatches[idx][itemName]) return;
  state.skuMatches[idx][itemName].selected = checked;
  // Recalculate total for this panel
  const sp = state.specials[idx];
  const matches = state.skuMatches[idx];
  const nights = state.parsedData.byDow[sp.day].length;
  let totalQty = 0;
  for (const k of Object.keys(matches)) {
    if (matches[k].selected) totalQty += matches[k].qtyOnDay;
  }
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;
  const totalEl = document.getElementById(`sku-total-${idx}`);
  if (totalEl) totalEl.innerHTML = `Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg`;
}

// ── Run analysis & render dashboard ────────────────────────────────

  state.results = computeResults();
  state.screen = 'path-a-dashboard';
  render();
}

  <table class="sum-table">
    <thead>
      <tr>
        <th>Day · Special</th>
        <th class="r">Disc %</th>
        <th class="r">Units/night</th>
        <th class="r">Food tx</th>
        <th class="r">Take-up</th>
        <th class="r">$/tx</th>
        <th class="r">Bev/tx</th>
        <th class="r">Disc cost</th>

function renderSpecCard(r, maxFood, maxBev, maxDisc, maxBpt) {
  const color = DAY_COLORS[r.day] || '#666';
  if (!r.hasData) return `
    <div class="spec-card">
      <div class="spec-card-top"><div class="spec-dot" style="background:${color};"></div><div class="spec-day">${r.day}</div></div>
      <div class="spec-item">${escHtml(r.name)}</div>
      <p style="font-size:12px; color:var(--support-grey); font-style:italic;">No data found for ${r.day}.</p>
    </div>`;

  const v = r.verdict;
  const fw   = Math.round(r.avgFoodRev  / maxFood * 100);
  const bw   = Math.round(r.avgBevRev   / maxBev  * 100);
  const dw   = Math.round(r.totalDisc   / maxDisc * 100);
  const bptw = Math.round(r.bevPerTx    / maxBpt  * 100);

  const discBadgeStyle = (() => {
    if (r.discPct <= 30) return 'background:var(--green-bg); color:var(--green);';
    if (r.discPct <= 42) return 'background:var(--blue-bg); color:var(--blue-tag);';
    if (r.discPct <= 50) return 'background:var(--amber-bg); color:var(--amber);';
    return 'background:var(--red-bg); color:var(--red);';
  })();

  const note = (() => {
    if (v.key === 'dominant') return `Anchor night. ${fmtN(r.unitsPerNight)} units · ${fmtD(r.netRev)} net rev.`;
    if (v.key === 'star') return `${fmtPct(r.takeUp * 100)} take-up across food tx. Food beats bev.`;
    if (v.key === 'working') return `${fmtN(r.unitsPerNight)} units, food-led. Pulling weight.`;
    if (v.key === 'efficient') return `${fmtD(r.totalDisc)} disc cost - low-overhead hook.`;
    if (v.key === 'weak') return r.isBevLed ? `Bev (${fmtD(r.avgBevRev)}) outpaces food (${fmtD(r.avgFoodRev)}). Drinks night.` : `Underperforming - food isn't doing the work.`;
    return `Review the offer.`;
  })();

  return `
    <div class="spec-card">
      <div class="spec-card-top"><div class="spec-dot" style="background:${color};"></div><div class="spec-day">${r.day}</div></div>
      <div class="spec-item">${escHtml(r.name)}</div>
      <div class="price-badge">
        <div class="price-special">${fmtD(r.sp)}</div>
        <div class="price-rrp">${fmtD(r.fp)}</div>
        <div class="disc-badge" style="${discBadgeStyle}">-${r.discPct}%</div>
      </div>
      <div class="kpi-grid">
        <div><div class="kpi-val">${fmtN(r.unitsPerNight)}</div><div class="kpi-label">Units/${r.day.slice(0,3).toLowerCase()}</div></div>
        <div><div class="kpi-val">${fmtN(r.avgFoodTx)}</div><div class="kpi-label">Food tx</div></div>
        <div><div class="kpi-val">${fmtPct(r.takeUp * 100)}</div><div class="kpi-label">Take-up</div></div>
        <div><div class="kpi-val">${fmtD(r.spendPerTx)}</div><div class="kpi-label">$/tx</div></div>
      </div>
      <div class="divider-line"></div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Food rev</span><span>${fmtD(r.avgFoodRev)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${fw}%; background:${color};"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Bev rev</span><span>${fmtD(r.avgBevRev)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${bw}%; background:${color}; opacity:0.6;"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span style="color:var(--red);">Disc cost</span><span style="color:var(--red);">-${fmtD(r.totalDisc)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${dw}%; background:#e8a8a8;"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Bev/tx</span><span>${fmtD(r.bevPerTx)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${bptw}%; background:${color}; opacity:0.35;"></div></div>
      </div>
      <div class="verdict-wrap">
        <span class="pill ${v.pill}">${v.label}</span>
        <div class="spec-note">${note}</div>
      </div>
    </div>`;
}

function renderSumRow(r) {
  if (!r.hasData) return `<tr><td><strong>${r.day} · ${escHtml(r.name)}</strong></td><td colspan="11" style="color:var(--support-grey); font-style:italic;">No data</td></tr>`;
  const v = r.verdict;
  return `<tr>
    <td><strong>${r.day} · ${fmtD(r.sp)} ${escHtml(r.name)}</strong></td>
    <td class="r ${r.discPct >= 50 ? 'c-red' : r.discPct <= 30 ? 'c-green' : ''}">${r.discPct}%</td>
    <td class="r">${fmtN(r.unitsPerNight)}</td>
    <td class="r">${fmtN(r.avgFoodTx)}</td>
    <td class="r ${r.takeUp >= 0.5 ? 'c-green' : r.takeUp <= 0.15 ? 'c-red' : ''}">${fmtPct(r.takeUp * 100)}</td>
    <td class="r">${fmtD(r.spendPerTx)}</td>
    <td class="r ${r.bevPerTx >= 30 ? 'c-green' : ''}">${fmtD(r.bevPerTx)}</td>
    <td class="r ${r.totalDisc >= 3000 ? 'c-red' : r.totalDisc <= 400 ? 'c-green' : ''}">-${fmtD(r.totalDisc)}</td>
    <td class="r ${!r.isBevLed ? 'c-green' : ''}">${fmtD(r.avgFoodRev)}</td>
    <td class="r ${r.isBevLed ? 'c-green' : ''}">${fmtD(r.avgBevRev)}</td>
    <td class="r ${r.netRev >= 10000 ? 'c-green' : ''}">${fmtD(r.netRev)}</td>
    <td><span class="pill ${v.pill}">${v.label}</span></td>
  </tr>`;
}

// ── Download report (standalone HTML file) ─────────────────────────
function downloadReport() {
  const dashHtml = $('#wizard').innerHTML;
  // Get all inline styles from current page <style> tag
  const styleTag = document.querySelector('style');
  const cssContent = styleTag ? styleTag.textContent : '';

  const venue = state.venue;
  const range = state.parsedData.dateRange;
  const fmtDate = d => d ? `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}` : '?';
  const title = `${venue.name} - Weekday Specials Performance Review`;
  const dateStr = `${fmtDate(range.start)} to ${fmtDate(range.end)}`;

  // Strip the action bar from the output
  const cleanedHtml = dashHtml.replace(/<div class="action-bar">[\s\S]*?<\/div>\s*<\/div>\s*$/, '</div>');

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${escHtml(title)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>${cssContent}
body { background: #fff; padding: 2rem 0; }
@media print { body { padding: 0; } .page-wide { padding: 0; } }
</style>
</head>
<body>
${cleanedHtml}
<div class="page-wide" style="padding-top:0;">
  <p style="font-size:11px; color:var(--support-grey); text-align:center; margin-top:2rem;">
    Generated ${new Date().toLocaleDateString('en-AU', { day:'numeric', month:'long', year:'numeric' })} · Weekday Offer Review · Kickon Group
  </p>
</div>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${venue.name.replace(/\s+/g, '-').toLowerCase()}-weekday-review-${range.end ? range.end.toISOString().slice(0,10) : 'report'}.html`;
  a.click();
  URL.revokeObjectURL(url);
}
