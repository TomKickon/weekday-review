<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekday Offer Review · Kickon Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Kickon brand colors */
  --deep-navy: #0B1F3A;
  --mid-navy: #1A3655;
  --steel-blue: #2B5080;
  --brand-blue: #4A8BC4;
  --white: #FFFFFF;
  --off-white: #F5F7FA;
  --body-text: #334155;
  --support-grey: #94A3B8;
  --line: #E2E8F0;
  --line-2: #CBD5E1;

  /* Semantic */
  --green:   #1f6f3e; --green-bg: #d9efde;
  --amber:   #8a6420; --amber-bg: #f7e9c5;
  --red:     #7a2a2a; --red-bg:   #f0d4d4;
  --blue-tag: #4A8BC4; --blue-bg: #e0ecf7;
  --purple:  #4a235a; --purple-bg: #e2d9f3;

  --shadow-sm: 0 1px 2px rgba(11,31,58,0.04), 0 2px 8px rgba(11,31,58,0.06);
  --shadow:    0 2px 4px rgba(11,31,58,0.06), 0 8px 24px rgba(11,31,58,0.08);
  --shadow-lg: 0 4px 12px rgba(11,31,58,0.08), 0 24px 48px rgba(11,31,58,0.12);
  --r: 4px; --r-md: 8px; --r-lg: 12px;
}

html, body { height: 100%; }
body {
  font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--off-white);
  color: var(--body-text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Top bar ─────────────────────────────────────────── */
.topbar {
  background: var(--deep-navy);
  padding: 1rem 2rem;
  position: relative; z-index: 10;
}
.topbar-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; }
.brand-logo {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
}
.brand-logo svg { width: 100%; height: 100%; }
.brand-text-wrap { line-height: 1.2; }
.brand-text {
  color: #fff; font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  display: block;
}
.brand-text-sub {
  color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.progress-pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 10.5px; color: rgba(255,255,255,0.85);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* ── Main wrapper ─────────────────────────────────────── */
.page {
  max-width: 980px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}
.page-wide {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

/* ── Step heading ──────────────────────────────────────── */
.step-eyebrow {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--brand-blue); margin-bottom: 0.5rem;
}
.step-title {
  font-size: 28px; font-weight: 600;
  color: var(--deep-navy);
  letter-spacing: -0.01em;
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}
.step-title .light { font-weight: 300; }
.step-divider {
  height: 3px; width: 56px;
  background: var(--brand-blue);
  margin: 0.8rem 0 1.5rem;
}
.step-sub {
  font-size: 14.5px; color: var(--body-text);
  max-width: 720px;
  margin-bottom: 2rem;
}

/* ── Cards ─────────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.6rem 1.8rem;
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 1rem; }
.card-head {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--deep-navy);
  margin-bottom: 1rem;
}
.card-desc {
  font-size: 13px; color: var(--body-text);
  margin-bottom: 1.2rem;
  line-height: 1.55;
}

/* ── Two-path home page ───────────────────────────────── */
.path-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-top: 1rem;
}
@media (max-width: 720px) {
  .path-grid { grid-template-columns: 1fr; }
}
.path-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 2rem 1.8rem 1.8rem;
  cursor: pointer;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
}
.path-card:hover {
  border-color: var(--brand-blue);
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.path-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--brand-blue);
}
.path-eyebrow {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--brand-blue);
  margin-bottom: 0.5rem;
}
.path-title {
  font-size: 20px; font-weight: 600;
  color: var(--deep-navy);
  text-transform: uppercase;
  letter-spacing: -0.005em;
  margin-bottom: 0.8rem;
}
.path-title .light { font-weight: 300; }
.path-q {
  font-size: 14.5px;
  font-style: italic;
  color: var(--mid-navy);
  margin-bottom: 1.1rem;
  line-height: 1.45;
}
.path-desc {
  font-size: 13px;
  color: var(--body-text);
  margin-bottom: 1.2rem;
  line-height: 1.55;
}
.path-meta {
  display: flex;
  gap: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--line);
  font-size: 11.5px;
  color: var(--support-grey);
}
.path-meta strong { color: var(--mid-navy); font-weight: 500; }
.path-stub {
  opacity: 0.55;
  cursor: not-allowed;
}
.path-stub:hover {
  border-color: var(--line);
  box-shadow: none;
  transform: none;
}
.stub-badge {
  display: inline-block;
  background: var(--amber-bg);
  color: var(--amber);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 0.5rem;
}

/* ── Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 11px 24px;
  border: none;
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--deep-navy);
  color: #fff;
}
.btn-primary:hover { background: var(--mid-navy); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--mid-navy);
  border: 1px solid var(--line-2);
}
.btn-ghost:hover { background: var(--off-white); border-color: var(--steel-blue); }
.btn-back {
  background: transparent;
  border: none;
  color: var(--support-grey);
  font-size: 12.5px;
  cursor: pointer;
  padding: 6px 0;
  font-family: inherit;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.btn-back:hover { color: var(--deep-navy); }

.btn-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
}

/* ── Forms ────────────────────────────────────────────── */
.field {
  margin-bottom: 1rem;
}
.field label {
  display: block;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--mid-navy);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--line-2);
  border-radius: var(--r-md);
  padding: 10px 12px;
  font-size: 13.5px;
  color: var(--body-text);
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--brand-blue);
  box-shadow: 0 0 0 3px rgba(74,139,196,0.15);
}

/* ── Specials table ──────────────────────────────────── */
.spec-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0.5rem;
}
.spec-table th {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--support-grey);
  text-align: left;
  padding: 0 8px 7px;
  border-bottom: 1px solid var(--line);
}
.spec-table td { padding: 5px 8px; vertical-align: middle; }
.spec-table select, .spec-table input {
  width: 100%;
  background: var(--off-white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 8px 10px;
  font-size: 13px;
  color: var(--body-text);
  font-family: inherit;
  outline: none;
}
.spec-table select:focus, .spec-table input:focus {
  border-color: var(--brand-blue);
}
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--support-grey); font-size: 20px; line-height: 1;
  padding: 4px 6px;
}
.del-btn:hover { color: var(--red); }
.add-btn {
  background: transparent;
  border: 1px dashed var(--line-2);
  border-radius: var(--r-md);
  padding: 8px 16px;
  font-size: 12px; font-weight: 500;
  color: var(--mid-navy);
  font-family: inherit;
  cursor: pointer;
  margin-top: 0.85rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.add-btn:hover {
  background: var(--off-white);
  border-color: var(--brand-blue);
  color: var(--deep-navy);
}

/* ── Drop zone ────────────────────────────────────────── */
.drop-zone {
  border: 1.5px dashed var(--line-2);
  border-radius: var(--r-lg);
  padding: 2rem 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.drop-zone:hover, .drop-zone.over {
  background: var(--off-white);
  border-color: var(--brand-blue);
}
.drop-zone input { display: none; }
.dz-icon { font-size: 32px; margin-bottom: 10px; }
.dz-main {
  font-size: 14px; font-weight: 500;
  color: var(--deep-navy);
  margin-bottom: 4px;
}
.dz-sub { font-size: 12px; color: var(--support-grey); }

.file-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 12px;
}
.file-tag {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--off-white);
  border-radius: var(--r-md);
  padding: 8px 12px;
  font-size: 12.5px;
  color: var(--body-text);
}
.file-tag .fn { display: flex; align-items: center; gap: 8px; }
.file-tag .fs { font-size: 11px; color: var(--support-grey); font-family: monospace; }
.file-tag button { background: none; border: none; cursor: pointer; color: var(--support-grey); font-size: 18px; line-height: 1; }
.file-tag button:hover { color: var(--red); }

/* ── Data range banner ─────────────────────────────────── */
.range-banner {
  border-radius: var(--r-md);
  padding: 0.85rem 1rem;
  margin-top: 1rem;
  font-size: 12.5px;
  line-height: 1.55;
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
}
.range-green { background: var(--green-bg); color: var(--green); }
.range-amber { background: var(--amber-bg); color: var(--amber); }
.range-red   { background: var(--red-bg); color: var(--red); }
.range-banner strong { font-weight: 600; }

/* ── Errors ────────────────────────────────────────────── */
.err {
  font-size: 13px;
  color: var(--red);
  background: var(--red-bg);
  border-radius: var(--r-md);
  padding: 10px 12px;
  margin-top: 1rem;
  display: none;
}
.err.visible { display: block; }

/* ── SKU matching panel ───────────────────────────────── */
.sku-panel {
  background: var(--off-white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.2rem 1.4rem;
  margin-top: 1rem;
}
.sku-panel-head {
  font-size: 11.5px; font-weight: 600;
  color: var(--deep-navy);
  margin-bottom: 0.85rem;
}
.sku-panel-head .day-pill {
  display: inline-block;
  padding: 2px 8px;
  background: var(--deep-navy);
  color: #fff;
  border-radius: var(--r-md);
  margin-right: 8px;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sku-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 7px 0;
  border-bottom: 1px solid var(--line);
}
.sku-row:last-child { border-bottom: none; }
.sku-row input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--brand-blue);
  cursor: pointer;
}
.sku-name { flex: 1; font-size: 13px; color: var(--body-text); }
.sku-stats { font-size: 11.5px; color: var(--support-grey); font-family: monospace; }
.sku-total {
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  border-top: 1px solid var(--line);
  font-size: 12.5px;
  color: var(--mid-navy);
}
.sku-total strong { color: var(--deep-navy); font-weight: 600; }

/* ── Dashboard (Path A output) ─────────────────────────── */
.dash-header {
  background: var(--deep-navy);
  color: #fff;
  padding: 1.8rem 2rem;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  margin-bottom: 0;
}
.dash-header h2 {
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.dash-header .light { font-weight: 300; }
.dash-header-sub {
  font-size: 12.5px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.04em;
}
.dash-divider {
  height: 3px;
  background: var(--brand-blue);
  margin-bottom: 1.8rem;
}

.section-label {
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--brand-blue);
  margin: 2rem 0 0.85rem;
}

/* Per-special cards */
.specials-grid {
  display: grid;
  gap: 0.85rem;
  margin-bottom: 0.85rem;
}
.spec-card {
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 1rem 1.1rem;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.spec-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.6rem;
}
.spec-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.spec-day {
  font-size: 13px;
  font-weight: 600;
  color: var(--deep-navy);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.spec-item {
  font-size: 11px;
  color: var(--body-text);
  margin-bottom: 0.7rem;
}
.price-badge {
  display: flex;
  gap: 6px;
  align-items: baseline;
  margin-bottom: 0.6rem;
}
.price-special {
  font-size: 22px;
  font-weight: 600;
  color: var(--deep-navy);
}
.price-rrp {
  font-size: 11px;
  color: var(--support-grey);
  text-decoration: line-through;
}
.disc-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.04em;
}
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  margin-bottom: 0.6rem;
}
.kpi-val {
  font-size: 15px;
  font-weight: 600;
  color: var(--deep-navy);
}
.kpi-label {
  font-size: 9px;
  color: var(--support-grey);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.divider-line {
  height: 1px;
  background: var(--line);
  margin: 0.6rem 0;
}
.mini-bar-wrap { margin-bottom: 4px; }
.mini-bar-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}
.mini-bar-label span {
  font-size: 9.5px;
  color: var(--body-text);
}
.mini-bg {
  height: 5px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.mini-fill {
  height: 100%;
  border-radius: 3px;
}
.verdict-wrap { margin-top: 0.6rem; }
.pill {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.pill-green  { background: var(--green-bg);  color: var(--green); }
.pill-amber  { background: var(--amber-bg);  color: var(--amber); }
.pill-red    { background: var(--red-bg);    color: var(--red); }
.pill-blue   { background: var(--blue-bg);   color: var(--blue-tag); }
.pill-purple { background: var(--purple-bg); color: var(--purple); }
.spec-note {
  font-size: 10.5px;
  color: var(--support-grey);
  margin-top: 5px;
  line-height: 1.45;
}

/* Summary table */
.sum-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  margin-bottom: 0.85rem;
  background: var(--white);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.sum-table thead tr { background: var(--deep-navy); color: #fff; }
.sum-table thead th {
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sum-table thead th.r { text-align: right; }
.sum-table tbody tr { border-bottom: 1px solid var(--line); }
.sum-table tbody tr:last-child { border-bottom: none; }
.sum-table tbody tr:hover { background: var(--off-white); cursor: pointer; }
.sum-table td {
  padding: 10px 12px;
  color: var(--body-text);
  vertical-align: middle;
}
.sum-table td.r { text-align: right; font-variant-numeric: tabular-nums; }
.sum-table td.c-red   { color: var(--red);   font-weight: 600; }
.sum-table td.c-green { color: var(--green); font-weight: 600; }
.sum-table td strong { color: var(--deep-navy); font-weight: 600; }

/* Insights box */
.ibox {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.2rem 1.4rem;
  box-shadow: var(--shadow-sm);
}
.ir {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.ir:last-child { margin-bottom: 0; }
.idot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.it {
  font-size: 13px;
  color: var(--body-text);
  line-height: 1.55;
}
.it strong { color: var(--deep-navy); font-weight: 600; }

/* Loading state */
.loading-wrap {
  text-align: center;
  padding: 3rem 2rem;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--line);
  border-top-color: var(--brand-blue);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 13px;
  color: var(--support-grey);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Download bar at bottom of dashboard */
.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding: 1.2rem 1.4rem;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}
.action-bar-text {
  font-size: 13px;
  color: var(--body-text);
}
.action-bar-text strong { color: var(--deep-navy); }

/* ═══════════════════════════════════════════════════════════════
   PATH B - Strategic Plan styles
   ═══════════════════════════════════════════════════════════════ */

/* Single-special analysis screen */
.b-hero {
  background: var(--deep-navy);
  color: #fff;
  padding: 1.8rem 2rem;
  border-radius: var(--r-lg);
  margin-bottom: 1.5rem;
}
.b-hero-eyebrow {
  font-size: 11px; font-weight: 600;

.b-hero-title {

.b-hero-title .light { font-weight: 300; }
.b-hero-sub {

  margin-bottom: 1.2rem;
}
.b-hero-stats {

.b-hero-stat-label {
  font-size: 9.5px; font-weight: 600;

.b-hero-stat-val {
  font-size: 22px; font-weight: 600;
  color: #fff;
}
.b-hero-stat-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

/* Combo chart */
.combo-chart {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 1.4rem 1.6rem;
  box-shadow: var(--shadow-sm);
}
.combo-chart h3 {
  font-size: 13px; font-weight: 600;
  color: var(--deep-navy);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.3rem;
}
.combo-chart-sub {
  font-size: 11.5px;
  color: var(--support-grey);
  margin-bottom: 1rem;
}
.combo-chart svg { width: 100%; height: 280px; display: block; }
.combo-legend {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.85rem;
  padding-top: 0.85rem;
  border-top: 1px solid var(--line);
  font-size: 11.5px;
}
.combo-legend-item { display: flex; align-items: center; gap: 6px; color: var(--body-text); }
.legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
.legend-line { width: 16px; height: 3px; border-radius: 2px; }
.combo-readout {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--line);
}
.combo-readout-item { font-size: 12px; }
.combo-readout-label {
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--support-grey);
  margin-bottom: 3px;
}
.combo-readout-val { font-size: 15px; font-weight: 600; color: var(--deep-navy); }
.combo-readout-val.up { color: var(--green); }
.combo-readout-val.down { color: var(--red); }

/* Branch decision cards */
.branch-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-top: 1rem;
}
@media (max-width: 720px) {
  .branch-grid { grid-template-columns: 1fr 1fr; }
}
.branch-card {
  background: var(--white);
  border: 1.5px solid var(--line);

  transition: all 0.15s;
  position: relative;
}
.branch-card:hover {
  border-color: var(--brand-blue);
  box-shadow: var(--shadow);
}
.branch-card.recommended {
  border-color: var(--brand-blue);
  border-width: 2px;
  box-shadow: 0 0 0 3px rgba(74,139,196,0.15);
}
.branch-rec-tag {
  position: absolute;
  top: -10px; left: 1rem;
  background: var(--brand-blue);
  color: #fff;
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
}
.branch-icon {
  font-size: 26px;
  margin-bottom: 0.5rem;
}
.branch-name {
  font-size: 16px; font-weight: 600;
  color: var(--deep-navy);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.4rem;
}
.branch-desc {
  font-size: 12px;
  color: var(--body-text);
  line-height: 1.5;
}

.ai-loading {
  background: var(--white);

.ai-loading .spinner {

.ai-loading-title {

  color: var(--deep-navy);
  margin-bottom: 0.4rem;
}
.ai-loading-sub {
  font-size: 12.5px;
  color: var(--support-grey);
  margin-bottom: 1.5rem;
}
.ai-stages {

  margin: 0 auto;
  text-align: left;

.ai-stage {

.ai-stage.active {

.ai-stage.done {

.ai-stage.active .ai-stage-icon { background: var(--brand-blue); }

.verify-btn {

.context-list {

.context-detail {

}
.context-source {

// ╔═══════════════════════════════════════════════════════════════╗

// ── Helpers ────────────────────────────────────────────────────────
const $ = sel => document.querySelector(sel);
const fmtD = v => {
  const n = Math.round(v);
  return n < 0 ? '-$' + Math.abs(n).toLocaleString('en-AU') : '$' + n.toLocaleString('en-AU');
};
const fmtN = v => Math.round(v).toLocaleString('en-AU');
const fmtPct = v => Math.round(v) + '%';
const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toNum(s) {
  if (s == null) return 0;
  const str = String(s).replace(/[$,\s]/g, '').trim();
  if (!str || str === '-') return 0;
  const n = parseFloat(str);
  return isNaN(n) ? 0 : n;
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  if (msg) { el.textContent = msg; el.classList.add('visible'); }
  else     { el.textContent = ''; el.classList.remove('visible'); }
}

function setProgress(txt) {
  const el = $('#progress-pill');
  if (el) el.textContent = txt;
}

function goHome() {
  state.screen = 'home';
  state.path = null;
  state.files = [];

  state.results = null;

// Lightspeed Line Transactions format: "21/03/26 11:30 AM"  or  "21/03/2026 11:30 AM"
function parseTxDate(s) {
  if (!s) return null;
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s+(\d{1,2}):(\d{2})\s*(AM|PM)?$/i);
  if (!m) return null;
  let [_, d, mo, y, h, mi, ap] = m;
  d = +d; mo = +mo; y = +y; h = +h; mi = +mi;
  if (y < 100) y += 2000;
  if (ap) {
    ap = ap.toUpperCase();
    if (ap === 'PM' && h !== 12) h += 12;
    if (ap === 'AM' && h === 12) h = 0;
  }
  // Construct as local date (no UTC weirdness)
  return new Date(y, mo - 1, d, h, mi);
}

function dayName(date) {
  const js = date.getDay(); // 0=Sunday
  return DAYS[js === 0 ? 6 : js - 1];
}

// ── CSV streaming parser ───────────────────────────────────────────
// Handles quoted fields, commas in values, escaped quotes.
// Returns array of objects keyed by header.
function parseCSV(text) {
  // Strip BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let cur = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || cur.length) { cur.push(field); rows.push(cur); }
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.length > 1 || (r.length === 1 && r[0])).map(r => {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (r[idx] || '').trim());
    return obj;
  });
}

async function readText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsText(file);
  });
}

// ── Line Transactions parser ───────────────────────────────────────
// Produces a structured per-date aggregation.
// Returns:
// {
//   dateRange: { start, end, weeks, status: 'red'|'amber'|'green'|'amber-long' },
//   byDate: Map<dateKey, { transactions:Set, foodTx:Set, foodRev, bevRev, discFood, discBev, items:{ name -> { qty, revenue, sales:[{date,qty,price}] } } }>
//   byDow: { Monday: [{date, transactions, foodTx, foodRev, bevRev, discFood, discBev}, ...], Tuesday: [...], ... }
//   allItems: { itemName -> { qty, days:{Mon,Tue,...}, prices:[], totalRev } }
// }
function parseLineTransactions(rows) {
  // Column names (case-sensitive as exported by Lightspeed)
  // Date, Type, Account, Item, SKU, Qty, UnitPrice, FinalPrice, Discount, StatGroup
  const byDate = new Map();
  const allItems = new Map();
  let earliest = null, latest = null;
  let skippedNoDate = 0;
  let skippedNoSale = 0;

  for (const r of rows) {
    if ((r.Type || '').toUpperCase() !== 'SALE') { skippedNoSale++; continue; }
    const dt = parseTxDate(r.Date);
    if (!dt) { skippedNoDate++; continue; }
    if (!earliest || dt < earliest) earliest = dt;
    if (!latest || dt > latest) latest = dt;

    // Date key = YYYY-MM-DD (local)
    const yr = dt.getFullYear();
    const mo = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const dateKey = `${yr}-${mo}-${dd}`;

    let rec = byDate.get(dateKey);
    if (!rec) {
      rec = {
        date: new Date(yr, dt.getMonth(), dt.getDate()),
        transactions: new Set(),
        foodTx: new Set(),
        foodRev: 0,
        bevRev: 0,
        discFood: 0,
        discBev: 0,
        items: new Map(),
      };
      byDate.set(dateKey, rec);
    }

    const acct = (r.Account || '').trim();
    const sg = (r.StatGroup || '').trim();
    const qty = toNum(r.Qty);
    const finalPrice = toNum(r.FinalPrice);
    const unitPrice = toNum(r.UnitPrice);
    const item = (r.Item || '').trim();

    if (acct) rec.transactions.add(acct);

    if (sg === 'Food' && qty > 0) {
      if (acct) rec.foodTx.add(acct);
      rec.foodRev += finalPrice;
      if (item) {
        let it = rec.items.get(item);
        if (!it) { it = { qty: 0, revenue: 0 }; rec.items.set(item, it); }
        it.qty += qty;
        it.revenue += finalPrice;

        // All-items index for fuzzy matching later
        let ai = allItems.get(item);
        if (!ai) {
          ai = { qty: 0, totalRev: 0, days: {}, prices: [], pricesByDay: {} };
          DAYS.forEach(d => { ai.days[d] = 0; ai.pricesByDay[d] = []; });
          allItems.set(item, ai);
        }
        ai.qty += qty;
        ai.totalRev += finalPrice;
        const dn = dayName(dt);
        ai.days[dn] += qty;
        if (unitPrice > 0) {
          ai.prices.push(unitPrice);
          ai.pricesByDay[dn].push(unitPrice);
        }
      }
    } else if (sg === 'Beverage' && qty > 0) {
      rec.bevRev += finalPrice;
    } else if (sg === 'Discount Food') {
      rec.discFood += Math.abs(finalPrice);
    } else if (sg === 'Discount Beverage') {
      rec.discBev += Math.abs(finalPrice);
    }
  }

  // Build byDow aggregation
  const byDow = {};
  DAYS.forEach(d => byDow[d] = []);

  // Convert Map to sorted array
  const sortedKeys = Array.from(byDate.keys()).sort();

  // Detect & drop partial trading days at edges
  // Calculate median transaction count per dow first
  const dowTxCounts = {};
  DAYS.forEach(d => dowTxCounts[d] = []);
  for (const k of sortedKeys) {
    const rec = byDate.get(k);
    const dow = dayName(rec.date);
    dowTxCounts[dow].push(rec.transactions.size);
  }
  const medianByDow = {};
  for (const d of DAYS) {
    const arr = dowTxCounts[d].slice().sort((a,b) => a-b);
    medianByDow[d] = arr.length ? arr[Math.floor(arr.length / 2)] : 0;
  }

  // Now drop edges if too small
  const droppedDates = new Set();
  if (sortedKeys.length >= 3) {
    const first = byDate.get(sortedKeys[0]);
    const last = byDate.get(sortedKeys[sortedKeys.length - 1]);
    const firstDow = dayName(first.date);
    const lastDow = dayName(last.date);
    if (medianByDow[firstDow] > 10 && first.transactions.size < medianByDow[firstDow] * 0.2) {
      droppedDates.add(sortedKeys[0]);
    }
    if (medianByDow[lastDow] > 10 && last.transactions.size < medianByDow[lastDow] * 0.2) {
      droppedDates.add(sortedKeys[sortedKeys.length - 1]);
    }
  }

  for (const k of sortedKeys) {
    if (droppedDates.has(k)) continue;
    const rec = byDate.get(k);
    const dow = dayName(rec.date);
    byDow[dow].push({
      date: rec.date,
      dateKey: k,
      transactions: rec.transactions.size,
      foodTx: rec.foodTx.size,
      foodRev: rec.foodRev,
      bevRev: rec.bevRev,
      discFood: rec.discFood,
      discBev: rec.discBev,
      items: rec.items,
    });
  }

  // Date range status
  const startDate = sortedKeys.length ? byDate.get(sortedKeys[0]).date : null;
  const endDate = sortedKeys.length ? byDate.get(sortedKeys[sortedKeys.length - 1]).date : null;
  let weeks = 0, status = 'red';
  if (startDate && endDate) {
    const days = Math.round((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
    weeks = days / 7;
    if (weeks < 8) status = 'red';
    else if (weeks < 12) status = 'amber';
    else if (weeks <= 16) status = 'green';
    else status = 'amber-long';
  }

  return {
    dateRange: { start: startDate, end: endDate, weeks, status, droppedCount: droppedDates.size },
    byDate,
    byDow,
    allItems,
    stats: { totalRows: rows.length, skippedNoSale, skippedNoDate, datesCount: sortedKeys.length - droppedDates.size },
  };
}

// ── Fuzzy SKU matching ─────────────────────────────────────────────
// Given a special (day, name, sp price), find candidate POS items.
// Returns top 6 sorted by qty sold on that day, with auto-tick flag.
function findSkuCandidates(special, parsed) {
  const day = special.day;
  const searchWords = special.name.toLowerCase().split(/\s+/).filter(w => w.length >= 3);
  if (!searchWords.length) return [];

  const candidates = [];
  parsed.allItems.forEach((data, itemName) => {
    const lower = itemName.toLowerCase();
    // Skip "modifier" items (asterisk suffix usually = discount line)
    if (itemName.endsWith('*')) return;
    const qtyOnDay = data.days[day] || 0;
    if (qtyOnDay === 0) return;  // didn't sell on the special's day

    // Score: count of word matches
    let nameScore = 0;
    for (const w of searchWords) {
      if (lower.includes(w)) nameScore++;
    }
    if (nameScore === 0) return;

    // Average price (median is more robust but mean OK)
    const avgPrice = data.prices.length ? data.prices.reduce((a,b)=>a+b,0) / data.prices.length : 0;
    const priceMatch = avgPrice > 0 && Math.abs(avgPrice - special.sp) <= 2;

    // Auto-tick logic - conservative:
    // - Always exclude "Kids" items (separate menu)
    // - Require strong name match (all search words present) AND (close item-name fit OR price within $2)
    // Single-word matches alone (even with price coincidence) do NOT auto-tick — too many false positives.
    // False negatives are fine — MM can tick manually.
    const isKids = /\bkids?\b/i.test(itemName);
    const allWordsMatch = nameScore === searchWords.length;
    // Item name length proxy for "is this item closely about my special vs an item that just mentions it"
    // e.g. "Wagyu Rump" (2 words) is a closer fit than "Slow-roasted Wagyu Rump Salad with Greens"
    const itemWordCount = itemName.split(/\s+/).filter(w => w.length).length;
    const isCloseFit = itemWordCount <= searchWords.length + 2;
    const autoTick = !isKids && allWordsMatch && (isCloseFit || priceMatch);

    candidates.push({
      itemName,
      qtyOnDay,
      qtyAllDays: data.qty,
      avgPrice,
      nameScore,
      priceMatch,
      autoTick,
    });
  });

  // Sort: auto-tick first, then by qty on day desc
  candidates.sort((a, b) => {
    if (a.autoTick !== b.autoTick) return a.autoTick ? -1 : 1;
    return b.qtyOnDay - a.qtyOnDay;
  });

  return candidates.slice(0, 6);
}

// ── Compute effective full price for a special ─────────────────────
// When the MM enters a special with a range of items (e.g. "Pizza Day - $13" where pizzas
// range $22-32 at full price), the "Full price" field they enter is just one value.
// The real discount % is more accurate when we use the WEIGHTED-AVERAGE price these items
// sold at on NON-SPECIAL days (i.e. the natural menu price).
// SAMPLE SIZE: requires at least 10 non-special-day price points. If the special item only
// sells on its special day (e.g. "Thursday Burger Night" - exclusive to Thursdays), there
// won't be enough data and we fall back to MM's entered RRP.
// Returns { effectiveFullPrice, isRange, priceMin, priceMax, sampleSize, derived } or null.
function computeEffectiveFullPrice(selectedItems, specialDay, parsed) {
  let totalQty = 0;
  let weightedSum = 0;
  let minP = Infinity;
  let maxP = -Infinity;
  for (const itemName of selectedItems) {
    const ai = parsed.allItems.get(itemName);
    if (!ai) continue;
    for (const day of DAYS) {
      if (day === specialDay) continue;
      const prices = ai.pricesByDay[day] || [];
      for (const p of prices) {
        if (p <= 0) continue;
        totalQty++;
        weightedSum += p;
        if (p < minP) minP = p;
        if (p > maxP) maxP = p;
      }
    }
  }
  // Minimum sample threshold - need 10+ non-special-day price points to trust the avg
  if (totalQty < 10) return null;
  const avgPrice = weightedSum / totalQty;
  // Treat as range only if there's a meaningful spread (>20% difference between min and max)
  const isRange = minP > 0 && (maxP - minP) / minP > 0.2;
  return {
    effectiveFullPrice: avgPrice,
    isRange,
    priceMin: minP === Infinity ? 0 : minP,
    priceMax: maxP === -Infinity ? 0 : maxP,
    sampleSize: totalQty,
    derived: true,
  };
}

// ── Compute per-special results ────────────────────────────────────
function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function computeResults() {
  const parsed = state.parsedData;
  const results = [];

  for (let i = 0; i < state.specials.length; i++) {
    const sp = state.specials[i];
    const matched = state.skuMatches[i] || {};
    const selectedItems = Object.keys(matched).filter(k => matched[k].selected);

    const dayBuckets = parsed.byDow[sp.day] || [];
    const nights = dayBuckets.length;

    if (!nights) {
      results.push({ ...sp, nights: 0, hasData: false });
      continue;
    }

    // Per-night metrics
    const avgTx = avg(dayBuckets.map(d => d.transactions));
    const avgFoodTx = avg(dayBuckets.map(d => d.foodTx));
    const avgFoodRev = avg(dayBuckets.map(d => d.foodRev));
    const avgBevRev = avg(dayBuckets.map(d => d.bevRev));
    const avgDiscFood = avg(dayBuckets.map(d => d.discFood));
    const avgDiscBev = avg(dayBuckets.map(d => d.discBev));
    const totalDisc = avgDiscFood + avgDiscBev;
    const netRev = avgFoodRev + avgBevRev - totalDisc;

    // Units of the special: sum selected items' qty on this day, divided by nights
    let totalSpecialQty = 0;
    let totalSpecialRev = 0;
    for (const itemName of selectedItems) {
      for (const bucket of dayBuckets) {
        const it = bucket.items.get(itemName);
        if (it) { totalSpecialQty += it.qty; totalSpecialRev += it.revenue; }
      }
    }
    const unitsPerNight = nights > 0 ? totalSpecialQty / nights : 0;

    // Take-up rate: units ÷ food-bearing transactions
    const takeUp = avgFoodTx > 0 ? Math.min(unitsPerNight / avgFoodTx, 1) : 0;

    // Discount % - use effective full price (weighted average from non-special-day sales)
    // if it differs meaningfully from the MM-entered RRP. This handles range specials.
    const effective = computeEffectiveFullPrice(selectedItems, sp.day, parsed);
    const effectiveFullPrice = effective ? effective.effectiveFullPrice : sp.fp;
    const fpForDisc = effective ? effective.effectiveFullPrice : sp.fp;
    const discPct = fpForDisc > 0 ? Math.round((fpForDisc - sp.sp) / fpForDisc * 100) : 0;
    // Per-transaction
    const spendPerTx = avgTx > 0 ? avgFoodRev + avgBevRev - totalDisc : 0;
    const spendPerTxVal = avgTx > 0 ? (avgFoodRev + avgBevRev - totalDisc) / avgTx : 0;
    const bevPerTx = avgTx > 0 ? avgBevRev / avgTx : 0;
    const discPerTx = avgTx > 0 ? totalDisc / avgTx : 0;
    const foodAttach = avgTx > 0 ? avgFoodTx / avgTx : 0;
    const isBevLed = avgBevRev > avgFoodRev;

    results.push({
      ...sp,
      nights,
      hasData: true,
      selectedItems,
      // Effective full price (weighted avg from non-special days). When the special covers
      // a range of items, this is the most accurate "what would they have paid normally" figure.
      effectiveFullPrice: effective ? Math.round(effective.effectiveFullPrice * 100) / 100 : sp.fp,
      isRange: effective ? effective.isRange : false,
      priceMin: effective ? effective.priceMin : sp.fp,
      priceMax: effective ? effective.priceMax : sp.fp,
      // Volumes
      unitsPerNight: Math.round(unitsPerNight),
      avgTx: Math.round(avgTx),
      avgFoodTx: Math.round(avgFoodTx),
      // Revenue
      avgFoodRev: Math.round(avgFoodRev),
      avgBevRev: Math.round(avgBevRev),
      netRev: Math.round(netRev),
      totalDisc: Math.round(totalDisc),
      avgDiscFood: Math.round(avgDiscFood),
      avgDiscBev: Math.round(avgDiscBev),
      // Ratios
      takeUp,
      discPct,
      spendPerTx: Math.round(spendPerTxVal),
      bevPerTx: Math.round(bevPerTx),
      discPerTx: Math.round(discPerTx),
      foodAttach,
      isBevLed,
    });
  }

  // Determine "highest net rev day at venue" for Dominant verdict
  // Look at all days of data, find highest avg net rev day-of-week
  const dowNetRev = {};
  for (const d of DAYS) {
    const bucket = parsed.byDow[d];
    if (!bucket.length) { dowNetRev[d] = 0; continue; }
    const v = avg(bucket.map(b => b.foodRev + b.bevRev - b.discFood - b.discBev));
    dowNetRev[d] = v;
  }
  const maxNetRevDow = Object.keys(dowNetRev).reduce((a, b) => dowNetRev[a] > dowNetRev[b] ? a : b);

  // Assign verdicts
  for (const r of results) {
    if (!r.hasData) continue;
    r.verdict = computeVerdict(r, maxNetRevDow, dowNetRev);
  }

  return { results, dowNetRev, maxNetRevDow };
}

// ── Verdict logic (hierarchical, first match wins) ────────────────
function computeVerdict(r, maxNetRevDow, dowNetRev) {
  // 1. Dominant: highest net rev day at venue AND ≥200 units/night
  if (r.day === maxNetRevDow && r.unitsPerNight >= 200) {
    return { key: 'dominant', label: '🏆 Dominant', pill: 'pill-green' };
  }
  // 2. Star: food > bev AND ≥80 units/night AND disc ≤45%
  if (!r.isBevLed && r.unitsPerNight >= 80 && r.discPct <= 45) {
    return { key: 'star', label: '⭐ Star', pill: 'pill-green' };
  }
  // 3. Working: food > bev AND ≥40 units/night
  if (!r.isBevLed && r.unitsPerNight >= 40) {
    return { key: 'working', label: '✓ Working', pill: 'pill-blue' };
  }
  // 4. Efficient: disc cost ≤ $400/night
  if (r.totalDisc <= 400) {
    return { key: 'efficient', label: '◐ Efficient', pill: 'pill-purple' };
  }
  // 5. Weak: bev > food AND disc ≥40%
  if (r.isBevLed && r.discPct >= 40) {
    return { key: 'weak', label: '⚠ Weak', pill: 'pill-amber' };
  }
  // Fallback - underperforming but not a clear pattern
  return { key: 'review', label: '? Review', pill: 'pill-amber' };
}

// ── Insights generation ────────────────────────────────────────────
function generateInsights(analysis) {
  const { results, maxNetRevDow } = analysis;
  const wd = results.filter(r => r.hasData);
  const insights = [];

  // 1. Best performer (dominant/star)
  const dominant = wd.find(r => r.verdict.key === 'dominant');
  if (dominant) {
    insights.push({
      color: DAY_COLORS[dominant.day],
      html: `<strong>${dominant.day} ${escHtml(dominant.name)} - your anchor night.</strong> ${fmtN(dominant.unitsPerNight)} units sold per ${dominant.day.toLowerCase()}, ${fmtD(dominant.netRev)} net revenue. ${dominant.discPct}% off generates ${fmtD(dominant.totalDisc)} discount cost per night. A $2 price nudge would recover ~${fmtD(2 * dominant.unitsPerNight)}/night (~${fmtD(2 * dominant.unitsPerNight * 50)}/year).`,
    });
  }

  // 2. Stars
  const stars = wd.filter(r => r.verdict.key === 'star');
  for (const s of stars.slice(0, 2)) {
    insights.push({
      color: DAY_COLORS[s.day],
      html: `<strong>${s.day} ${escHtml(s.name)} - the special is doing the work.</strong> ${fmtN(s.unitsPerNight)} units across ${fmtN(s.avgFoodTx)} food transactions (${fmtPct(s.takeUp * 100)} take-up). Food (${fmtD(s.avgFoodRev)}) leads beverage (${fmtD(s.avgBevRev)}). ${fmtD(s.totalDisc)} discount cost is justified by the trade it drives.`,
    });
  }

  // 3. Weak/Review specials
  const weak = wd.filter(r => r.verdict.key === 'weak' || r.verdict.key === 'review');
  for (const w of weak.slice(0, 2)) {
    if (w.isBevLed) {
      insights.push({
        color: DAY_COLORS[w.day],
        html: `<strong>${w.day} ${escHtml(w.name)} - the food special isn't the drawcard.</strong> Beverage (${fmtD(w.avgBevRev)}) outpaces food (${fmtD(w.avgFoodRev)}) - guests are coming to drink, not for the ${w.name.toLowerCase()}. ${w.discPct}% off is a deep markdown for the food volume it's generating (${fmtN(w.unitsPerNight)} units/night). Consider replacing with a lower-cost food hook or leaning into the drinks trade.`,
      });
    } else {
      insights.push({
        color: DAY_COLORS[w.day],
        html: `<strong>${w.day} ${escHtml(w.name)} - underperforming.</strong> Only ${fmtN(w.unitsPerNight)} units/night. The food special isn't pulling the volume to justify ${fmtD(w.totalDisc)} discount cost. Worth reviewing the offer.`,
      });
    }
  }

  // 4. Efficient
  const eff = wd.find(r => r.verdict.key === 'efficient');
  if (eff && !insights.find(i => i.html.includes(eff.day))) {
    insights.push({
      color: DAY_COLORS[eff.day],
      html: `<strong>${eff.day} ${escHtml(eff.name)} - most efficient markdown.</strong> Only ${eff.discPct}% off, ${fmtD(eff.discPerTx)} discount cost per transaction. ${!eff.isBevLed ? 'Food beats beverage - guests are eating, not just drinking.' : `Sits as a low-cost hook in a drinks-led night.`}`,
    });
  }

  return insights;
}

// ── File handling ──────────────────────────────────────────────────
function setupDropZone() {
  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input');
  if (!dz || !fi) return;
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('over'); };
  dz.ondragleave = () => dz.classList.remove('over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('over'); addFiles(e.dataTransfer.files); };
  fi.onchange = () => { addFiles(fi.files); fi.value = ''; };
  dz.onclick = () => fi.click();
}
function addFiles(list) {
  for (const f of list) if (!state.files.find(x => x.name === f.name)) state.files.push(f);
  renderFileList();
}
function removeFile(i) { state.files.splice(i, 1); renderFileList(); }
function renderFileList() {
  const el = document.getElementById('file-list');
  if (!el) return;
  el.innerHTML = state.files.map((f, i) => `
    <div class="file-tag">
      <div class="fn">
        <span>📄</span>
        <span>${escHtml(f.name)}</span>
        <span class="fs">${(f.size / 1024 / 1024).toFixed(2)} MB</span>
      </div>
      <button onclick="removeFile(${i})">×</button>
    </div>`).join('');
}

// ── Specials management (Path A) ───────────────────────────────────
function addSpecialRow(s = {}) {
  const tbody = document.getElementById('specials-body');
  if (!tbody) return;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><select>${DAYS.map(d => `<option${d === (s.day || 'Monday') ? ' selected' : ''}>${d}</option>`).join('')}</select></td>
    <td><input type="text" placeholder="e.g. Fish & Chips" value="${escHtml(s.name || '')}"></td>
    <td><input type="number" placeholder="19" value="${s.sp || ''}" step="0.5"></td>
    <td><input type="number" placeholder="29" value="${s.fp || ''}" step="0.5"></td>
    <td><button class="del-btn" onclick="this.closest('tr').remove()">×</button></td>`;

}
function readSpecialsFromForm() {
  return Array.from(document.querySelectorAll('#specials-body tr')).map(tr => {
    const e = tr.querySelectorAll('select, input');
    return {
      day: e[0].value,

      fp: parseFloat(e[3].value) || 0,

}

async function processUpload(path) {
  const isB = path === 'B';
  if (!state.files.length) { showErr('upload-err', 'Please choose a CSV file first.'); return; }
  const file = state.files[state.files.length - 1];
  if (!file.name.toLowerCase().endsWith('.csv')) { showErr('upload-err', 'File must be a .csv (Lightspeed Line Transactions export).'); return; }

  showErr('upload-err', null);
  $('#wizard').innerHTML = `<div class="page"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Parsing line transactions…</div></div></div>`;

  try {
    const text = await readText(file);
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('No data rows found in CSV.');

    const expectedCols = ['Date', 'Type', 'Account', 'Item', 'Qty', 'UnitPrice', 'FinalPrice', 'StatGroup'];
    const missing = expectedCols.filter(c => !(c in rows[0]));
    if (missing.length) {
      throw new Error(`This doesn't look like a Line Transactions export. Missing columns: ${missing.join(', ')}. Please re-export from Reports → All reports → Line transactions.`);
    }

    const parsed = parseLineTransactions(rows);
    if (parsed.stats.datesCount === 0) throw new Error('No SALE rows found with valid dates. Check your export.');

    state.parsedData = parsed;
    state.screen = isB ? 'path-b-pick' : 'path-a-specials';
    render();
  } catch (e) {
    state.screen = isB ? 'path-b-upload' : 'path-a-upload';
    render();
    setTimeout(() => showErr('upload-err', e.message), 50);
  }
}

function confirmSpecials() {
  const specs = readSpecialsFromForm();
  if (!specs.length) { showErr('specials-err', 'Please add at least one special with day, name, and both prices filled in.'); return; }

  if (noData.length === specs.length) {
    showErr('specials-err', `None of your specials have trading data on their day. Check your date range covers the days your specials run.`);
    return;
  }
  showErr('specials-err', null);
  state.specials = specs;
  // Build initial SKU matches via fuzzy search
  state.skuMatches = {};
  for (let i = 0; i < specs.length; i++) {
    const candidates = findSkuCandidates(specs[i], state.parsedData);
    state.skuMatches[i] = {};
    for (const c of candidates) {
      state.skuMatches[i][c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };
    }
  }
  state.screen = 'path-a-sku';
  render();
}

function renderSkuMatch() {

function renderSkuPanel(sp, idx) {
  const matches = state.skuMatches[idx] || {};
  const items = Object.keys(matches);
  const nights = state.parsedData.byDow[sp.day].length;

  let totalQty = 0;
  for (const itemName of items) {
    if (matches[itemName].selected) totalQty += matches[itemName].qtyOnDay;
  }
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;

  return `
<div class="sku-panel" id="sku-panel-${idx}">
  <div class="sku-panel-head" id="sku-head-${idx}">
    <span class="day-pill">${sp.day}</span>
    <span style="display:inline-flex; align-items:center; gap:8px;">
      <span class="sku-name-display" id="sku-name-${idx}" style="display:inline;">${escHtml(sp.name)}</span>
      <input type="text" id="sku-edit-${idx}" value="${escHtml(sp.name)}" style="display:none; padding:4px 8px; font-size:12.5px; border:1px solid var(--brand-blue); border-radius:4px; min-width:180px;" />
      <button class="edit-name-btn" id="sku-edit-btn-${idx}" onclick="editSkuName(${idx})" style="background:none; border:none; cursor:pointer; color:var(--brand-blue); font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:2px 6px;">Edit</button>
      <button class="edit-name-save" id="sku-save-btn-${idx}" onclick="saveSkuName(${idx})" style="display:none; background:var(--brand-blue); border:none; cursor:pointer; color:#fff; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:4px;">Save</button>
      <button class="edit-name-cancel" id="sku-cancel-btn-${idx}" onclick="cancelSkuName(${idx})" style="display:none; background:none; border:none; cursor:pointer; color:var(--support-grey); font-size:11px; padding:2px 6px;">Cancel</button>
    </span>
    · ${fmtD(sp.sp)} (RRP ${fmtD(sp.fp)})
  </div>
  ${items.length === 0 ? `
    <p style="font-size:12.5px; color:var(--support-grey); font-style:italic; padding:8px 0;">No items containing "${escHtml(sp.name)}" found in your data on ${sp.day}s. Try the <strong>Edit</strong> button above - your POS item might be called something slightly different (e.g. "Schnitzel" not "Schnitty").</p>
  ` : items.map(itemName => {
    const m = matches[itemName];
    const idSafe = 'sku-' + idx + '-' + btoa(unescape(encodeURIComponent(itemName))).replace(/=/g, '');
    return `
    <div class="sku-row">
      <input type="checkbox" id="${idSafe}" ${m.selected ? 'checked' : ''} onchange="toggleSku(${idx}, '${itemName.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}', this.checked)">
      <label for="${idSafe}" class="sku-name" style="cursor:pointer;">${escHtml(itemName)}${m.priceMatch ? ' <span style="color:var(--green); font-size:10px; font-weight:600;">PRICE MATCH</span>' : ''}</label>
      <span class="sku-stats">${m.qtyOnDay} sold · avg ${fmtD(m.avgPrice)}</span>
    </div>`;
  }).join('')}
  ${items.length > 0 ? `<div class="sku-total" id="sku-total-${idx}">Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg</div>` : ''}
</div>`;
}

function editSkuName(idx) {
  document.getElementById('sku-name-' + idx).style.display = 'none';
  document.getElementById('sku-edit-btn-' + idx).style.display = 'none';
  const input = document.getElementById('sku-edit-' + idx);
  input.style.display = 'inline-block';
  input.focus();
  input.select();
  document.getElementById('sku-save-btn-' + idx).style.display = 'inline-block';
  document.getElementById('sku-cancel-btn-' + idx).style.display = 'inline-block';
  // Allow Enter to save, Escape to cancel
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveSkuName(idx); }
    if (e.key === 'Escape') { e.preventDefault(); cancelSkuName(idx); }
  };
}

function cancelSkuName(idx) {
  const sp = state.specials[idx];
  document.getElementById('sku-edit-' + idx).value = sp.name;
  document.getElementById('sku-name-' + idx).style.display = 'inline';
  document.getElementById('sku-edit-btn-' + idx).style.display = 'inline-block';
  document.getElementById('sku-edit-' + idx).style.display = 'none';
  document.getElementById('sku-save-btn-' + idx).style.display = 'none';
  document.getElementById('sku-cancel-btn-' + idx).style.display = 'none';
}

function saveSkuName(idx) {
  const newName = document.getElementById('sku-edit-' + idx).value.trim();
  if (!newName) { cancelSkuName(idx); return; }
  // Update state
  state.specials[idx].name = newName;
  // Re-run fuzzy match for this special only - this replaces skuMatches[idx]
  const candidates = findSkuCandidates(state.specials[idx], state.parsedData);
  state.skuMatches[idx] = {};
  for (const c of candidates) {
    state.skuMatches[idx][c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };
  }
  // Re-render just this panel
  const panel = document.getElementById('sku-panel-' + idx);
  if (panel) {
    panel.outerHTML = renderSkuPanel(state.specials[idx], idx);
  }
}

function toggleSku(idx, itemName, checked) {
  if (!state.skuMatches[idx] || !state.skuMatches[idx][itemName]) return;
  state.skuMatches[idx][itemName].selected = checked;
  // Recalculate total for this panel
  const sp = state.specials[idx];
  const matches = state.skuMatches[idx];
  const nights = state.parsedData.byDow[sp.day].length;
  let totalQty = 0;
  for (const k of Object.keys(matches)) {
    if (matches[k].selected) totalQty += matches[k].qtyOnDay;
  }
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;
  const totalEl = document.getElementById(`sku-total-${idx}`);
  if (totalEl) totalEl.innerHTML = `Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg`;
}

  const v = r.verdict;
  const fw   = Math.round(r.avgFoodRev  / maxFood * 100);
  const bw   = Math.round(r.avgBevRev   / maxBev  * 100);
  const dw   = Math.round(r.totalDisc   / maxDisc * 100);
  const bptw = Math.round(r.bevPerTx    / maxBpt  * 100);

  const discBadgeStyle = (() => {

  const note = (() => {

  return `

      <div class="spec-item">${escHtml(r.name)}</div>
      <div class="price-badge">

        <div class="price-rrp" title="${r.isRange ? `Items range ${fmtD(r.priceMin)} - ${fmtD(r.priceMax)}, avg ${fmtD(r.effectiveFullPrice)}` : ''}">${r.isRange ? `${fmtD(r.priceMin)}-${fmtD(r.priceMax)}` : fmtD(r.fp)}</div>
        <div class="disc-badge" style="${discBadgeStyle}" title="${r.isRange ? `Discount % based on weighted-average full price ${fmtD(r.effectiveFullPrice)} from non-${r.day} sales` : ''}">-${r.discPct}%</div>
      </div>
      <div class="kpi-grid">
        <div><div class="kpi-val">${fmtN(r.unitsPerNight)}</div><div class="kpi-label">Units/${r.day.slice(0,3).toLowerCase()}</div></div>
        <div><div class="kpi-val">${fmtN(r.avgFoodTx)}</div><div class="kpi-label">Food tx</div></div>
        <div><div class="kpi-val">${fmtPct(r.takeUp * 100)}</div><div class="kpi-label">Take-up</div></div>
        <div><div class="kpi-val">${fmtD(r.spendPerTx)}</div><div class="kpi-label">$/tx</div></div>
      </div>
      <div class="divider-line"></div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Food rev</span><span>${fmtD(r.avgFoodRev)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${fw}%; background:${color};"></div></div>
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-label"><span>Bev rev</span><span>${fmtD(r.avgBevRev)}</span></div>
        <div class="mini-bg"><div class="mini-fill" style="width:${bw}%; background:${color}; opacity:0.6;"></div></div>
      </div>

      </div>

// Drill from Path A card into Path B with the special pre-filled
function drillToPathB(encodedData) {
  try {
    const data = JSON.parse(decodeURIComponent(encodedData));
    // Carry over: venue, parsedData, and pre-fill bSpecial
    state.path = 'B';
    state.bSpecial = { day: data.day, name: data.name, sp: data.sp, fp: data.fp };
    // Pre-build SKU matches using the same items that were selected in Path A
    if (data.selectedItems && data.selectedItems.length) {
      // Re-run fuzzy match and override selected flags from Path A
      const candidates = findSkuCandidates(state.bSpecial, state.parsedData);
      state.bSkuMatches = {};
      for (const c of candidates) {
        state.bSkuMatches[c.itemName] = {
          selected: data.selectedItems.includes(c.itemName) || c.autoTick,
          qtyOnDay: c.qtyOnDay,
          avgPrice: c.avgPrice,
          priceMatch: c.priceMatch,
        };
      }
      // Add any selected items that weren't in candidates (e.g. they manually ticked)
      for (const sel of data.selectedItems) {
        if (!state.bSkuMatches[sel] && state.parsedData.allItems.has(sel)) {
          const ai = state.parsedData.allItems.get(sel);
          state.bSkuMatches[sel] = {
            selected: true,
            qtyOnDay: ai.days[data.day] || 0,
            avgPrice: ai.prices.length ? ai.prices.reduce((a,b)=>a+b,0) / ai.prices.length : 0,
            priceMatch: false,
          };
        }
      }
    }
    state.screen = 'path-b-sku';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    console.error('Drill-through failed', e);
  }
}

  const venue = state.venue;
  const range = state.parsedData.dateRange;
  const fmtDate = d => d ? `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}` : '?';
  const title = `${venue.name} - Weekday Specials Performance Review`;
  const dateStr = `${fmtDate(range.start)} to ${fmtDate(range.end)}`;

  // Strip the action bar from the output
  const cleanedHtml = dashHtml.replace(/<div class="action-bar">[\s\S]*?<\/div>\s*<\/div>\s*$/, '</div>');

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${escHtml(title)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>${cssContent}
body { background: #fff; padding: 2rem 0; }
@media print { body { padding: 0; } .page-wide { padding: 0; } }
</style>
</head>
<body>
${cleanedHtml}
<div class="page-wide" style="padding-top:0;">
  <p style="font-size:11px; color:var(--support-grey); text-align:center; margin-top:2rem;">
    Generated ${new Date().toLocaleDateString('en-AU', { day:'numeric', month:'long', year:'numeric' })} · Weekday Offer Review · Kickon Group

  const blob = new Blob([html], { type: 'text/html' });

function confirmBSpecial() {
  const day = document.getElementById('b-day').value;
  const name = document.getElementById('b-name').value.trim();
  const sp = parseFloat(document.getElementById('b-sp').value) || 0;
  const fp = parseFloat(document.getElementById('b-fp').value) || 0;
  if (!name || sp <= 0 || fp <= 0) {
    showErr('b-pick-err', 'Please fill in the item name and both prices.');
    return;
  }
  if (sp >= fp) {
    showErr('b-pick-err', 'Special price should be lower than the full menu price.');
    return;
  }
  if (!state.parsedData.byDow[day].length) {
    showErr('b-pick-err', `No trading data found for ${day}. Check your date range covers the day your special runs.`);
    return;
  }
  state.bSpecial = { day, name, sp, fp };
  // Build fuzzy match candidates
  const candidates = findSkuCandidates(state.bSpecial, state.parsedData);
  state.bSkuMatches = {};
  for (const c of candidates) {
    state.bSkuMatches[c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };
  }
  state.screen = 'path-b-sku';
  render();
}

// ── Screen: SKU Match (Path B) ─────────────────────────────────────
function renderBSkuMatch() {
  const sp = state.bSpecial;
  const matches = state.bSkuMatches;
  const items = Object.keys(matches);
  const nights = state.parsedData.byDow[sp.day].length;
  let totalQty = 0;
  for (const k of items) if (matches[k].selected) totalQty += matches[k].qtyOnDay;
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;

  return `
<div class="page">
  <div class="step-eyebrow">Strategic Plan · Step 4</div>
  <h1 class="step-title"><span class="light">Confirm the</span> matching items</h1>
  <div class="step-divider"></div>

        <button id="bsku-edit-btn" onclick="editBSkuName()" style="background:none; border:none; cursor:pointer; color:var(--brand-blue); font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:2px 6px;">Edit</button>

        <span class="sku-stats">${m.qtyOnDay} sold · avg ${fmtD(m.avgPrice)}</span>

    }).join('')}
    ${items.length > 0 ? `<div class="sku-total" id="bsku-total">Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg</div>` : ''}
  </div>

  <div class="btn-row">

function editBSkuName() {
  document.getElementById('bsku-name').style.display = 'none';
  document.getElementById('bsku-edit-btn').style.display = 'none';
  const input = document.getElementById('bsku-edit');
  input.style.display = 'inline-block';
  input.focus();
  input.select();
  document.getElementById('bsku-save-btn').style.display = 'inline-block';
  document.getElementById('bsku-cancel-btn').style.display = 'inline-block';
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveBSkuName(); }
    if (e.key === 'Escape') { e.preventDefault(); cancelBSkuName(); }
  };
}
function cancelBSkuName() {
  document.getElementById('bsku-edit').value = state.bSpecial.name;
  document.getElementById('bsku-name').style.display = 'inline';
  document.getElementById('bsku-edit-btn').style.display = 'inline-block';
  document.getElementById('bsku-edit').style.display = 'none';
  document.getElementById('bsku-save-btn').style.display = 'none';
  document.getElementById('bsku-cancel-btn').style.display = 'none';
}
function saveBSkuName() {
  const newName = document.getElementById('bsku-edit').value.trim();
  if (!newName) { cancelBSkuName(); return; }
  state.bSpecial.name = newName;
  const candidates = findSkuCandidates(state.bSpecial, state.parsedData);
  state.bSkuMatches = {};
  for (const c of candidates) {
    state.bSkuMatches[c.itemName] = { selected: c.autoTick, qtyOnDay: c.qtyOnDay, avgPrice: c.avgPrice, priceMatch: c.priceMatch };
  }
  render();
}

function toggleBSku(itemName, checked) {
  if (!state.bSkuMatches[itemName]) return;
  state.bSkuMatches[itemName].selected = checked;
  const sp = state.bSpecial;
  const matches = state.bSkuMatches;
  const nights = state.parsedData.byDow[sp.day].length;
  let totalQty = 0;
  for (const k of Object.keys(matches)) if (matches[k].selected) totalQty += matches[k].qtyOnDay;
  const avgPerDay = nights ? Math.round(totalQty / nights) : 0;
  const el = document.getElementById('bsku-total');
  if (el) el.innerHTML = `Selected: <strong>${totalQty}</strong> units across ${nights} ${sp.day}s = <strong>${avgPerDay} units/${sp.day.toLowerCase()}</strong> avg`;
}

// ── Run analysis for Path B (single special) ───────────────────────
function runBAnalysis() {
  const sp = state.bSpecial;
  const parsed = state.parsedData;
  const selectedItems = Object.keys(state.bSkuMatches).filter(k => state.bSkuMatches[k].selected);

  const dayBuckets = parsed.byDow[sp.day];
  const nights = dayBuckets.length;
  const avgTx = avg(dayBuckets.map(d => d.transactions));
  const avgFoodTx = avg(dayBuckets.map(d => d.foodTx));
  const avgFoodRev = avg(dayBuckets.map(d => d.foodRev));
  const avgBevRev = avg(dayBuckets.map(d => d.bevRev));
  const avgDiscFood = avg(dayBuckets.map(d => d.discFood));
  const avgDiscBev = avg(dayBuckets.map(d => d.discBev));
  const totalDisc = avgDiscFood + avgDiscBev;
  const netRev = avgFoodRev + avgBevRev - totalDisc;

  let totalSpecialQty = 0, totalSpecialRev = 0;
  for (const itemName of selectedItems) {
    for (const bucket of dayBuckets) {
      const it = bucket.items.get(itemName);
      if (it) { totalSpecialQty += it.qty; totalSpecialRev += it.revenue; }
    }
  }
  const unitsPerNight = nights > 0 ? totalSpecialQty / nights : 0;
  const takeUp = avgFoodTx > 0 ? Math.min(unitsPerNight / avgFoodTx, 1) : 0;
  // Effective full price - weighted avg from non-special-day sales for selected items
  const effective = computeEffectiveFullPrice(selectedItems, sp.day, parsed);
  const fpForDisc = effective ? effective.effectiveFullPrice : sp.fp;
  const discPct = fpForDisc > 0 ? Math.round((fpForDisc - sp.sp) / fpForDisc * 100) : 0;
  const spendPerTx = avgTx > 0 ? (avgFoodRev + avgBevRev - totalDisc) / avgTx : 0;
  const bevPerTx = avgTx > 0 ? avgBevRev / avgTx : 0;
  const discPerTx = avgTx > 0 ? totalDisc / avgTx : 0;
  const isBevLed = avgBevRev > avgFoodRev;

  // Per-week trend buckets (12-week aggregation)
  const weeklyTrend = buildWeeklyTrend(dayBuckets, selectedItems);

  // Verdict
  const dowNetRev = {};
  for (const d of DAYS) {
    const b = parsed.byDow[d];
    if (!b.length) { dowNetRev[d] = 0; continue; }
    dowNetRev[d] = avg(b.map(x => x.foodRev + x.bevRev - x.discFood - x.discBev));
  }
  const maxNetRevDow = Object.keys(dowNetRev).reduce((a, b) => dowNetRev[a] > dowNetRev[b] ? a : b);

  state.bAnalysis = {
    ...sp,
    selectedItems,
    nights,
    effectiveFullPrice: effective ? Math.round(effective.effectiveFullPrice * 100) / 100 : sp.fp,
    isRange: effective ? effective.isRange : false,
    priceMin: effective ? effective.priceMin : sp.fp,
    priceMax: effective ? effective.priceMax : sp.fp,
    unitsPerNight: Math.round(unitsPerNight),
    avgTx: Math.round(avgTx),
    avgFoodTx: Math.round(avgFoodTx),
    avgFoodRev: Math.round(avgFoodRev),
    avgBevRev: Math.round(avgBevRev),
    netRev: Math.round(netRev),
    totalDisc: Math.round(totalDisc),
    avgDiscFood: Math.round(avgDiscFood),
    avgDiscBev: Math.round(avgDiscBev),
    takeUp,
    discPct,
    spendPerTx: Math.round(spendPerTx),
    bevPerTx: Math.round(bevPerTx),
    discPerTx: Math.round(discPerTx),
    isBevLed,
    weeklyTrend,
    foodCostEstimated: Math.round(sp.sp * 0.3),  // 30% food cost default
  };
  state.bAnalysis.verdict = computeVerdict(state.bAnalysis, maxNetRevDow, dowNetRev);
  // Recommended branch
  state.bRecommendedBranch = suggestBranch(state.bAnalysis.verdict.key, state.bAnalysis);

  // Default bev/tx for projections
  state.bGlobals.bevPerTx = state.bAnalysis.bevPerTx;
  // Default new price for scenarios = current sp + $2
  state.bScenarios.forEach(s => s.newPrice = sp.sp);

  state.screen = 'path-b-analysis';
  render();
}

// ── Suggest branch from verdict ────────────────────────────────────
function suggestBranch(verdictKey, a) {
  if (verdictKey === 'dominant') return 'TWEAK';
  if (verdictKey === 'star')     return 'KEEP';
  if (verdictKey === 'working')  return 'KEEP';
  if (verdictKey === 'efficient') return 'KEEP';
  if (verdictKey === 'weak')     return 'REPLACE';
  return 'TWEAK';
}

// ── Build 12-week trend (or however many weeks available) ──────────
// Returns array of { weekStart, weekEnd, transactions, foodTx, specialUnits, takeUp, partial }
function buildWeeklyTrend(dayBuckets, selectedItems) {
  if (!dayBuckets.length) return [];
  // Group dayBuckets by ISO week (Monday-start)
  const weeks = new Map();
  for (const b of dayBuckets) {
    // Get Monday of the week containing b.date
    const d = new Date(b.date);
    const dayIdx = (d.getDay() + 6) % 7; // 0 = Monday
    const mon = new Date(d);
    mon.setDate(d.getDate() - dayIdx);
    const wk = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;

    let specialQty = 0;
    for (const itemName of selectedItems) {
      const it = b.items.get(itemName);
      if (it) specialQty += it.qty;
    }
    weeks.set(wk, {
      weekStart: new Date(mon),
      transactions: b.transactions,
      foodTx: b.foodTx,
      specialUnits: specialQty,
    });
  }

  // Sort and compute take-up + partial flag
  const sorted = Array.from(weeks.values()).sort((a, b) => a.weekStart - b.weekStart);
  // Calculate median foodTx to detect partial weeks
  const median = sorted.map(s => s.foodTx).sort((a,b)=>a-b)[Math.floor(sorted.length/2)] || 0;
  for (const w of sorted) {
    w.takeUp = w.foodTx > 0 ? Math.min(w.specialUnits / w.foodTx, 1) : 0;
    w.partial = median > 0 && w.foodTx < median * 0.25;
  }
  return sorted;
}

// ── Draw combo chart SVG ───────────────────────────────────────────
function drawComboChart() {
  const a = state.bAnalysis;
  const svg = document.getElementById('combo-svg');
  if (!svg) return;
  const trend = a.weeklyTrend;
  if (!trend.length) { svg.innerHTML = '<text x="390" y="140" text-anchor="middle" fill="#94A3B8" font-size="13">No data</text>'; return; }

  const W = 780, H = 280;
  const padL = 50, padR = 50, padT = 20, padB = 40;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const colW = innerW / trend.length;
  const barW = colW * 0.65;
  const maxFoodTx = Math.max(...trend.map(w => w.foodTx), 1);
  // Round up the max for nicer axis
  const yMax = Math.ceil(maxFoodTx / 50) * 50;

  // SVG groups
  const elts = [];
  const color = DAY_COLORS[a.day] || '#4A8BC4';

  // Y-axis grid lines (5 lines, 0/25/50/75/100%)
  for (let i = 0; i <= 5; i++) {
    const y = padT + (innerH * i / 5);
    const val = Math.round(yMax * (5 - i) / 5);
    elts.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#E2E8F0" stroke-width="1"/>`);
    elts.push(`<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#94A3B8" font-size="10">${val}</text>`);
    // Right axis (take-up %)
    const pct = (5 - i) * 20;
    elts.push(`<text x="${W - padR + 8}" y="${y + 4}" text-anchor="start" fill="#94A3B8" font-size="10">${pct}%</text>`);
  }

  // Y-axis labels (rotated)
  elts.push(`<text x="14" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(-90, 14, ${padT + innerH / 2})">Food-bearing tx</text>`);
  elts.push(`<text x="${W - 14}" y="${padT + innerH / 2}" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(90, ${W - 14}, ${padT + innerH / 2})">Take-up rate (%)</text>`);

  // Patterns for partial weeks
  elts.push(`<defs><pattern id="partialPat" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><rect width="6" height="6" fill="${color}" opacity="0.18"/><line x1="0" y1="0" x2="0" y2="6" stroke="${color}" stroke-width="2" opacity="0.55"/></pattern></defs>`);

  // Bars
  trend.forEach((w, i) => {
    const x = padL + i * colW + (colW - barW) / 2;
    const foodH = (w.foodTx / yMax) * innerH;
    const foodY = padT + innerH - foodH;
    const specialH = (w.specialUnits / yMax) * innerH;
    const specialY = padT + innerH - specialH;

    // Total tx column (light)
    const colFill = w.partial ? 'url(#partialPat)' : color;
    const colOpacity = w.partial ? 1 : 0.22;
    elts.push(`<rect x="${x}" y="${foodY}" width="${barW}" height="${foodH}" fill="${colFill}" opacity="${colOpacity}" rx="2"/>`);
    // Special units (darker, overlaid)
    if (specialH > 0 && !w.partial) {
      elts.push(`<rect x="${x}" y="${specialY}" width="${barW}" height="${specialH}" fill="${color}" rx="2"/>`);
    }
    // X-axis label (week start date)
    const lbl = `${w.weekStart.getDate()}/${w.weekStart.getMonth()+1}`;
    elts.push(`<text x="${x + barW/2}" y="${H - padB + 14}" text-anchor="middle" fill="#94A3B8" font-size="10">${lbl}</text>`);
  });

  // Line for take-up %
  const linePoints = trend.map((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    return `${x},${y}`;
  }).join(' ');
  elts.push(`<polyline points="${linePoints}" fill="none" stroke="#0B1F3A" stroke-width="2"/>`);
  // Line dots
  trend.forEach((w, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + innerH - (w.takeUp * innerH);
    elts.push(`<circle cx="${x}" cy="${y}" r="3.5" fill="#0B1F3A" stroke="#fff" stroke-width="1.5"/>`);
  });

  svg.innerHTML = elts.join('');

  // Render readout cells below: trend direction over period
  const readoutEl = document.getElementById('combo-readout');
  if (readoutEl && trend.length >= 2) {
    const firstNonPartial = trend.find(w => !w.partial);
    const lastNonPartial = trend.slice().reverse().find(w => !w.partial);
    if (firstNonPartial && lastNonPartial && firstNonPartial !== lastNonPartial) {
      const txChange = ((lastNonPartial.foodTx - firstNonPartial.foodTx) / Math.max(firstNonPartial.foodTx, 1)) * 100;
      const unitChange = ((lastNonPartial.specialUnits - firstNonPartial.specialUnits) / Math.max(firstNonPartial.specialUnits, 1)) * 100;
      const takeUpChange = (lastNonPartial.takeUp - firstNonPartial.takeUp) * 100;
      const trendClass = v => v > 5 ? 'up' : v < -5 ? 'down' : '';
      const trendSym = v => v > 5 ? '↑' : v < -5 ? '↓' : '→';
      readoutEl.innerHTML = `
        <div class="combo-readout-item">
          <div class="combo-readout-label">Food tx trend</div>
          <div class="combo-readout-val ${trendClass(txChange)}">${trendSym(txChange)} ${txChange > 0 ? '+' : ''}${txChange.toFixed(0)}%</div>
        </div>
        <div class="combo-readout-item">
          <div class="combo-readout-label">Special units trend</div>
          <div class="combo-readout-val ${trendClass(unitChange)}">${trendSym(unitChange)} ${unitChange > 0 ? '+' : ''}${unitChange.toFixed(0)}%</div>
        </div>
        <div class="combo-readout-item">
          <div class="combo-readout-label">Take-up rate trend</div>
          <div class="combo-readout-val ${trendClass(takeUpChange)}">${trendSym(takeUpChange)} ${takeUpChange > 0 ? '+' : ''}${takeUpChange.toFixed(1)}pp</div>
        </div>`;
    }
  }
}

// ── AI Research integration ────────────────────────────────────────
const BAKED_API_KEY = '__ANTHROPIC_API_KEY__';
let API_KEY = null;

function getApiKey() {
  if (BAKED_API_KEY && !BAKED_API_KEY.startsWith('__') && BAKED_API_KEY.startsWith('sk-ant-')) {
    return BAKED_API_KEY;
  }
  if (API_KEY) return API_KEY;
  const stored = localStorage.getItem('kg_anthropic_key');
  if (stored) { API_KEY = stored; return API_KEY; }
  return null;
}

function setAiStage(idx) {
  const steps = document.querySelectorAll('#ai-stages .ai-stage');
  steps.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    else if (i === idx) el.classList.add('active');
  });
}

async function triggerAIResearch() {
  if (state.bAiData) { setTimeout(() => { state.screen = 'path-b-review'; render(); }, 300); return; }
  let key = getApiKey();
  if (!key) {
    const entered = prompt('Enter your Anthropic API key (starts with sk-ant-). Stored locally in your browser only.\n\nNote: in the production version this is baked in at deploy time.');
    if (!entered) {
      const errEl = document.getElementById('ai-error');
      if (errEl) {
        errEl.classList.add('visible');
        errEl.innerHTML = 'API key needed. <a href="#" style="color:var(--brand-blue);" onclick="state.bAiData=null; state.screen=\'path-b-branch\'; render(); return false;">Go back</a>';
      }
      return;
    }
    API_KEY = entered.trim();
    localStorage.setItem('kg_anthropic_key', API_KEY);
    key = API_KEY;
  }
  // Cycle the visual stages while the API call is running
  let stage = 0;
  const stagesTimer = setInterval(() => {
    stage = Math.min(stage + 1, 2);
    setAiStage(stage);
  }, 10000);
  try {
    state.bAiData = await callAIResearch(key);
    clearInterval(stagesTimer);
    setAiStage(3);
    setTimeout(() => { state.screen = 'path-b-review'; render(); }, 500);
  } catch (e) {
    clearInterval(stagesTimer);
    console.error(e);
    const errEl = document.getElementById('ai-error');
    if (errEl) {
      errEl.classList.add('visible');
      errEl.innerHTML = `Research failed: ${escHtml(e.message)}<br><br>
        <button class="btn btn-ghost" onclick="state.bAiData=null; render();" style="margin-right:8px;">Try again</button>
        <button class="btn btn-ghost" onclick="API_KEY=null; localStorage.removeItem('kg_anthropic_key'); state.bAiData=null; render();">Reset API key</button>`;
    }
  }
}

Research the current cost/supply landscape for the main ingredient or category of "${a.name}". For example: if barramundi, look at fishing quotas and wholesale prices; if steak, look at beef cattle prices and processing capacity; if pizza, look at cheese/flour costs. Find 2-3 specific data points (prices, trends, supply pressures) from credible sources (industry bodies, ABARES, MLA, Seafood Industry Australia, news articles from last 12 months). This frames why the current price point may or may not be sustainable.

OUTPUT FORMAT (valid JSON, no markdown, no preamble):
{
  "competitors": [
    {
      "venue": "Venue name",
      "offer": "Specific offer details with price",
      "source": "URL or source name",
      "note": "Why this is relevant (1 sentence)"
    }
  ],
  "competitorInsight": "One paragraph summarising what the competitive landscape tells us",
  "supplyContext": [
    {
      "point": "Headline fact",
      "detail": "Supporting detail with numbers if available",
      "source": "Source name or URL"
    }
  ],
  "supplyInsight": "One paragraph on what the supply/category landscape means for this special"
}
`;

  const body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 4000,
    system: sys,
    messages: [{ role: 'user', content: userPrompt }],
    tools: [{ type: 'web_search_20250305', name: 'web_search' }],
  };

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`API ${resp.status}: ${txt.slice(0, 200)}`);
  }
  const data = await resp.json();
  const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();
  let cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace >= 0 && lastBrace > firstBrace) cleaned = cleaned.slice(firstBrace, lastBrace + 1);
  try { return JSON.parse(cleaned); }
  catch (e) { console.error('Failed to parse AI response:', text); throw new Error('AI response was not valid JSON. Try again.'); }
}

// ── Scenario projection math ───────────────────────────────────────
function projectScenario(s, a, g, isReplace, altPrice) {
  // Projected food tx for this scenario
  const newFoodTx = a.avgFoodTx * (1 + s.txChange / 100);
  const newUnits = newFoodTx * (s.takeUp / 100);
  const price = s.newPrice || (isReplace ? altPrice : a.sp);
  const newFoodRev = newUnits * price;
  // Bev = transactions × bev/tx (transactions scale with food tx)
  const newBevRev = newFoodTx * g.bevPerTx;
  // Net rev (no discount line - the price IS the price now if REPLACE, or the special price)
  const netRev = newFoodRev + newBevRev;
  const deltaPct = a.netRev > 0 ? ((netRev - a.netRev) / a.netRev) * 100 : 0;
  return {
    unitsPerNight: newUnits,
    foodTx: newFoodTx,
    foodRev: newFoodRev,
    bevRev: newBevRev,
    netRev: netRev,
    deltaPct,
  };
}
